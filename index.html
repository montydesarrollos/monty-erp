/* ── SUPABASE ────────────────────────────────────────────── */
const SB={
  h:()=>({
    'Content-Type':'application/json',
    'apikey':window.__SB_KEY__,
    'Authorization':'Bearer '+window.__SB_KEY__,
  }),
  xhr(method,url,headers,body){
    return new Promise((resolve,reject)=>{
      const x=new XMLHttpRequest();
      x.open(method,url,true);
      Object.entries(headers).forEach(([k,v])=>x.setRequestHeader(k,v));
      x.onload=()=>{
        if(x.status>=200&&x.status<300){
          try{resolve(x.responseText?JSON.parse(x.responseText):true);}
          catch{resolve(true);}
        }else{reject(new Error(x.responseText||x.status));}
      };
      x.onerror=()=>reject(new Error('Network error - verifica conexion a internet'));
      x.send(body||null);
    });
  },
  async get(t,q=''){
    return SB.xhr('GET',`${window.__SB_URL__}/rest/v1/${t}${q}`,
      {...SB.h(),'Prefer':'return=representation'});
  },
  async post(t,d){
    return SB.xhr('POST',`${window.__SB_URL__}/rest/v1/${t}`,
      {...SB.h(),'Prefer':'return=representation'},JSON.stringify(d));
  },
  async patch(t,id,d){
    return SB.xhr('PATCH',`${window.__SB_URL__}/rest/v1/${t}?id=eq.${id}`,
      {...SB.h(),'Prefer':'return=representation'},JSON.stringify(d));
  },
  async del(t,id){
    return SB.xhr('DELETE',`${window.__SB_URL__}/rest/v1/${t}?id=eq.${id}`,SB.h());
  },
  async upload(bucket,path,file){
    return new Promise((resolve,reject)=>{
      const x=new XMLHttpRequest();
      x.open('POST',`${window.__SB_URL__}/storage/v1/object/${bucket}/${path}`,true);
      x.setRequestHeader('apikey',window.__SB_KEY__);
      x.setRequestHeader('Authorization','Bearer '+window.__SB_KEY__);
      x.setRequestHeader('x-upsert','true');
      x.onload=()=>{
        if(x.status>=200&&x.status<300){
          resolve(`${window.__SB_URL__}/storage/v1/object/public/${bucket}/${path}`);
        }else{reject(new Error(x.responseText));}
      };
      x.onerror=()=>reject(new Error('Upload failed'));
      x.send(file);
    });
  },
};

        </div>
        <div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
          {mod==="dashboard"    &&<Dashboard     user={user} proyectos={proyectos} onNav={setMod} reload={loadProyectos}/>}
          {mod==="mi_obra"      &&<MiObra        user={user} proyectos={proyectos} curProj={curProj} setCurProj={setCurProj} onNav={setMod}/>}
          {mod==="proyectos"    &&<Proyectos     user={user} proyectos={proyectos} reload={loadProyectos} onSelect={p=>{setCurProj(p);setMod("control");}}/>}
          {mod==="presupuestos" &&<Presupuestos  user={user}/>}
          {mod==="control"      &&<ControlObra   user={user} curProj={curProj} proyectos={proyectos} reload={loadProyectos}/>}
          {mod==="requisiciones"&&<Requisiciones user={user} curProj={curProj} proyectos={proyectos} isRes={isRes}/>}
          {mod==="compras"      &&<Compras       user={user} curProj={curProj} proyectos={proyectos} reload={loadProyectos}/>}
          {mod==="nominas"      &&<Nominas       user={user} curProj={curProj} proyectos={proyectos} reload={loadProyectos}/>}
          {mod==="programa"     &&<Programa      user={user} curProj={curProj} proyectos={proyectos} isRes={isRes}/>}
          {mod==="bitacora"     &&<Bitacora      user={user} curProj={curProj} proyectos={proyectos} isRes={isRes}/>}
          {mod==="fotos"        &&<Fotos         user={user} curProj={curProj} proyectos={proyectos}/>}
          {mod==="documentos"   &&<Documentos    user={user} curProj={curProj} proyectos={proyectos}/>}
          {mod==="materiales"   &&<Materiales    user={user}/>}
          {mod==="seguimiento"  &&<Seguimiento   user={user} proyectos={proyectos} reload={loadProyectos}/>}
          {mod==="usuarios"     &&<Usuarios      user={user}/>}
        </div>
      </div>
    </div>
  );
}

/* ══ DASHBOARD ═══════════════════════════════════════════════ */
function Dashboard({user,proyectos,onNav,reload}){
  const activos=proyectos.filter(p=>p.estado_proyecto==="activo");
  const totalPres=proyectos.reduce((s,p)=>s+(parseFloat(p.presupuesto_total)||0),0);
  const totalGasto=proyectos.reduce((s,p)=>s+(parseFloat(p.gasto_real)||0),0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:N}}>Dashboard Ejecutivo</h2><p style={{fontSize:12,color:TS,marginTop:2}}>Bienvenido, {user.nombre}</p></div>
      <GBtn onClick={reload}>🔄 Actualizar</GBtn>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12,marginBottom:22}}>
      <StatCard icon="🏗️" label="Obras Activas"    value={activos.length}              sub={`${proyectos.length} total`}              color={N}/>
      <StatCard icon="💰" label="Presupuesto Total" value={`$${fmtM(totalPres)}`}      sub="MXN todas las obras"                      color={GD} bg={GB}/>
      <StatCard icon="🧾" label="Gasto Acumulado"   value={`$${fmtM(totalGasto)}`}     sub={pct(totalGasto,totalPres)+"% ejercido"}   color="#156534" bg="#f0fdf4"/>
      <StatCard icon="📈" label="Disponible"        value={`$${fmtM(totalPres-totalGasto)}`} sub="Presupuesto restante"              color={AC} bg="#eff4ff"/>
    </div>
    <SLbl t="🏗️ Obras en Ejecución"/>
    {activos.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:40,marginBottom:10}}>🏗️</div><div style={{fontWeight:700,color:N,marginBottom:12}}>No hay obras activas</div><NBtn onClick={()=>onNav("proyectos")}>Ir a Proyectos</NBtn></div>
    :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:12}}>
      {activos.map(p=>(
        <div key={p.id} className="card card-h" onClick={()=>onNav("control")}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div><div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>{p.nombre}</div><div style={{fontSize:11,color:TS,marginTop:1}}>📍 {p.ciudad||"—"}</div></div>
            <span style={{fontSize:20}}>🏗️</span>
          </div>
          <div style={{marginBottom:6}}><div style={{fontSize:9,color:G4,fontWeight:700,marginBottom:3}}>AVANCE FÍSICO</div><Sem v={p.avance_fisico||0}/></div>
          <div style={{marginBottom:8}}><div style={{fontSize:9,color:G4,fontWeight:700,marginBottom:3}}>PRESUPUESTO EJERCIDO</div><Sem v={pct(p.gasto_real||0,p.presupuesto_total||1)}/></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:TS}}><span>💰 ${fmtM(p.presupuesto_total)} pres.</span><span>🧾 ${fmtM(p.gasto_real)} ejercido</span></div>
        </div>
      ))}
    </div>}
  </div>);
}

/* ══ PROYECTOS ══════════════════════════════════════════════ */
function Proyectos({user,proyectos,reload,onSelect}){
  const [showF,setShowF]=useState(false);const [editP,setEditP]=useState(null);const [saving,setSaving]=useState(false);
  const [usuarios,setUsuarios]=useState([]);
  const emptyF={nombre:"",tipo_obra:"Casa habitación",direccion:"",ciudad:"Los Mochis, Sinaloa",presupuesto_total:"",fecha_inicio:"",fecha_fin_estimada:"",residente_id:"",superficie_m2:"",niveles:"1",contrato_numero:"",notas:""};
  const [f,setF]=useState(emptyF);
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{SB.get("usuarios","?activo=eq.true&order=nombre").then(d=>setUsuarios(d||[])).catch(()=>{});},[]);
  const openNew=()=>{setEditP(null);setF(emptyF);setShowF(true);};
  const openEdit=p=>{setEditP(p);setF({...emptyF,...p,presupuesto_total:String(p.presupuesto_total||""),superficie_m2:String(p.superficie_m2||""),niveles:String(p.niveles||1)});setShowF(true);};
  const save=async()=>{
    if(!f.nombre.trim()){alert("El nombre es obligatorio.");return;}
    setSaving(true);
    try{
      const payload={...f,presupuesto_total:parseFloat(f.presupuesto_total)||0,superficie_m2:parseFloat(f.superficie_m2)||null,niveles:parseInt(f.niveles)||1,updated_at:new Date().toISOString()};
      if(editP)await SB.patch("proyectos",editP.id,payload);
      else await SB.post("proyectos",{...payload,estado_proyecto:"activo",gasto_real:0,avance_fisico:0,created_by:user.id});
      reload();setShowF(false);
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const TIPOS=["Casa habitación","Edificio de departamentos","Local comercial","Bodega industrial","Oficinas","Remodelación","Decoración","Obra civil","Otro"];
  const EC={activo:{c:"#156534",bg:"#f0fdf4"},pausado:{c:"#b45309",bg:"#fef3c7"},terminado:{c:GD,bg:GB},cancelado:{c:"#dc2626",bg:"#fef2f2"}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:N}}>Proyectos y Obras</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{proyectos.length} proyectos</p></div><GBtn onClick={openNew}>＋ Nuevo Proyecto</GBtn></div>
    {proyectos.length===0?<div style={{textAlign:"center",padding:"50px",background:W,borderRadius:14,border:`1.5px solid ${BR}`}}><div style={{fontSize:50,marginBottom:12}}>🏗️</div><GBtn onClick={openNew}>＋ Crear primer proyecto</GBtn></div>
    :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(330px,1fr))",gap:14}}>
      {proyectos.map(p=>{const ec=EC[p.estado_proyecto]||EC.activo;const ep=pct(p.gasto_real||0,p.presupuesto_total||1);return(<div key={p.id} className="card fi">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{flex:1}}><div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>{p.nombre}</div><div style={{fontSize:11,color:TS,marginTop:2}}>📍 {p.ciudad} · {p.tipo_obra||"—"}</div></div>
          <span style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:ec.bg,color:ec.c,marginLeft:8}}>{p.estado_proyecto}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:BG,borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,color:G4,fontWeight:700}}>PRESUPUESTO</div><div style={{fontSize:13,fontWeight:800,color:GD,fontFamily:"Outfit"}}>$ {fmtM(p.presupuesto_total)}</div></div>
          <div style={{background:BG,borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,color:G4,fontWeight:700}}>EJERCIDO</div><div style={{fontSize:13,fontWeight:800,color:"#156534",fontFamily:"Outfit"}}>$ {fmtM(p.gasto_real)}</div></div>
        </div>
        <div style={{marginBottom:10}}><div style={{fontSize:9,color:G4,fontWeight:700,marginBottom:3}}>PRESUPUESTO EJERCIDO</div><Sem v={ep}/></div>
        <div style={{fontSize:11,color:G4,marginBottom:12}}>📅 {fmtD(p.fecha_inicio)} → {fmtD(p.fecha_fin_estimada)}</div>
        <div style={{display:"flex",gap:6}}>
          <button className="hbtn" onClick={()=>onSelect(p)} style={{flex:1,background:`linear-gradient(135deg,${N2},${N})`,color:W,border:"none",padding:"7px",borderRadius:7,fontSize:11,fontWeight:700}}>📊 Control de Obra</button>
          <button className="hbtn" onClick={()=>openEdit(p)} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,padding:"7px 10px",borderRadius:7,fontSize:11}}>✏️</button>
          <button className="hbtn" onClick={async()=>{if(!confirm("¿Cambiar estado?"))return;const ne=p.estado_proyecto==="activo"?"pausado":"activo";try{await SB.patch("proyectos",p.id,{estado_proyecto:ne,updated_at:new Date().toISOString()});reload();}catch(e){alert(e.message);}}} style={{background:"#fef3c7",color:"#b45309",border:"1px solid #fcd34d44",padding:"7px 10px",borderRadius:7,fontSize:11}}>{p.estado_proyecto==="activo"?"⏸️":"▶️"}</button>
        </div>
      </div>);}) }
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editP?"✏️ Editar Proyecto":"🏗️ Nuevo Proyecto"} maxW={700}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        <SLbl t="Información General"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Nombre de la obra *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Ej: Casa Los Álamos"/>
          <Sel label="Tipo de obra" value={f.tipo_obra} onChange={v=>sf("tipo_obra",v)}>{TIPOS.map(t=><option key={t}>{t}</option>)}</Sel>
          <Inp label="Dirección" value={f.direccion} onChange={v=>sf("direccion",v)} placeholder="Calle, número, colonia"/>
          <Inp label="Ciudad" value={f.ciudad} onChange={v=>sf("ciudad",v)}/>
          <Inp label="Presupuesto total ($MXN)" value={f.presupuesto_total} onChange={v=>sf("presupuesto_total",v)} type="number"/>
          <Inp label="No. de contrato" value={f.contrato_numero} onChange={v=>sf("contrato_numero",v)} placeholder="CONT-2025-001"/>
          <Inp label="Superficie (m²)" value={f.superficie_m2} onChange={v=>sf("superficie_m2",v)} type="number"/>
          <Inp label="Niveles" value={f.niveles} onChange={v=>sf("niveles",v)} type="number"/>
          <Inp label="Fecha de inicio" value={f.fecha_inicio} onChange={v=>sf("fecha_inicio",v)} type="date"/>
          <Inp label="Fecha entrega estimada" value={f.fecha_fin_estimada} onChange={v=>sf("fecha_fin_estimada",v)} type="date"/>
        </div>
        <SLbl t="Equipo Asignado"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Residente de obra" value={f.residente_id} onChange={v=>sf("residente_id",v)}>
            <option value="">— Sin asignar —</option>
            {usuarios.filter(u=>u.rol==="residente").map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
          </Sel>
        </div>
        <TA label="Notas" value={f.notas} onChange={v=>sf("notas",v)} placeholder="Condiciones especiales, observaciones..."/>
      </div>
    </Modal>
  </div>);
}

/* ══ CONTROL DE OBRA ════════════════════════════════════════ */
function ControlObra({user,curProj,proyectos,reload}){
  const [partidas,setPartidas]=useState([]);
  const [compras,setCompras]=useState([]);
  const [nominas,setNominas]=useState([]);
  const [loading,setLoading]=useState(false);
  const [showF,setShowF]=useState(false);
  const [saving,setSaving]=useState(false);
  const [editPart,setEditPart]=useState(null);
  const emptyF={categoria:"",nombre:"",unidad:"m²",cantidad:"",precio_unitario:"",tipo_mo:"jornal"};
  const [f,setF]=useState(emptyF);
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{if(curProj?.id)load();},[curProj]);
  const load=async()=>{
    if(!curProj?.id)return;
    setLoading(true);
    try{
      const [p,c,n]=await Promise.all([
        SB.get("partidas",`?proyecto_id=eq.${curProj.id}&order=sort_order`),
        SB.get("compras",`?proyecto_id=eq.${curProj.id}`),
        SB.get("nominas",`?proyecto_id=eq.${curProj.id}`),
      ]);
      setPartidas(p||[]);setCompras(c||[]);setNominas(n||[]);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const savePart=async()=>{
    if(!curProj?.id||!f.nombre.trim()){alert("Selecciona proyecto y nombre.");return;}
    setSaving(true);
    try{
      const payload={...f,proyecto_id:curProj.id,cantidad:parseFloat(f.cantidad)||0,precio_unitario:parseFloat(f.precio_unitario)||0};
      if(editPart)await SB.patch("partidas",editPart.id,payload);
      else await SB.post("partidas",payload);
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };

  const updAvance=async(id,val)=>{
    try{await SB.patch("partidas",id,{avance_qty:parseFloat(val)||0,updated_at:new Date().toISOString()});load();}catch(e){}
  };

  if(!curProj)return<div style={{textAlign:"center",padding:"50px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:40,marginBottom:10}}>📈</div><div style={{fontWeight:700,color:N}}>Selecciona una obra en el menú superior</div></div>;

  const totalPres=partidas.reduce((s,p)=>s+(p.cantidad||0)*(p.precio_unitario||0),0);
  const totalGasto=(compras.reduce((s,c)=>s+(c.monto_total||0),0))+(nominas.reduce((s,n)=>s+(n.monto_total||0),0));
  const CATS=[...new Set(partidas.map(p=>p.categoria))];

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Control de Obra · {curProj.nombre}</h2><p style={{fontSize:12,color:TS,marginTop:2}}>Presupuesto vs gasto real por partida</p></div>
      <GBtn onClick={()=>{setEditPart(null);setF(emptyF);setShowF(true);}}>＋ Agregar partida</GBtn>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:18}}>
      <StatCard icon="💰" label="Presupuesto obra" value={`$${fmtM(totalPres)}`} color={GD} bg={GB}/>
      <StatCard icon="🧾" label="Gasto real" value={`$${fmtM(totalGasto)}`} color="#156534" bg="#f0fdf4"/>
      <StatCard icon="📊" label="Saldo" value={`$${fmtM(totalPres-totalGasto)}`} color={AC} bg="#eff4ff"/>
      <StatCard icon="📈" label="% Ejercido" value={pct(totalGasto,totalPres)+"%"} color={parseFloat(pct(totalGasto,totalPres))>90?"#dc2626":N}/>
    </div>
    {loading?<div style={{textAlign:"center",padding:30,color:TS}}><span className="spin">⟳</span> Cargando...</div>
    :partidas.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div style={{fontWeight:700,color:N,marginBottom:12}}>Sin partidas — agrega las partidas del presupuesto</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`,boxShadow:"0 2px 12px rgba(13,34,68,.07)"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 70px 90px 100px 100px 110px 80px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Concepto</span><span style={{textAlign:"center"}}>Unid.</span><span style={{textAlign:"center"}}>Cantidad</span>
        <span style={{textAlign:"right"}}>Presupuesto</span><span style={{textAlign:"right"}}>Ejercido</span><span style={{textAlign:"right"}}>% Ejercido</span><span style={{textAlign:"center"}}>Acc.</span>
      </div>
      {CATS.map(cat=>{
        const ci=partidas.filter(p=>p.categoria===cat);if(!ci.length)return null;
        const catPres=ci.reduce((s,p)=>s+(p.cantidad||0)*(p.precio_unitario||0),0);
        const catEj=ci.reduce((s,p)=>s+(p.monto_ejercido||0),0);
        return(<div key={cat}>
          <div style={{padding:"6px 14px",background:"#e8eef8",fontSize:9,fontWeight:800,color:N2,letterSpacing:.8,textTransform:"uppercase",borderTop:`1px solid ${BR}`,display:"flex",justifyContent:"space-between"}}>
            <span>▸ {cat}</span><span style={{fontFamily:"DM Mono"}}>Pres: ${fmtM(catPres)} · Ej: ${fmtM(catEj)}</span>
          </div>
          {ci.map((item,idx)=>{
            const pres=(item.cantidad||0)*(item.precio_unitario||0);
            const ej=item.monto_ejercido||0;
            const ejPct=pct(ej,pres);
            return(<div key={item.id} style={{display:"grid",gridTemplateColumns:"2fr 70px 90px 100px 100px 110px 80px",alignItems:"center",padding:"9px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
              <div><div style={{fontSize:12,fontWeight:600,color:N}}>{item.nombre}</div><div style={{fontSize:9,color:G4}}>{item.tipo_mo==="destajo"?"⚡ destajo":"📅 jornal"}</div></div>
              <div style={{textAlign:"center",fontSize:11,color:G4,fontFamily:"DM Mono"}}>{item.unidad}</div>
              <div style={{textAlign:"center",fontSize:11,fontFamily:"DM Mono"}}>{item.cantidad}</div>
              <div style={{textAlign:"right",fontSize:12,fontWeight:700,color:GD,fontFamily:"Outfit"}}>$ {fmtM(pres)}</div>
              <div style={{textAlign:"right",fontSize:12,fontWeight:700,color:"#156534",fontFamily:"Outfit"}}>$ {fmtM(ej)}</div>
              <div style={{padding:"0 8px"}}><Sem v={ejPct}/></div>
              <div style={{textAlign:"center",display:"flex",gap:4,justifyContent:"center"}}>
                <button className="hbtn" onClick={()=>{setEditPart(item);setF({...emptyF,...item,cantidad:String(item.cantidad||""),precio_unitario:String(item.precio_unitario||"")});setShowF(true);}} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:5,padding:"3px 7px",fontSize:10}}>✏️</button>
                <button className="hbtn" onClick={()=>{if(confirm("¿Eliminar partida?"))SB.del("partidas",item.id).then(load).catch(e=>alert(e.message));}} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:5,padding:"3px 7px",fontSize:10}}>🗑️</button>
              </div>
            </div>);
          })}
        </div>);
      })}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editPart?"✏️ Editar Partida":"📋 Nueva Partida"} maxW={560}

/* ══ REQUISICIONES ══════════════════════════════════════════ */
function Requisiciones({user,curProj,proyectos,isRes}){

  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);

    if(!f.proyecto_id){alert("Selecciona proyecto.");return;}

    :<div style={{display:"flex",flexDirection:"column",gap:10}}>{reqs.map(r=>{const sc=SC[r.estado]||SC.pendiente;return(<div key={r.id} className="card fi">

          {!isRes&&r.estado==="aprobada"&&<button className="hbtn" onClick={()=>cambiar(r.id,"surtida")} style={{fontSize:10,padding:"4px 10px",background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:7,fontWeight:700}}>📦 Surtida</button>}

    </Modal>
  </div>);
}

/* ══ COMPRAS ════════════════════════════════════════════════ */
function Compras({user,curProj,proyectos,reload}){
  const [compras,setCompras]=useState([]);const [projId,setProjId]=useState(curProj?.id||"");
  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);const [uploading,setUploading]=useState(false);
  const [f,setF]=useState({proyecto_id:"",folio_factura:"",proveedor:"",fecha_compra:new Date().toISOString().slice(0,10),monto_total:"",iva:"",tipo_documento:"factura",categoria:"",notas:""});
  const [file,setFile]=useState(null);const fileRef=useRef();
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("compras",`?proyecto_id=eq.${projId}&order=created_at.desc`);setCompras(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.monto_total){alert("Proyecto y monto son obligatorios.");return;}
    setSaving(true);
    try{
      let archivo_url=null,archivo_nombre=null;
      if(file){setUploading(true);try{const path=`${f.proyecto_id}/${Date.now()}_${file.name}`;archivo_url=await SB.upload("facturas",path,file);archivo_nombre=file.name;}catch(e){console.warn(e.message);}setUploading(false);}
      const monto=parseFloat(f.monto_total)||0,iva=parseFloat(f.iva)||0;
      await SB.post("compras",{...f,monto_total:monto,iva,monto_sin_iva:monto-iva,archivo_url,archivo_nombre,registrado_por:user.id});
      // Update gasto real
      const proj=proyectos.find(p=>p.id===f.proyecto_id);
      if(proj)await SB.patch("proyectos",proj.id,{gasto_real:(parseFloat(proj.gasto_real)||0)+monto,updated_at:new Date().toISOString()});
      setShowF(false);setFile(null);load();if(reload)reload();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const totalC=compras.reduce((s,c)=>s+(parseFloat(c.monto_total)||0),0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Compras y Facturas</h2></div><GBtn onClick={()=>{setF({proyecto_id:projId||"",folio_factura:"",proveedor:"",fecha_compra:new Date().toISOString().slice(0,10),monto_total:"",iva:"",tipo_documento:"factura",categoria:"",notas:""});setFile(null);setShowF(true);}}>＋ Registrar compra</GBtn></div>
    <div style={{marginBottom:14,display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>
      {projId&&<StatCard icon="🧾" label="Total compras" value={`$${fmtM(totalC)}`} sub={`${compras.length} registros`} color={GD} bg={GB}/>}
    </div>
    {compras.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>🧾</div><div style={{fontWeight:700,color:N}}>Sin compras registradas</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px 120px 70px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Proveedor / Folio</span><span>Categoría</span><span style={{textAlign:"center"}}>Fecha</span><span style={{textAlign:"right"}}>Monto</span><span style={{textAlign:"center"}}>Doc.</span>
      </div>
      {compras.map((c,idx)=>(
        <div key={c.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px 120px 70px",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
          <div><div style={{fontSize:12,fontWeight:600,color:N}}>{c.proveedor||"—"}</div><div style={{fontSize:10,color:G4}}>{c.folio_factura||"—"} · {c.tipo_documento}</div></div>
          <div style={{fontSize:11,color:TS}}>{c.categoria||"—"}</div>
          <div style={{textAlign:"center",fontSize:10,color:G4}}>{fmtD(c.fecha_compra)}</div>
          <div style={{textAlign:"right",fontSize:13,fontWeight:800,color:GD,fontFamily:"Outfit"}}>$ {fmt(c.monto_total)}</div>
          <div style={{textAlign:"center"}}>{c.archivo_url?<a href={c.archivo_url} target="_blank" style={{fontSize:18,textDecoration:"none"}}>📄</a>:<span style={{fontSize:10,color:G4}}>—</span>}</div>
        </div>
      ))}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="🧾 Registrar Compra / Factura" maxW={620}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving||uploading}>{saving?"Guardando...":(uploading?"Subiendo archivo...":"✅ Registrar")}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Proveedor" value={f.proveedor} onChange={v=>sf("proveedor",v)} placeholder="Nombre del proveedor"/>
          <Inp label="Folio de factura" value={f.folio_factura} onChange={v=>sf("folio_factura",v)} placeholder="A-00123"/>
          <Sel label="Tipo documento" value={f.tipo_documento} onChange={v=>sf("tipo_documento",v)}><option value="factura">Factura</option><option value="nota">Nota de compra</option><option value="recibo">Recibo</option><option value="otro">Otro</option></Sel>
          <Sel label="Categoría de partida" value={f.categoria} onChange={v=>sf("categoria",v)}><option value="">— Seleccionar —</option>{["Concreto","Acero","Block/Tabique","Carpintería","Herrería","Pintura","Hidráulico","Eléctrico","Impermeabilizante","Acabados","Decoración","Herramienta","Otro"].map(c=><option key={c}>{c}</option>)}</Sel>
          <Inp label="Monto total ($MXN) *" value={f.monto_total} onChange={v=>sf("monto_total",v)} type="number" placeholder="0.00"/>
          <Inp label="IVA ($MXN)" value={f.iva} onChange={v=>sf("iva",v)} type="number" placeholder="0.00"/>
          <Inp label="Fecha de compra" value={f.fecha_compra} onChange={v=>sf("fecha_compra",v)} type="date"/>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:6}}>📎 Archivo (PDF, JPG)</label>
          <div className="drop-zone" onClick={()=>fileRef.current?.click()} style={{padding:"14px"}}>{file?<div style={{fontSize:12,color:GD,fontWeight:700}}>📄 {file.name}</div>:<div style={{fontSize:12,color:TS}}>Arrastra o toca para subir factura/nota</div>}</div>
          <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/></div>
        <TA label="Notas" value={f.notas} onChange={v=>sf("notas",v)} placeholder="Observaciones..."/>
      </div>
    </Modal>
  </div>);
}

/* ══ NÓMINAS ════════════════════════════════════════════════ */
function Nominas({user,curProj,proyectos,reload}){
  const [nominas,setNominas]=useState([]);const [projId,setProjId]=useState(curProj?.id||"");
  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);
  const [file,setFile]=useState(null);const fileRef=useRef();
  const emptyF={proyecto_id:"",semana:"",fecha_inicio:"",fecha_fin:"",tipo:"jornal",monto_total:"",notas:"",trabajadores:[{nombre:"",oficio:"",dias_trabajados:"",jornal_diario:"",destajo_monto:""}]};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("nominas",`?proyecto_id=eq.${projId}&order=fecha_inicio.desc`);setNominas(d||[]);}catch(e){}};
  const addT=()=>setF(p=>({...p,trabajadores:[...p.trabajadores,{nombre:"",oficio:"",dias_trabajados:"",jornal_diario:"",destajo_monto:""}]}));
  const setT=(idx,k,v)=>setF(p=>{const t=[...p.trabajadores];t[idx]={...t[idx],[k]:v};return{...p,trabajadores:t};});
  const calcT=()=>f.trabajadores.reduce((s,t)=>s+(parseFloat(t.dias_trabajados)||0)*(parseFloat(t.jornal_diario)||0)+(parseFloat(t.destajo_monto)||0),0);
  const save=async()=>{
    if(!f.proyecto_id||!f.semana){alert("Completa los campos obligatorios.");return;}
    setSaving(true);
    try{
      let archivo_url=null,archivo_nombre=null;
      if(file){try{const path=`${f.proyecto_id}/${Date.now()}_${file.name}`;archivo_url=await SB.upload("nominas",path,file);archivo_nombre=file.name;}catch(e){}}
      const monto=parseFloat(f.monto_total)||calcT();
      const [nom]=await SB.post("nominas",{...f,monto_total:monto,num_trabajadores:f.trabajadores.filter(t=>t.nombre.trim()).length,archivo_url,archivo_nombre,registrado_por:user.id});
      const trabs=f.trabajadores.filter(t=>t.nombre.trim()).map(t=>({nomina_id:nom.id,nombre:t.nombre,oficio:t.oficio,dias_trabajados:parseFloat(t.dias_trabajados)||0,jornal_diario:parseFloat(t.jornal_diario)||0,destajo_monto:parseFloat(t.destajo_monto)||0,total:(parseFloat(t.dias_trabajados)||0)*(parseFloat(t.jornal_diario)||0)+(parseFloat(t.destajo_monto)||0)}));
      if(trabs.length)await SB.post("nomina_trabajadores",trabs);
      const proj=proyectos.find(p=>p.id===f.proyecto_id);
      if(proj)await SB.patch("proyectos",proj.id,{gasto_real:(parseFloat(proj.gasto_real)||0)+monto,updated_at:new Date().toISOString()});
      setShowF(false);setFile(null);load();if(reload)reload();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const totalN=nominas.reduce((s,n)=>s+(parseFloat(n.monto_total)||0),0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Nóminas de Mano de Obra</h2></div><GBtn onClick={()=>{setF(emptyF);setFile(null);setShowF(true);}}>＋ Registrar nómina</GBtn></div>
    <div style={{marginBottom:14,display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>
      {projId&&<StatCard icon="👷" label="Total nóminas" value={`$${fmtM(totalN)}`} sub={`${nominas.length} semanas`} color="#156534" bg="#f0fdf4"/>}
    </div>
    {nominas.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>👷</div><div style={{fontWeight:700,color:N}}>Sin nóminas registradas</div></div>
    :<div style={{display:"flex",flexDirection:"column",gap:10}}>{nominas.map(n=>(
      <div key={n.id} className="card fi"><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>📅 Semana: {n.semana}</div><div style={{fontSize:11,color:TS,marginTop:2}}>{fmtD(n.fecha_inicio)} al {fmtD(n.fecha_fin)} · {n.tipo} · {n.num_trabajadores} trabajadores</div>{n.notas&&<div style={{fontSize:11,color:G4,fontStyle:"italic",marginTop:2}}>{n.notas}</div>}</div>
        <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:900,color:"#156534",fontFamily:"Outfit"}}>$ {fmt(n.monto_total)}</div>{n.archivo_url&&<a href={n.archivo_url} target="_blank" style={{fontSize:11,color:AC,textDecoration:"none"}}>📄 Ver</a>}</div>
      </div></div>
    ))}</div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="👷 Registrar Nómina Semanal" maxW={720}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar nómina"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
          <Inp label="Semana (ej: 2025-W21)" value={f.semana} onChange={v=>sf("semana",v)} placeholder="2025-W21"/>
          <Inp label="Fecha inicio" value={f.fecha_inicio} onChange={v=>sf("fecha_inicio",v)} type="date"/>
          <Inp label="Fecha fin" value={f.fecha_fin} onChange={v=>sf("fecha_fin",v)} type="date"/>
          <Sel label="Tipo de pago" value={f.tipo} onChange={v=>sf("tipo",v)}><option value="jornal">📅 Jornal</option><option value="destajo">⚡ Destajo</option><option value="mixta">Mixta</option></Sel>
        </div>
        <SLbl t="Trabajadores"/>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:5,fontSize:9,color:G4,fontWeight:700,textTransform:"uppercase"}}><span>Nombre</span><span>Oficio</span><span>Días</span><span>Jornal/día $</span><span>Destajo $</span></div>
        {f.trabajadores.map((t,idx)=>(
          <div key={idx} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:5}}>
            <input value={t.nombre} onChange={e=>setT(idx,"nombre",e.target.value)} placeholder="Nombre" style={{...iS,fontSize:12}}/>
            <input value={t.oficio} onChange={e=>setT(idx,"oficio",e.target.value)} placeholder="Albañil" style={{...iS,fontSize:12}}/>
            <input type="number" value={t.dias_trabajados} onChange={e=>setT(idx,"dias_trabajados",e.target.value)} placeholder="0" style={{...iS,fontSize:12,textAlign:"center"}}/>
            <input type="number" value={t.jornal_diario} onChange={e=>setT(idx,"jornal_diario",e.target.value)} placeholder="0" style={{...iS,fontSize:12,textAlign:"right"}}/>
            <input type="number" value={t.destajo_monto} onChange={e=>setT(idx,"destajo_monto",e.target.value)} placeholder="0" style={{...iS,fontSize:12,textAlign:"right"}}/>
          </div>
        ))}
        <button className="hbtn" onClick={addT} style={{background:"none",border:`1.5px dashed ${GD}`,color:GD,padding:"6px",borderRadius:7,fontSize:11,fontWeight:700}}>+ Agregar trabajador</button>
        <div style={{padding:"10px 14px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"#156534",fontWeight:700}}>Total calculado</span><span style={{fontSize:15,fontWeight:900,color:"#156534",fontFamily:"Outfit"}}>$ {fmt(calcT())}</span></div>

          <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/></div>
        <TA label="Notas" value={f.notas} onChange={v=>sf("notas",v)}/>
      </div>
    </Modal>
  </div>);
}

/* ══ PROGRAMA DE OBRA (GANTT) ═══════════════════════════════ */
function Programa({user,curProj,proyectos,isRes}){
  const [acts,setActs]=useState([]);const [projId,setProjId]=useState(curProj?.id||"");
  const [showF,setShowF]=useState(false);const [editA,setEditA]=useState(null);const [saving,setSaving]=useState(false);
  const [usuarios,setUsuarios]=useState([]);
  const emptyF={proyecto_id:"",actividad:"",descripcion:"",fecha_inicio:"",fecha_fin:"",responsable_id:"",color:"#1a3d7a"};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{SB.get("usuarios","?activo=eq.true&order=nombre").then(d=>setUsuarios(d||[])).catch(()=>{});},[]);
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("programa_obra",`?proyecto_id=eq.${projId}&order=fecha_inicio`);setActs(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.actividad||!f.fecha_inicio||!f.fecha_fin){alert("Completa los campos obligatorios.");return;}
    setSaving(true);
    try{
      if(editA)await SB.patch("programa_obra",editA.id,{...f,updated_at:new Date().toISOString()});
      else await SB.post("programa_obra",{...f,avance_real:0,estado:"pendiente"});
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const updAvance=async(id,v)=>{const estado=v>=100?"completada":v>0?"en_proceso":"pendiente";try{await SB.patch("programa_obra",id,{avance_real:v,estado,updated_at:new Date().toISOString()});load();}catch(e){}};
  const minD=acts.length?new Date(acts.reduce((m,a)=>a.fecha_inicio<m?a.fecha_inicio:m,acts[0].fecha_inicio)):new Date();
  const maxD=acts.length?new Date(acts.reduce((m,a)=>a.fecha_fin>m?a.fecha_fin:m,acts[0].fecha_fin)):new Date();
  const total=Math.max(1,Math.ceil((maxD-minD)/(86400000)));
  const bar=a=>{const s=new Date(a.fecha_inicio),e=new Date(a.fecha_fin);return{left:Math.max(0,(s-minD)/86400000/total*100)+"%",width:Math.max(2,(e-s)/86400000/total*100)+"%"};};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Programa de Obra</h2></div>{!isRes&&<GBtn onClick={()=>{setEditA(null);setF({...emptyF,proyecto_id:projId||""});setShowF(true);}}>＋ Nueva actividad</GBtn>}</div>
    {!isRes&&<div style={{marginBottom:14,maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>}
    {acts.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>📅</div><div style={{fontWeight:700,color:N}}>Sin actividades programadas</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`}}>
      <div style={{padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",display:"flex",justifyContent:"space-between"}}>
        <span>DIAGRAMA DE GANTT</span><span>{fmtD(minD.toISOString().slice(0,10))} — {fmtD(maxD.toISOString().slice(0,10))}</span>
      </div>
      {acts.map((a,idx)=>{
        const {left,width}=bar(a);const rPct=parseFloat(a.avance_real)||0;
        const ec={pendiente:N3,en_proceso:GD,completada:"#156534",retrasada:"#dc2626",cancelada:G4};
        return(<div key={a.id} style={{display:"flex",alignItems:"center",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
          <div style={{width:200,padding:"8px 12px",flexShrink:0,borderRight:`1px solid ${BR}`}}>
            <div style={{fontSize:11,fontWeight:700,color:N,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.actividad}</div>
            <div style={{fontSize:9,color:G4}}>{fmtD(a.fecha_inicio)} → {fmtD(a.fecha_fin)}</div>
          </div>
          <div style={{flex:1,padding:"8px 8px",position:"relative",height:46,display:"flex",alignItems:"center"}}>
            <div style={{position:"absolute",left:0,right:0,top:"50%",transform:"translateY(-50%)",height:22}}>
              <div className="gantt-bar" style={{position:"absolute",left,width,background:a.color||ec[a.estado]||N3}}>{rPct>10?rPct+"%":""}</div>
              {rPct>0&&<div style={{position:"absolute",left,width:`calc(${width} * ${rPct/100})`,top:0,height:22,background:"rgba(255,255,255,.25)",borderRadius:5}}/>}
            </div>
          </div>
          <div style={{width:140,padding:"6px 12px",flexShrink:0,borderLeft:`1px solid ${BR}`}}>
            {isRes?(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="number" min="0" max="100" value={a.avance_real||0} onChange={e=>updAvance(a.id,parseFloat(e.target.value)||0)}
                  style={{width:52,background:BG,border:`1px solid ${BR}`,borderRadius:5,padding:"3px 6px",fontSize:12,textAlign:"center"}}/>
                <span style={{fontSize:11,color:G4}}>%</span>
              </div>
            ):(
              <div style={{display:"flex",gap:5}}>
                <button className="hbtn" onClick={()=>{setEditA(a);setF({...emptyF,...a});setShowF(true);}} style={{fontSize:10,color:AC,background:"#eff4ff",border:`1px solid ${AC}33`,padding:"3px 7px",borderRadius:5}}>✏️</button>
                <button className="hbtn" onClick={()=>{if(confirm("¿Eliminar?"))SB.del("programa_obra",a.id).then(load).catch(e=>alert(e.message));}} style={{fontSize:10,color:"#dc2626",background:"#fef2f2",border:"1px solid #fca5a5",padding:"3px 7px",borderRadius:5}}>🗑️</button>
              </div>
            )}
          </div>
        </div>);
      })}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editA?"✏️ Editar Actividad":"📅 Nueva Actividad"} maxW={560}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
        <Inp label="Nombre de la actividad *" value={f.actividad} onChange={v=>sf("actividad",v)} placeholder="Ej: Cimentación, Estructura, Muros..."/>
        <TA label="Descripción" value={f.descripcion} onChange={v=>sf("descripcion",v)} rows={2}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Fecha inicio *" value={f.fecha_inicio} onChange={v=>sf("fecha_inicio",v)} type="date"/>
          <Inp label="Fecha término *" value={f.fecha_fin} onChange={v=>sf("fecha_fin",v)} type="date"/>
          <Sel label="Responsable" value={f.responsable_id} onChange={v=>sf("responsable_id",v)}><option value="">— Sin asignar —</option>{usuarios.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}</Sel>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:11,fontWeight:700,color:TS}}>Color en Gantt</label><input type="color" value={f.color||"#1a3d7a"} onChange={e=>sf("color",e.target.value)} style={{...iS,padding:4,height:42,cursor:"pointer"}}/></div>
        </div>
      </div>
    </Modal>
  </div>);
}

/* ══ BITÁCORA ═══════════════════════════════════════════════ */
function Bitacora({user,curProj,proyectos,isRes}){
  const [entradas,setEntradas]=useState([]);const [projId,setProjId]=useState(curProj?.id||"");
  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);const [files,setFiles]=useState([]);const fileRef=useRef();
  const emptyF={proyecto_id:"",tipo:"general",titulo:"",descripcion:"",clima:"",personal_presente:""};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const TIPOS=["general","avance","anomalia","contratiempo","visita","clima","seguridad","otro"];
  const TC={general:{c:N,bg:"#e8eef8"},avance:{c:"#156534",bg:"#f0fdf4"},anomalia:{c:"#dc2626",bg:"#fef2f2"},contratiempo:{c:"#b45309",bg:"#fef3c7"},visita:{c:AC,bg:"#eff4ff"},clima:{c:"#0e7490",bg:"#ecfeff"},seguridad:{c:"#7c3aed",bg:"#f5f3ff"},otro:{c:G4,bg:BG}};
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("bitacora",`?proyecto_id=eq.${projId}&order=created_at.desc`);setEntradas(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.titulo.trim()){alert("Proyecto y título son obligatorios.");return;}
    setSaving(true);
    try{
      const [entrada]=await SB.post("bitacora",{...f,personal_presente:parseInt(f.personal_presente)||0,registrado_por:user.id});
      for(const fi of files){try{const path=`${f.proyecto_id}/${Date.now()}_${fi.name}`;const url=await SB.upload("bitacora",path,fi);await SB.post("bitacora_archivos",{bitacora_id:entrada.id,archivo_url:url,archivo_nombre:fi.name,tipo_archivo:fi.type.startsWith("image")?"foto":"documento"});}catch(e){}}
      setShowF(false);setFiles([]);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Bitácora Digital</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{entradas.length} entradas</p></div><GBtn onClick={()=>{setF({...emptyF,proyecto_id:projId||""});setFiles([]);setShowF(true);}}>＋ Nueva entrada</GBtn></div>
    {!isRes&&<div style={{marginBottom:14,maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>}
    {entradas.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>📔</div><div style={{fontWeight:700,color:N}}>Sin entradas en bitácora</div></div>
    :<div style={{display:"flex",flexDirection:"column",gap:12}}>
      {entradas.map(e=>{const tc=TC[e.tipo]||TC.general;return(<div key={e.id} className="card fi">
        <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
          <span style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:tc.bg,color:tc.c,whiteSpace:"nowrap"}}>{e.tipo}</span>
          <div><div style={{fontFamily:"Outfit",fontWeight:700,fontSize:14,color:N}}>{e.titulo}</div><div style={{fontSize:10,color:G4,marginTop:1}}>{fmtD(e.fecha)} {e.personal_presente>0&&` · 👷 ${e.personal_presente}`} {e.clima&&` · 🌤️ ${e.clima}`}</div></div>
        </div>
        {e.descripcion&&<div style={{fontSize:12,color:TS,lineHeight:1.6,background:BG,borderRadius:7,padding:"8px 12px"}}>{e.descripcion}</div>}
      </div>);})}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="📔 Nueva Entrada de Bitácora" maxW={600}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
          <Sel label="Tipo" value={f.tipo} onChange={v=>sf("tipo",v)}>{TIPOS.map(t=><option key={t}>{t}</option>)}</Sel>
        </div>
        <Inp label="Título *" value={f.titulo} onChange={v=>sf("titulo",v)} placeholder="Resumen breve"/>
        <TA label="Descripción detallada" value={f.descripcion} onChange={v=>sf("descripcion",v)} placeholder="Describe avances, anomalías, instrucciones..." rows={4}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Clima" value={f.clima} onChange={v=>sf("clima",v)} placeholder="Soleado, lluvioso..."/>
          <Inp label="Personal presente" value={f.personal_presente} onChange={v=>sf("personal_presente",v)} type="number"/>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:5}}>📸 Evidencia</label>
          <div className="drop-zone" onClick={()=>fileRef.current?.click()} style={{padding:"12px"}}>{files.length>0?<div style={{fontSize:12,color:GD,fontWeight:700}}>📎 {files.length} archivo{files.length>1?"s":""}</div>:<div style={{fontSize:12,color:TS}}>Fotos o documentos de evidencia</div>}</div>
          <input ref={fileRef} type="file" accept="image/*,.pdf" multiple style={{display:"none"}} onChange={e=>setFiles(Array.from(e.target.files))}/></div>
      </div>
    </Modal>
  </div>);
}

/* ══ FOTOS ══════════════════════════════════════════════════ */
function Fotos({user,curProj,proyectos}){
  const [fotos,setFotos]=useState([]);const [projId,setProjId]=useState(curProj?.id||"");
  const [showF,setShowF]=useState(false);const [files,setFiles]=useState([]);const [saving,setSaving]=useState(false);
  const [f,setF]=useState({proyecto_id:"",descripcion:"",avance_reportado:""});const sf=(k,v)=>setF(p=>({...p,[k]:v}));const fileRef=useRef();
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);

  const save=async()=>{

/* ══ DOCUMENTOS ═════════════════════════════════════════════ */
function Documentos({user,curProj,proyectos}){
  const [docs,setDocs]=useState([]);const [projId,setProjId]=useState(curProj?.id||"");
  const [showF,setShowF]=useState(false);const [file,setFile]=useState(null);const [saving,setSaving]=useState(false);const fileRef=useRef();
  const [f,setF]=useState({proyecto_id:"",categoria:"plano",nombre:"",descripcion:"",version:"1.0"});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const CATS=["plano","render","contrato","licencia","estudio","acta","permiso","otro"];
  const CI={plano:"📐",render:"🎨",contrato:"📝",licencia:"🏛️",estudio:"🔬",acta:"📋",permiso:"✅",otro:"📁"};
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("documentos",`?proyecto_id=eq.${projId}&order=created_at.desc`);setDocs(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.nombre.trim()||!file){alert("Completa todos los campos y selecciona un archivo.");return;}
    setSaving(true);
    try{const path=`${f.proyecto_id}/${f.categoria}/${Date.now()}_${file.name}`;const url=await SB.upload("documentos",path,file);await SB.post("documentos",{...f,archivo_url:url,archivo_nombre:file.name,subido_por:user.id});setShowF(false);setFile(null);load();}
    catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const byCat=CATS.reduce((acc,cat)=>{acc[cat]=docs.filter(d=>d.categoria===cat);return acc;},{});
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Expediente Digital</h2></div><GBtn onClick={()=>{setF({proyecto_id:projId||"",categoria:"plano",nombre:"",descripcion:"",version:"1.0"});setFile(null);setShowF(true);}}>＋ Subir documento</GBtn></div>
    <div style={{marginBottom:14,maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>
    {docs.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>📁</div><div style={{fontWeight:700,color:N}}>Sin documentos</div></div>
    :<div>{CATS.map(cat=>{const cd=byCat[cat];if(!cd.length)return null;return(<div key={cat} style={{marginBottom:18}}><SLbl t={`${CI[cat]} ${cat.charAt(0).toUpperCase()+cat.slice(1)}s`}/><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>{cd.map(d=>(<a key={d.id} href={d.archivo_url} target="_blank" style={{textDecoration:"none"}}><div className="card card-h"><div style={{fontSize:26,marginBottom:6}}>{CI[d.categoria]||"📄"}</div><div style={{fontSize:13,fontWeight:700,color:N,marginBottom:3}}>{d.nombre}</div><div style={{fontSize:10,color:G4}}>v{d.version} · {fmtD(d.created_at)}</div>{d.descripcion&&<div style={{fontSize:11,color:TS,marginTop:3}}>{d.descripcion}</div>}</div></a>))}</div></div>);})}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="📁 Subir Documento" maxW={500}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Subiendo...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
          <Sel label="Categoría *" value={f.categoria} onChange={v=>sf("categoria",v)}>{CATS.map(c=><option key={c} value={c}>{CI[c]} {c}</option>)}</Sel>
        </div>
        <Inp label="Nombre del documento *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Ej: Plano arquitectónico PB"/>
        <Inp label="Versión" value={f.version} onChange={v=>sf("version",v)} placeholder="1.0"/>
        <TA label="Descripción" value={f.descripcion} onChange={v=>sf("descripcion",v)} rows={2}/>
        <div><label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:5}}>📎 Archivo *</label>
          <div className="drop-zone" onClick={()=>fileRef.current?.click()} style={{padding:"12px"}}>{file?<div style={{fontSize:12,color:GD,fontWeight:700}}>📄 {file.name}</div>:<div style={{fontSize:12,color:TS}}>PDF, DWG, JPG, PNG, DOCX...</div>}</div>
          <input ref={fileRef} type="file" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/></div>
      </div>
    </Modal>
  </div>);
}

/* ══ SEGUIMIENTO ════════════════════════════════════════════ */
function Seguimiento({user,proyectos,reload}){

  const ST=[{k:"borrador",l:"📝 Borrador",c:G4,bg:"#e8eef8"},{k:"enviado",l:"📤 Enviado",c:AC,bg:"#eff4ff"},{k:"en_espera",l:"⏳ En Espera",c:"#b45309",bg:"#fef3c7"},{k:"aprobado",l:"✅ Aprobado",c:"#156534",bg:"#f0fdf4"},{k:"en_proceso",l:"🏗️ En Proceso",c:"#0e7490",bg:"#ecfeff"},{k:"cancelado",l:"❌ Cancelado",c:"#dc2626",bg:"#fef2f2"}];

        <div><div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>{p.nombre_obra||"Sin nombre"}</div><div style={{fontSize:11,color:TS,marginTop:2}}>👤 {p.cliente_nombre||"—"} · 📍 {p.obra_ciudad||"—"}</div><div style={{fontSize:10,color:G4,marginTop:2}}>📅 {fmtD(p.created_at)} · {p.created_by||"—"}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:900,color:GD,fontFamily:"Outfit"}}>$ {fmt(p.total)}</div><span style={{fontSize:10,padding:"2px 9px",borderRadius:10,fontWeight:700,background:sc.bg,color:sc.c}}>{sc.l}</span></div>
      </div>
      <div style={{marginTop:10,display:"flex",gap:5,flexWrap:"wrap"}}>{ST.filter(s=>s.k!==p.status).map(s=>(
        <button key={s.k} className="hbtn" onClick={()=>setStatus(p.id,s.k)} style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:s.bg,color:s.c,border:`1px solid ${s.c}33`}}>{s.l}</button>

/* ══ USUARIOS ═══════════════════════════════════════════════ */
function Usuarios({user}){
  const [usuarios,setUsuarios]=useState([]);const [showF,setShowF]=useState(false);const [editU,setEditU]=useState(null);const [saving,setSaving]=useState(false);
  const emptyF={nombre:"",email:"",password_hash:"",rol:"residente",telefono:"",activo:true};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{load();},[]);
  const load=async()=>{try{const d=await SB.get("usuarios","?order=nombre");setUsuarios(d||[]);}catch(e){}};
  const open=(u=null)=>{setEditU(u);setF(u?{nombre:u.nombre,email:u.email,password_hash:"",rol:u.rol,telefono:u.telefono||"",activo:u.activo}:emptyF);setShowF(true);};
  const save=async()=>{

      const payload={nombre:f.nombre,email:f.email,rol:f.rol,telefono:f.telefono,activo:f.activo,updated_at:new Date().toISOString()};
      if(f.password_hash.trim())payload.password_hash=f.password_hash;
      if(editU)await SB.patch("usuarios",editU.id,payload);else await SB.post("usuarios",{...payload});
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const toggle=async u=>{try{await SB.patch("usuarios",u.id,{activo:!u.activo,updated_at:new Date().toISOString()});load();}catch(e){alert(e.message);}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Usuarios del Sistema</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{usuarios.length} usuarios registrados</p></div><GBtn onClick={()=>open()}>＋ Nuevo usuario</GBtn></div>
    <div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`,boxShadow:"0 2px 12px rgba(13,34,68,.07)"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px 90px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Usuario</span><span style={{textAlign:"center"}}>Rol</span><span style={{textAlign:"center"}}>Teléfono</span><span style={{textAlign:"center"}}>Estado</span><span style={{textAlign:"center"}}>Acciones</span>
      </div>
      {usuarios.map((u,idx)=>{const r=ROLES[u.rol]||ROLES.residente;return(<div key={u.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px 90px",alignItems:"center",padding:"11px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:r.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,border:`1.5px solid ${r.color}33`,flexShrink:0}}>{r.icon}</div>
          <div><div style={{fontSize:13,fontWeight:700,color:N}}>{u.nombre}</div><div style={{fontSize:10,color:G4}}>{u.email}</div></div>
        </div>
        <div style={{textAlign:"center"}}><span style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:r.bg,color:r.color}}>{r.icon} {r.label}</span></div>
        <div style={{textAlign:"center",fontSize:11,color:TS}}>{u.telefono||"—"}</div>
        <div style={{textAlign:"center"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,fontWeight:700,background:u.activo?"#f0fdf4":"#fef2f2",color:u.activo?"#156534":"#dc2626"}}>{u.activo?"● Activo":"○ Inactivo"}</span></div>
        <div style={{textAlign:"center",display:"flex",gap:5,justifyContent:"center"}}>
          <button className="hbtn" onClick={()=>open(u)} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:5,padding:"4px 8px",fontSize:11}}>✏️</button>
          {u.id!==user.id&&<button className="hbtn" onClick={()=>toggle(u)} style={{background:"#fef3c7",color:"#b45309",border:"1px solid #fcd34d44",borderRadius:5,padding:"4px 8px",fontSize:11}}>{u.activo?"⏸️":"▶️"}</button>}
        </div>
      </div>);})}
    </div>
    <Modal show={showF} onClose={()=>setShowF(false)} title={editU?"✏️ Editar Usuario":"👤 Nuevo Usuario"} maxW={520}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Nombre completo *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Nombre completo"/>
          <Inp label="Email *" value={f.email} onChange={v=>sf("email",v)} type="email" placeholder="correo@empresa.com"/>
          <Inp label={editU?"Nueva contraseña (vacío = sin cambio)":"Contraseña *"} value={f.password_hash} onChange={v=>sf("password_hash",v)} type="password" placeholder="Contraseña"/>
          <Inp label="Teléfono" value={f.telefono} onChange={v=>sf("telefono",v)} placeholder="(668) 000-0000"/>
        </div>
        <Sel label="Rol y permisos *" value={f.rol} onChange={v=>sf("rol",v)}>
          <option value="directivo">👔 Directivo — Acceso total</option>
          <option value="admin_senior">🏢 Admin Senior — Gestión completa</option>
          <option value="admin_junior">📋 Admin Junior — Compras, nóminas, docs</option>
          <option value="residente">👷 Residente — Bitácora, fotos, requisiciones</option>
        </Sel>
        <div style={{padding:"9px 12px",background:BG,borderRadius:7,fontSize:11,color:TS,lineHeight:1.6}}>
          <strong>Permisos:</strong> {(PERMISOS[f.rol]||[]).join(" · ")}
        </div>
        {editU&&<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={f.activo} onChange={e=>sf("activo",e.target.checked)} style={{width:16,height:16,accentColor:GD}}/><span style={{fontSize:12,fontWeight:700,color:TS}}>Usuario activo</span></label>}
      </div>
    </Modal>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
