                </div>
                <div style={{textAlign:"right",fontSize:9,color:G4,marginTop:2}}>MXN · incluye IVA 16%</div>
                <GBtn onClick={()=>setCotTab("resumen")} style={{width:"100%",marginTop:12,padding:10,fontSize:13}}>📊 Ver resumen →</GBtn>
              </div>
            </div>
          </>
        )}
      </div>
    )}

    {/* ── RESUMEN Y PDF ── */}
    {cotTab==="resumen"&&(
      <div>
        {/* Header doc */}
        <div style={{background:`linear-gradient(135deg,${N} 0%,${N2} 100%)`,borderRadius:14,padding:"20px 24px",marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
            <div>
              <img src={window.__LOGO__} alt="MONTY" style={{height:48,objectFit:"contain",marginBottom:8}}/>
              <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:W}}>{clientInfo.obraName||"Sin nombre"}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:2}}>📍 {clientInfo.obraAddress||clientInfo.obraCity||"—"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>Cliente: <strong style={{color:W}}>{clientInfo.clientName||"—"}</strong></div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:2}}>{clientInfo.clientPhone||"—"}</div>
              <div style={{fontSize:20,fontWeight:900,color:GD,fontFamily:"Outfit",marginTop:8}}>$ {fmt(total)} MXN</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,.4)"}}>incluye IVA 16%</div>
            </div>
          </div>
        </div>

        {/* Editor PDF config */}
        <div className="card" style={{marginBottom:16,border:`1.5px solid ${GL}44`,background:GB}}>
          <SLbl t="✏️ Configuración del PDF antes de generar"/>
          <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
              <input type="checkbox" checked={pdfConfig.mostrarPU} onChange={e=>setPdfConfig(p=>({...p,mostrarPU:e.target.checked}))} style={{width:16,height:16,accentColor:GD}}/>
              <span style={{fontSize:12,fontWeight:700,color:N}}>Mostrar precio unitario</span>
            </label>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
              <input type="checkbox" checked={pdfConfig.mostrarQty} onChange={e=>setPdfConfig(p=>({...p,mostrarQty:e.target.checked}))} style={{width:16,height:16,accentColor:GD}}/>
              <span style={{fontSize:12,fontWeight:700,color:N}}>Mostrar cantidades</span>
            </label>
          </div>
          <TA label="Texto de presentación (editable)" value={pdfConfig.presentacion} onChange={v=>setPdfConfig(p=>({...p,presentacion:v}))} rows={3}/>
          <div style={{marginTop:12}}>
            <div style={{fontSize:11,fontWeight:700,color:TS,marginBottom:8}}>Ocultar conceptos del PDF (sin borrarlos del sistema):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {items.map(item=>(
                <label key={item.id} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:pdfConfig.itemsOcultos[item.id]?"#fef2f2":W,border:`1px solid ${pdfConfig.itemsOcultos[item.id]?"#fca5a5":BR}`,borderRadius:7,padding:"4px 10px"}}>
                  <input type="checkbox" checked={!!pdfConfig.itemsOcultos[item.id]} onChange={e=>setPdfConfig(p=>({...p,itemsOcultos:{...p.itemsOcultos,[item.id]:e.target.checked}}))} style={{accentColor:"#dc2626"}}/>
                  <span style={{fontSize:11,color:pdfConfig.itemsOcultos[item.id]?"#dc2626":N}}>{item.emoji} {item.name}</span>
                </label>
              ))}
            </div>
          </div>
        </div>

        {/* Partidas resumen */}
        {allCats.map(cat=>{
          const ci=items.filter(i=>i.cat===cat);if(!ci.length)return null;
          const catT=ci.reduce((s,i)=>s+getUP(i)*i.qty,0);
          return(<div key={cat} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",borderBottom:`2px solid ${N}`,paddingBottom:4,marginBottom:6}}>
              <span style={{fontFamily:"Outfit",fontWeight:800,fontSize:11,textTransform:"uppercase",color:N}}>{cat}</span>
              <span style={{fontFamily:"DM Mono",fontWeight:700,color:GD}}>$ {fmt(catT)}</span>
            </div>
            {ci.map((item,idx)=>{const pu=getUP(item);return(
              <div key={item.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 8px",fontSize:11,background:idx%2===0?W:OW,borderRadius:4,gap:10,opacity:pdfConfig.itemsOcultos[item.id]?.4:1}}>
                <span style={{color:TS}}>{item.emoji} {item.name}{pdfConfig.itemsOcultos[item.id]&&<span style={{fontSize:9,marginLeft:6,color:"#dc2626"}}>[oculto en PDF]</span>}</span>
                <span style={{fontFamily:"DM Mono",fontSize:10.5,whiteSpace:"nowrap",color:TX}}>{item.qty} {item.unit} × $ {fmt(pu)} = <strong style={{color:N}}>$ {fmt(pu*item.qty)}</strong></span>
              </div>
            );})}
          </div>);
        })}

        {/* Totales */}
        <div className="card" style={{marginTop:16}}>
          {bMode==="desglosado"&&(<>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}><span style={{color:TS}}>Costo Directo</span><span style={{fontFamily:"DM Mono"}}>$ {fmt(dirCost)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}><span style={{color:TS}}>Indirectos ({gIndir}%)</span><span style={{fontFamily:"DM Mono"}}>$ {fmt(mIndir)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}><span style={{color:TS}}>Utilidad ({gUtil}%)</span><span style={{fontFamily:"DM Mono"}}>$ {fmt(mUtil)}</span></div>
            <div style={{borderTop:`1px solid ${BR}`,marginBottom:8}}/>
          </>)}
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:14,fontWeight:700}}><span>Subtotal s/IVA</span><span style={{fontFamily:"DM Mono"}}>$ {fmt(subt)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13,color:TS}}><span>IVA 16%</span><span style={{fontFamily:"DM Mono"}}>$ {fmt(iva)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:`2px solid ${GD}`,fontSize:22}}>
            <span style={{fontFamily:"Outfit",fontWeight:900,color:N}}>TOTAL</span>
            <span style={{fontFamily:"Outfit",fontWeight:900,color:GD}}>$ {fmt(total)} MXN</span>
          </div>
        </div>

        {/* Botones */}
        <div style={{display:"flex",gap:10,marginTop:18,justifyContent:"flex-end",flexWrap:"wrap"}}>
          <GhBtn onClick={savePresupuesto}>{saving?"Guardando...":"💾 Guardar en sistema"}</GhBtn>
          <NBtn onClick={exportPDF}>📄 Descargar PDF</NBtn>
        </div>
        <div style={{marginTop:8,padding:"7px 12px",background:OW,border:`1px solid ${BR}`,borderRadius:7,fontSize:9,color:G4}}>
          ⚠️ Precios referenciales para Los Mochis, Sinaloa. No incluye permisos de construcción ni supervisión externa.
        </div>
      </div>
    )}
  </div>);
}

/* ══════════════════════════════════════════════════════════
   MÓDULO: ANÁLISIS DE PLANOS CON IA
══════════════════════════════════════════════════════════ */
function AnalisisPlanos({user}){
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const fileRef=useRef();

  const handleFile=f=>{
    if(!f)return;
    setFile(f);setResult(null);setError("");
    const reader=new FileReader();
    reader.onload=e=>setPreview(e.target.result);
    reader.readAsDataURL(f);
  };

  const analyze=async()=>{
    if(!file){alert("Selecciona un plano primero.");return;}
    setAnalyzing(true);setError("");setResult(null);
    try{
      const reader=new FileReader();
      reader.onload=async e=>{
        const dataUrl=e.target.result;
        const b64=dataUrl.split(",")[1];
        const mimeType=file.type||"image/jpeg";
        try{
          let txt;
          if(mimeType==="application/pdf"){
            // Para PDF usar texto prompt
            txt=await AI.call(
              `Eres un experto en cuantificación de obra para construcción en México (Los Mochis, Sinaloa).
Analiza el plano/documento y extrae todas las medidas y cuantificaciones posibles.
Responde SOLO con JSON puro sin backticks:
{"conceptos":[{"nombre":"nombre del concepto","unidad":"m², m³, ml, pza, etc","cantidad":número,"descripcion":"descripción breve","categoria":"Movimiento de Tierras/Cimentación/Mampostería/Pisos/Pintura/Carpintería/Hidráulico/Eléctrico/Otro"}],"observaciones":"notas del análisis","confianza":"alta/media/baja","advertencias":"limitaciones del análisis"}`,
              `Analiza este plano/documento de construcción y genera la cuantificación de obra. Extrae todas las dimensiones visibles y calcula m², ml, m³, piezas según corresponda. El proyecto es en Los Mochis, Sinaloa, México. Solo JSON.`,
              4000
            );
          }else{
            txt=await AI.callWithImage(
              `Eres un experto en cuantificación de obra para construcción en México (Los Mochis, Sinaloa).
Analiza el plano arquitectónico de la imagen y cuantifica todos los trabajos visibles.
Busca: dimensiones de muros, áreas de cuartos, vanos de ventanas/puertas, perímetros, alturas.
Calcula: m² de cada área, ml de muros, m² de pintura, ml de cimentación, número de ventanas/puertas, etc.
Responde SOLO con JSON puro sin backticks:
{"conceptos":[{"nombre":"nombre del concepto","unidad":"m², m³, ml, pza, etc","cantidad":número,"descripcion":"descripción breve","categoria":"Movimiento de Tierras/Cimentación/Mampostería/Pisos/Pintura/Carpintería/Hidráulico/Eléctrico/Otro"}],"observaciones":"notas del análisis","confianza":"alta/media/baja","advertencias":"limitaciones del análisis"}`,
              b64,
              mimeType,
              "Analiza este plano arquitectónico y genera la cuantificación completa de obra. Extrae todas las dimensiones visibles (cotas) y calcula las cantidades. Solo JSON.",
              4000
            );
          }
          const clean=txt.replace(/```json|```/g,"").trim();
          const parsed=JSON.parse(clean);
          setResult(parsed);
        }catch(e){setError("Error al analizar: "+e.message);}
        setAnalyzing(false);
      };
      reader.readAsDataURL(file);
    }catch(e){setError("Error: "+e.message);setAnalyzing(false);}
  };

  const exportarAlCotizador=()=>{
    if(!result?.conceptos)return;
    alert(`Se encontraron ${result.conceptos.length} conceptos. Ve al módulo Cotizador para usarlos como base del presupuesto.`);
  };

  return(<div>
    <div style={{marginBottom:20}}>
      <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Análisis de Planos con IA</h2>
      <p style={{fontSize:12,color:TS,marginTop:2}}>Sube un plano en PDF o imagen y la IA cuantifica automáticamente los trabajos</p>
    </div>

    <div className="card" style={{marginBottom:16}}>
      <SLbl t="📐 Subir Plano o Render"/>
      <p style={{fontSize:12,color:TS,marginBottom:14,lineHeight:1.6}}>
        Sube el plano arquitectónico en <strong>JPG, PNG o PDF</strong>. La IA identificará dimensiones, áreas, perímetros y generará una pre-cuantificación de todos los conceptos de obra. Los resultados son aproximados y deben ser revisados por el residente.
      </p>
      <div className={"drop-zone"+(file?" over":"")} onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleFile(f);}}>
        {file?(
          <div>
            {preview&&file.type.startsWith("image")&&<img src={preview} alt="plano" style={{maxHeight:200,maxWidth:"100%",borderRadius:8,marginBottom:8}}/>}
            <div style={{fontSize:13,color:GD,fontWeight:700}}>📄 {file.name} ({(file.size/1024).toFixed(0)} KB)</div>
            <div style={{fontSize:11,color:TS,marginTop:4}}>Listo para analizar</div>
          </div>
        ):(
          <div>
            <div style={{fontSize:36,marginBottom:8}}>📐</div>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>Arrastra tu plano aquí o toca para seleccionar</div>
            <div style={{fontSize:11,color:TS,marginTop:4}}>JPG, PNG, PDF · Planos arquitectónicos, renders, bocetos</div>
          </div>
        )}
      </div>
      <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>

      {file&&!analyzing&&!result&&(
        <GBtn onClick={analyze} style={{width:"100%",marginTop:14,padding:12,fontSize:14}}>
          🤖 Analizar con IA
        </GBtn>
      )}
      {analyzing&&(
        <div style={{marginTop:14,textAlign:"center",padding:"20px",background:BG,borderRadius:10}}>
          <div style={{fontSize:32,marginBottom:8}}><span className="spin">⟳</span></div>
          <div style={{fontFamily:"Outfit",fontWeight:700,color:N}}>Analizando plano con IA...</div>
          <div style={{fontSize:12,color:TS,marginTop:4}}>Identificando dimensiones, áreas y conceptos de obra</div>
        </div>
      )}
      {error&&<div style={{marginTop:12,padding:"10px 14px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,fontSize:12,color:"#dc2626"}}>⚠️ {error}</div>}
    </div>

    {result&&(
      <div>
        <div className="card" style={{marginBottom:14,border:`1px solid ${result.confianza==="alta"?"#86efac":result.confianza==="media"?"#fcd34d":"#fca5a5"}`,background:result.confianza==="alta"?"#f0fdf4":result.confianza==="media"?"#fef3c7":"#fef2f2"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:15,color:N}}>✅ Análisis completado — {result.conceptos?.length||0} conceptos encontrados</div>
            <span style={{fontSize:10,padding:"3px 10px",borderRadius:10,fontWeight:800,background:result.confianza==="alta"?"#156534":result.confianza==="media"?"#b45309":"#dc2626",color:W}}>
              Confianza: {result.confianza}
            </span>
          </div>
          {result.observaciones&&<div style={{fontSize:12,color:TS,marginBottom:6,lineHeight:1.6}}>📝 {result.observaciones}</div>}
          {result.advertencias&&<div style={{fontSize:11,color:"#b45309",fontStyle:"italic"}}>⚠️ {result.advertencias}</div>}
        </div>

        <div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`,marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 80px 100px 1fr",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
            <span>Concepto</span><span style={{textAlign:"center"}}>Unidad</span><span style={{textAlign:"right"}}>Cantidad</span><span style={{paddingLeft:12}}>Categoría</span>
          </div>
          {(result.conceptos||[]).map((c,idx)=>(
            <div key={idx} style={{display:"grid",gridTemplateColumns:"2fr 80px 100px 1fr",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:N}}>{c.nombre}</div>
                {c.descripcion&&<div style={{fontSize:10,color:G4,marginTop:1}}>{c.descripcion}</div>}
              </div>
              <div style={{textAlign:"center",fontSize:11,color:G4,fontFamily:"DM Mono"}}>{c.unidad}</div>
              <div style={{textAlign:"right",fontSize:14,fontWeight:800,color:GD,fontFamily:"Outfit"}}>{c.cantidad}</div>
              <div style={{paddingLeft:12}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#e8eef8",color:N2,fontWeight:700}}>{c.categoria}</span></div>
            </div>
          ))}
        </div>

        <div style={{padding:"12px 16px",background:GB,border:`1px solid ${GL}44`,borderLeft:`4px solid ${GD}`,borderRadius:9,marginBottom:14,fontSize:12,color:N2,lineHeight:1.6}}>
          💡 <strong>Próximo paso:</strong> Revisa y ajusta las cantidades con el residente o arquitecto. Luego ve al módulo <strong>Cotizador</strong> y agrega estos conceptos con las cantidades corregidas para generar el presupuesto formal.
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <GhBtn onClick={()=>{setFile(null);setPreview(null);setResult(null);}}>Analizar otro plano</GhBtn>
          <GBtn onClick={exportarAlCotizador}>💰 Usar en Cotizador</GBtn>
        </div>
      </div>
    )}
  </div>);
}

  {id:"piso_ceramic", actividad:"Piso cerámico 45×45",         unidad:"m²", rend_ia:12, cuadrilla:2, categoria:"Pisos"},
  {id:"piso_porcel",  actividad:"Piso porcelanato 60×60",      unidad:"m²", rend_ia:10, cuadrilla:2, categoria:"Pisos"},
  {id:"azulejo",      actividad:"Azulejo baño/cocina",         unidad:"m²", rend_ia:8,  cuadrilla:2, categoria:"Pisos"},
  {id:"imperm_manto", actividad:"Manto asfáltico",             unidad:"m²", rend_ia:35, cuadrilla:2, categoria:"Impermeabilización"},
  {id:"imperm_elast", actividad:"Impermeabilizante elast.",    unidad:"m²", rend_ia:50, cuadrilla:2, categoria:"Impermeabilización"},
  {id:"pintura_vin",  actividad:"Pintura vinílica interior",   unidad:"m²", rend_ia:40, cuadrilla:2, categoria:"Pintura"},
  {id:"pintura_ext",  actividad:"Pintura exterior acrílica",   unidad:"m²", rend_ia:35, cuadrilla:2, categoria:"Pintura"},
  {id:"puerta_made",  actividad:"Puerta de madera",            unidad:"pza",rend_ia:3,  cuadrilla:2, categoria:"Carpintería"},
  {id:"ventana_alu",  actividad:"Ventana aluminio",            unidad:"m²", rend_ia:8,  cuadrilla:2, categoria:"Carpintería"},
  {id:"inst_agua_f",  actividad:"Punto agua fría",             unidad:"pto",rend_ia:4,  cuadrilla:1, categoria:"Hidráulico"},
  {id:"inst_drenaje", actividad:"Punto drenaje",               unidad:"pto",rend_ia:3,  cuadrilla:1, categoria:"Hidráulico"},
  {id:"inst_elec",    actividad:"Punto eléctrico",             unidad:"pto",rend_ia:6,  cuadrilla:1, categoria:"Eléctrico"},
  {id:"tablero",      actividad:"Tablero eléctrico",           unidad:"pza",rend_ia:1,  cuadrilla:1, categoria:"Eléctrico"},
  {id:"lam_galv",     actividad:"Cubierta lámina galvanizada", unidad:"m²", rend_ia:25, cuadrilla:3, categoria:"Techos"},
];

/* ══════════════════════════════════════════════════════════
   MÓDULO: GENERADOR DE PROGRAMA CON IA
══════════════════════════════════════════════════════════ */
function ProgramaIA({user,curProj,proyectos,isRes}){
  const [acts,setActs]=useState([]);
  const [projId,setProjId]=useState(curProj?.id||"");
  const [partidas,setPartidas]=useState([]);
  const [rendimientos,setRendimientos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("monty_rendimientos"))||RENDIMIENTOS_BASE;}
    catch{return RENDIMIENTOS_BASE;}
  });
  const [showGenerar,setShowGenerar]=useState(false);
  const [showRendimientos,setShowRendimientos]=useState(false);
  const [generating,setGenerating]=useState(false);
  const [formGen,setFormGen]=useState({fecha_inicio:"",fecha_fin:"",dias_semana:"6",cuadrillas:"2",notas:""});
  const [showF,setShowF]=useState(false);
  const [editA,setEditA]=useState(null);
  const [saving,setSaving]=useState(false);
  const [usuarios,setUsuarios]=useState([]);
  const [editRend,setEditRend]=useState(null);
  const [showEditRend,setShowEditRend]=useState(false);
  const [fotos,setFotos]=useState([]);
  const [analizandoFoto,setAnalizandoFoto]=useState({});
  const fileRef=useRef();

  useEffect(()=>{localStorage.setItem("monty_rendimientos",JSON.stringify(rendimientos));},[rendimientos]);
  useEffect(()=>{SB.get("usuarios","?activo=eq.true&order=nombre").then(d=>setUsuarios(d||[])).catch(()=>{});},[]);
  useEffect(()=>{if(projId){loadActs();loadPartidas();loadFotos();}},[projId]);
  useEffect(()=>{if(curProj?.id)setProjId(curProj.id);},[curProj]);

  const loadActs=async()=>{try{const d=await SB.get("programa_obra",`?proyecto_id=eq.${projId}&order=fecha_inicio`);setActs(d||[]);}catch(e){}};
  const loadPartidas=async()=>{try{const d=await SB.get("partidas",`?proyecto_id=eq.${projId}&order=sort_order`);setPartidas(d||[]);}catch(e){}};
  const loadFotos=async()=>{try{const d=await SB.get("fotos_avance",`?proyecto_id=eq.${projId}&order=created_at.desc&limit=20`);setFotos(d||[]);}catch(e){}};

  const getRend=(actividadName)=>{
    const match=rendimientos.find(r=>actividadName.toLowerCase().includes(r.actividad.toLowerCase().split(" ")[0]));
    return match||{rend_ia:10,cuadrilla:2};
  };

  const generarPrograma=async()=>{
    if(!formGen.fecha_inicio||!formGen.fecha_fin){alert("Ingresa fechas de inicio y entrega.");return;}
    if(!projId){alert("Selecciona un proyecto.");return;}
    setGenerating(true);
    try{
      const rends=rendimientos.map(r=>`${r.actividad}: ${r.rend_ia} ${r.unidad}/día con cuadrilla de ${r.cuadrilla}`).join("
");
      const parts=partidas.length>0
        ?partidas.map(p=>`- ${p.nombre} (${p.cantidad} ${p.unidad})`).join("
")
        :"Sin partidas registradas — usar conceptos generales";

      const prompt=`Proyecto de construcción en Los Mochis, Sinaloa, México.
Fecha de inicio: ${formGen.fecha_inicio}
Fecha de entrega deseada: ${formGen.fecha_fin}
Días de trabajo por semana: ${formGen.dias_semana}
Número de cuadrillas disponibles: ${formGen.cuadrillas}
${formGen.notas?`Notas adicionales: ${formGen.notas}`:""}

PARTIDAS DEL PROYECTO:
${parts}

RENDIMIENTOS MONTY (usar estos primero):
${rends}

Genera un programa de obra realista y optimizado. Considera:
1. Secuencia lógica constructiva (no se puede pintar antes de aplanar, no se puede aplanar antes de tener muros, etc.)
2. Actividades que pueden ir en paralelo
3. Identifica la ruta crítica
4. Si el tiempo no alcanza, indícalo claramente
5. Clima Los Mochis: evitar actividades de concreto en horario 12-16hrs en verano

Responde SOLO con JSON puro sin backticks:
{"actividades":[{"nombre":"nombre actividad","fecha_inicio":"YYYY-MM-DD","fecha_fin":"YYYY-MM-DD","duracion_dias":numero,"descripcion":"descripción","responsable":"residente","estado":"pendiente","color":"#hexcolor","es_ruta_critica":bool,"puede_paralelo_con":["nombre otra actividad"]}],"duracion_total_dias":numero,"fecha_fin_real":"YYYY-MM-DD","alertas":["alerta1","alerta2"],"ruta_critica":["actividad1","actividad2"],"observaciones":"texto"}`;

      const txt=await AI.call(
        "Eres un experto en programación de obra y construcción en México, especialista en Sinaloa. Generas programas de obra realistas basados en rendimientos reales. Respondes solo con JSON válido.",
        prompt,
        4000
      );
      const clean=txt.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);

      // Guardar actividades en Supabase
      let guardadas=0;
      for(const act of parsed.actividades){
        try{
          await SB.post("programa_obra",{
            proyecto_id:projId,
            actividad:act.nombre,
            descripcion:act.descripcion||"",
            fecha_inicio:act.fecha_inicio,
            fecha_fin:act.fecha_fin,
            avance_real:0,
            avance_programado:100,
            estado:act.estado||"pendiente",
            color:act.color||"#1a3d7a",
            sort_order:guardadas,
          });
          guardadas++;
        }catch(e){}
      }

      setShowGenerar(false);
      loadActs();

      // Mostrar resumen
      let msg=`✅ Programa generado con ${guardadas} actividades.

`;
      if(parsed.fecha_fin_real&&parsed.fecha_fin_real!==formGen.fecha_fin){
        msg+=`⚠️ Fecha de entrega ajustada a: ${parsed.fecha_fin_real}
`;
      }
      if(parsed.alertas&&parsed.alertas.length>0){
        msg+=`
🚨 Alertas:
${parsed.alertas.join("
")}`;
      }
      if(parsed.observaciones){msg+=`

📝 ${parsed.observaciones}`;}
      alert(msg);
    }catch(e){alert("Error generando programa: "+e.message);}
    setGenerating(false);
  };

  const analizarFotoConIA=async(foto)=>{
    if(!foto.archivo_url){alert("Esta foto no tiene archivo disponible.");return;}
    setAnalizandoFoto(p=>({...p,[foto.id]:true}));
    try{
      const prompt=`Analiza esta foto de avance de obra de construcción en México.
Las actividades programadas para esta obra son:
${acts.map(a=>`- ${a.actividad} (avance actual: ${a.avance_real||0}%)`).join("
")}

Analiza la foto y determina:
1. Qué actividad constructiva se está ejecutando
2. Estima el porcentaje de avance visual (0-100%)
3. Calidad aparente del trabajo
4. Anomalías o problemas visibles
5. Recomendaciones

Responde SOLO con JSON sin backticks:
{"actividad_detectada":"nombre","porcentaje_avance":numero,"calidad":"buena/regular/deficiente","anomalias":["anomalia1"],"recomendaciones":"texto","confianza":"alta/media/baja"}`;

      const imgResp=await fetch(foto.archivo_url);
      if(!imgResp.ok)throw new Error("No se pudo cargar la imagen");
      const blob=await imgResp.blob();
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(blob);});
      const mimeType=blob.type||"image/jpeg";

      const txt=await AI.callWithImage(
        "Eres un experto en supervisión de obra de construcción en México. Analizas fotos de avance con precisión técnica. Respondes solo con JSON válido.",
        b64,mimeType,prompt,2000
      );
      const clean=txt.replace(/```json|```/g,"").trim();
      const result=JSON.parse(clean);

      // Actualizar avance en la actividad detectada si confianza es alta/media
      if(result.confianza!=="baja"&&result.porcentaje_avance>0){
        const actMatch=acts.find(a=>a.actividad.toLowerCase().includes(result.actividad_detectada?.toLowerCase()?.split(" ")[0]||""));
        if(actMatch&&result.porcentaje_avance>actMatch.avance_real){
          if(confirm(`IA detectó: "${result.actividad_detectada}" con ${result.porcentaje_avance}% de avance.
¿Actualizar el programa automáticamente?`)){
            await SB.patch("programa_obra",actMatch.id,{avance_real:result.porcentaje_avance,estado:result.porcentaje_avance>=100?"completada":"en_proceso",updated_at:new Date().toISOString()});
            loadActs();
          }
        }
      }

      let msg=`🤖 Análisis IA de foto:

`;
      msg+=`📋 Actividad: ${result.actividad_detectada}
`;
      msg+=`📈 Avance estimado: ${result.porcentaje_avance}%
`;
      msg+=`⭐ Calidad: ${result.calidad}
`;
      msg+=`🎯 Confianza: ${result.confianza}
`;
      if(result.anomalias&&result.anomalias.length>0&&result.anomalias[0])msg+=`
⚠️ Anomalías:
${result.anomalias.join("
")}`;
      if(result.recomendaciones)msg+=`

💡 ${result.recomendaciones}`;
      alert(msg);
    }catch(e){alert("Error al analizar foto: "+e.message);}
    setAnalizandoFoto(p=>({...p,[foto.id]:false}));
  };

  const updAvance=async(id,v)=>{
    const estado=v>=100?"completada":v>0?"en_proceso":"pendiente";
    try{await SB.patch("programa_obra",id,{avance_real:v,estado,updated_at:new Date().toISOString()});loadActs();}catch(e){}
  };

  const saveAct=async(f)=>{
    if(!projId||!f.actividad||!f.fecha_inicio||!f.fecha_fin){alert("Completa los campos.");return;}
    setSaving(true);
    try{
      if(editA)await SB.patch("programa_obra",editA.id,{...f,updated_at:new Date().toISOString()});
      else await SB.post("programa_obra",{...f,proyecto_id:projId,avance_real:0,estado:"pendiente"});
      setShowF(false);loadActs();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };

  const saveRendimiento=async()=>{
    if(!editRend)return;
    setRendimientos(prev=>prev.map(r=>r.id===editRend.id?editRend:r));
    setShowEditRend(false);
    setEditRend(null);
    alert("✅ Rendimiento actualizado. La IA usará este valor en el próximo programa generado.");
  };

  // Gantt
  const minD=acts.length?new Date(acts.reduce((m,a)=>a.fecha_inicio<m?a.fecha_inicio:m,acts[0].fecha_inicio)):new Date();
  const maxD=acts.length?new Date(acts.reduce((m,a)=>a.fecha_fin>m?a.fecha_fin:m,acts[0].fecha_fin)):new Date();
  const totalDays=Math.max(1,Math.ceil((maxD-minD)/86400000));
  const bar=a=>{const s=new Date(a.fecha_inicio),e=new Date(a.fecha_fin);return{left:Math.max(0,(s-minD)/86400000/totalDays*100)+"%",width:Math.max(2,(e-s)/86400000/totalDays*100)+"%"};};
  const EC={pendiente:N3,en_proceso:GD,completada:"#156534",retrasada:"#dc2626",cancelada:G4};

  // Curva S data
  const curvaSData=useMemo(()=>{
    if(!acts.length)return{labels:[],prog:[],real:[]};
    const labels=[];const prog=[];const real=[];
    const start=new Date(minD);const end=new Date(maxD);
    const weeks=Math.ceil((end-start)/(7*86400000))+1;
    for(let w=0;w<Math.min(weeks,20);w++){
      const fecha=new Date(start.getTime()+w*7*86400000);
      labels.push(fecha.toLocaleDateString("es-MX",{day:"2-digit",month:"short"}));
      const actsHastaFecha=acts.filter(a=>new Date(a.fecha_inicio)<=fecha);
      const progPct=actsHastaFecha.length>0?(actsHastaFecha.reduce((s,a)=>s+(a.avance_programado||100),0)/acts.length):0;
      const realPct=actsHastaFecha.length>0?(actsHastaFecha.reduce((s,a)=>s+(a.avance_real||0),0)/acts.length):0;
      prog.push(Math.min(100,progPct));
      real.push(Math.min(100,realPct));
    }
    return{labels,prog,real};
  },[acts]);

  const chartRef=useRef(null);
  const chartInstance=useRef(null);
  useEffect(()=>{
    if(!chartRef.current||!curvaSData.labels.length)return;
    if(chartInstance.current)chartInstance.current.destroy();
    chartInstance.current=new Chart(chartRef.current,{
      type:"line",
      data:{
        labels:curvaSData.labels,
        datasets:[
          {label:"Programado",data:curvaSData.prog,borderColor:"#1a5fa8",backgroundColor:"rgba(26,95,168,.1)",tension:.4,fill:true,pointRadius:3},
          {label:"Real",data:curvaSData.real,borderColor:"#b8922a",backgroundColor:"rgba(184,146,42,.1)",tension:.4,fill:true,borderDash:[5,3],pointRadius:3},
        ]
      },
      options:{responsive:true,plugins:{legend:{position:"top"},title:{display:true,text:"Curva S — Avance Programado vs Real",font:{size:13}}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+"%"}}}}
    });
    return()=>{if(chartInstance.current)chartInstance.current.destroy();};
  },[curvaSData]);

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Programa de Obra + IA</h2>
        <p style={{fontSize:12,color:TS,marginTop:2}}>Gantt · Curva S · Análisis de fotos · Rendimientos MONTY</p>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {["directivo","admin_senior"].includes(user.rol)&&<button className="hbtn" onClick={()=>setShowRendimientos(true)}
          style={{background:"#f5f3ff",color:"#7c3aed",border:"1px solid #c4b5fd",padding:"7px 12px",borderRadius:7,fontSize:11,fontWeight:700}}>
          ⚙️ Rendimientos MONTY
        </button>}
        {!isRes&&<button className="hbtn" onClick={()=>setShowGenerar(true)}
          style={{background:`linear-gradient(135deg,#7c3aed,#5b21b6)`,color:W,border:"none",padding:"7px 14px",borderRadius:7,fontSize:11,fontWeight:700}}>
          🤖 Generar con IA
        </button>}
        {!isRes&&<GBtn onClick={()=>{setEditA(null);setShowF(true);}}>＋ Manual</GBtn>}
      </div>
    </div>

    {/* Selector proyecto */}
    {!isRes&&<div style={{marginBottom:14,maxWidth:360}}>
      <Sel label="Proyecto" value={projId} onChange={setProjId}>
        <option value="">— Seleccionar proyecto —</option>
        {proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
      </Sel>
    </div>}

    {/* Stats */}
    {acts.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:16}}>
      <StatCard icon="📅" label="Actividades" value={acts.length} sub={`${acts.filter(a=>a.estado==="completada").length} completadas`} color={N}/>
      <StatCard icon="📈" label="Avance Real" value={`${(acts.reduce((s,a)=>s+(a.avance_real||0),0)/acts.length).toFixed(0)}%`} color={GD} bg={GB}/>
      <StatCard icon="🏗️" label="En Proceso" value={acts.filter(a=>a.estado==="en_proceso").length} color="#0e7490" bg="#ecfeff"/>
      <StatCard icon="⚠️" label="Retrasadas" value={acts.filter(a=>a.estado==="retrasada").length} color="#dc2626" bg="#fef2f2"/>
    </div>}

    {acts.length===0?(
      <div style={{textAlign:"center",padding:"50px",background:W,borderRadius:14,border:`1.5px solid ${BR}`}}>
        <div style={{fontSize:44,marginBottom:12}}>📅</div>
        <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:17,color:N,marginBottom:8}}>Sin programa de obra</div>
        <div style={{fontSize:12,color:TS,marginBottom:16}}>Usa la IA para generar el programa automáticamente o agrégalo manualmente</div>
        {!isRes&&<div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button className="hbtn" onClick={()=>setShowGenerar(true)}
            style={{background:`linear-gradient(135deg,#7c3aed,#5b21b6)`,color:W,border:"none",padding:"10px 20px",borderRadius:8,fontWeight:800,fontSize:13}}>
            🤖 Generar con IA
          </button>
          <GBtn onClick={()=>{setEditA(null);setShowF(true);}}>＋ Agregar manual</GBtn>
        </div>}
      </div>
    ):(
      <div>
        {/* GANTT */}
        <div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`,marginBottom:16,boxShadow:"0 2px 12px rgba(13,34,68,.07)"}}>
          <div style={{padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",display:"flex",justifyContent:"space-between"}}>
            <span>DIAGRAMA DE GANTT</span>
            <span>{fmtD(minD.toISOString().slice(0,10))} — {fmtD(maxD.toISOString().slice(0,10))}</span>
          </div>
          {acts.map((a,idx)=>{
            const{left,width}=bar(a);const rPct=parseFloat(a.avance_real)||0;
            const hoy=new Date();const fFin=new Date(a.fecha_fin);
            const retrasada=fFin<hoy&&rPct<100;
            return(<div key={a.id} style={{display:"flex",alignItems:"center",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
              <div style={{width:180,padding:"7px 12px",flexShrink:0,borderRight:`1px solid ${BR}`}}>
                <div style={{fontSize:11,fontWeight:700,color:retrasada?"#dc2626":N,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{retrasada?"⚠️ ":""}{a.actividad}</div>
                <div style={{fontSize:9,color:G4}}>{fmtD(a.fecha_inicio)} → {fmtD(a.fecha_fin)}</div>
              </div>
              <div style={{flex:1,padding:"7px 8px",position:"relative",height:44,display:"flex",alignItems:"center"}}>
                <div style={{position:"absolute",left:0,right:0,top:"50%",transform:"translateY(-50%)",height:22}}>
                  <div style={{position:"absolute",left,width,top:0,height:"100%",background:retrasada?"#dc2626":(a.color||EC[a.estado]||N3),borderRadius:5,display:"flex",alignItems:"center",padding:"0 6px",overflow:"hidden",fontSize:10,fontWeight:700,color:W}}>
                    {rPct>15?rPct+"%":""}
                  </div>
                  {rPct>0&&<div style={{position:"absolute",left,width:`calc(${width} * ${rPct/100})`,top:0,height:"100%",background:"rgba(255,255,255,.3)",borderRadius:5}}/>}
                </div>
              </div>
              <div style={{width:160,padding:"5px 12px",flexShrink:0,borderLeft:`1px solid ${BR}`}}>
                {isRes?(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min="0" max="100" value={a.avance_real||0}
                      onChange={e=>updAvance(a.id,parseFloat(e.target.value)||0)}
                      style={{width:52,background:BG,border:`1px solid ${BR}`,borderRadius:5,padding:"3px 6px",fontSize:12,textAlign:"center"}}/>
                    <span style={{fontSize:11,color:G4}}>%</span>
                  </div>
                ):(
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <input type="number" min="0" max="100" value={a.avance_real||0}
                        onChange={e=>updAvance(a.id,parseFloat(e.target.value)||0)}
                        style={{width:46,background:BG,border:`1px solid ${BR}`,borderRadius:5,padding:"2px 5px",fontSize:11,textAlign:"center"}}/>
                    </div>
                    <button className="hbtn" onClick={()=>{setEditA(a);setShowF(true);}}
                      style={{fontSize:10,color:AC,background:"#eff4ff",border:`1px solid ${AC}33`,padding:"2px 6px",borderRadius:4}}>✏️</button>
                    <button className="hbtn" onClick={()=>{if(confirm("¿Eliminar?"))SB.del("programa_obra",a.id).then(loadActs).catch(e=>alert(e.message));}}
                      style={{fontSize:10,color:"#dc2626",background:"#fef2f2",border:"1px solid #fca5a5",padding:"2px 6px",borderRadius:4}}>🗑️</button>
                  </div>
                )}
              </div>
            </div>);
          })}
        </div>

        {/* CURVA S */}
        {curvaSData.labels.length>1&&<div className="card" style={{marginBottom:16}}>
          <canvas ref={chartRef} height={80}/>
        </div>}

        {/* ANÁLISIS DE FOTOS CON IA */}
        {fotos.length>0&&<div className="card" style={{marginBottom:16}}>
          <SLbl t="📸 Análisis IA de Fotos de Avance"/>
          <p style={{fontSize:12,color:TS,marginBottom:12}}>La IA analiza las fotos del residente y actualiza automáticamente el avance en el programa de obra.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
            {fotos.slice(0,8).map(foto=>(
              <div key={foto.id} style={{background:OW,borderRadius:9,overflow:"hidden",border:`1px solid ${BR}`}}>
                <img src={foto.archivo_url} alt="avance" style={{width:"100%",height:110,objectFit:"cover",display:"block"}}
                  onError={e=>{e.target.style.background="#e8eef8";e.target.style.height="40px";}}/>
                <div style={{padding:"8px 10px"}}>
                  <div style={{fontSize:10,color:TS,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{foto.descripcion||"Sin descripción"}</div>
                  <button className="hbtn" onClick={()=>analizarFotoConIA(foto)} disabled={analizandoFoto[foto.id]}
                    style={{width:"100%",background:analizandoFoto[foto.id]?BG:`linear-gradient(135deg,#7c3aed,#5b21b6)`,color:analizandoFoto[foto.id]?TS:W,border:"none",borderRadius:6,padding:"5px",fontSize:10,fontWeight:700}}>
                    {analizandoFoto[foto.id]?<span><span className="spin">⟳</span> Analizando...</span>:"🤖 Analizar con IA"}
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>}
      </div>
    )}

    {/* MODAL: Generar con IA */}
    <Modal show={showGenerar} onClose={()=>setShowGenerar(false)} title="🤖 Generar Programa con IA" maxW={580}
      footer={<><GhBtn onClick={()=>setShowGenerar(false)}>Cancelar</GhBtn><button className="hbtn" onClick={generarPrograma} disabled={generating}
        style={{background:`linear-gradient(135deg,#7c3aed,#5b21b6)`,color:W,padding:"9px 20px",borderRadius:8,fontWeight:800,fontSize:13,border:"none",opacity:generating?.6:1}}>
        {generating?<span><span className="spin">⟳</span> Generando...</span>:"🤖 Generar programa"}
      </button></>}>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        <div style={{padding:"12px 14px",background:"#f5f3ff",border:"1px solid #c4b5fd",borderLeft:"4px solid #7c3aed",borderRadius:9,fontSize:12,color:"#5b21b6",lineHeight:1.6}}>
          🤖 La IA analizará las partidas del proyecto y los rendimientos MONTY para generar un programa de obra optimizado. Revisará secuencia constructiva, actividades en paralelo y ruta crítica.
        </div>
        <Sel label="Proyecto *" value={projId} onChange={setProjId}>
          <option value="">— Seleccionar —</option>
          {proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
        </Sel>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Fecha de inicio *" value={formGen.fecha_inicio} onChange={v=>setFormGen(p=>({...p,fecha_inicio:v}))} type="date"/>
          <Inp label="Fecha de entrega deseada *" value={formGen.fecha_fin} onChange={v=>setFormGen(p=>({...p,fecha_fin:v}))} type="date"/>
          <Sel label="Días de trabajo por semana" value={formGen.dias_semana} onChange={v=>setFormGen(p=>({...p,dias_semana:v}))}>
            <option value="5">5 días (Lun-Vie)</option>
            <option value="6">6 días (Lun-Sáb)</option>
            <option value="7">7 días (todos)</option>
          </Sel>
          <Inp label="Número de cuadrillas" value={formGen.cuadrillas} onChange={v=>setFormGen(p=>({...p,cuadrillas:v}))} type="number" placeholder="2"/>
        </div>
        <TA label="Notas adicionales para la IA (opcional)" value={formGen.notas} onChange={v=>setFormGen(p=>({...p,notas:v}))}
          placeholder="Ej: El cliente necesita la primera planta lista en 60 días. Hay restricciones de horario 7am-6pm..." rows={2}/>
        {partidas.length===0&&<div style={{padding:"10px 14px",background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:8,fontSize:11,color:"#b45309"}}>
          ⚠️ Este proyecto no tiene partidas registradas en Control de Obra. La IA generará un programa general. Para mayor precisión, agrega las partidas primero.
        </div>}
      </div>
    </Modal>

    {/* MODAL: Rendimientos MONTY */}
    <Modal show={showRendimientos} onClose={()=>setShowRendimientos(false)} title="⚙️ Rendimientos MONTY — Base de Conocimiento" maxW={800}
      footer={<GhBtn onClick={()=>setShowRendimientos(false)}>Cerrar</GhBtn>}>
      <div>
        <div style={{padding:"10px 14px",background:"#f5f3ff",border:"1px solid #c4b5fd",borderLeft:"4px solid #7c3aed",borderRadius:9,fontSize:12,color:"#5b21b6",lineHeight:1.6,marginBottom:14}}>
          🧠 Estos son los rendimientos que la IA usa para generar programas de obra. Ajústalos a la realidad de MONTY en Los Mochis para mejorar la precisión. Solo administradores pueden editarlos.
        </div>
        <div style={{background:W,borderRadius:12,overflow:"hidden",border:`1.5px solid ${BR}`}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 80px 100px 100px 80px",padding:"8px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
            <span>Actividad</span><span style={{textAlign:"center"}}>Unidad</span><span style={{textAlign:"center"}}>Rend. IA base</span><span style={{textAlign:"center"}}>Cuadrilla</span><span style={{textAlign:"center"}}>Editar</span>
          </div>
          {rendimientos.map((r,idx)=>(
            <div key={r.id} style={{display:"grid",gridTemplateColumns:"2fr 80px 100px 100px 80px",alignItems:"center",padding:"9px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:N}}>{r.actividad}</div>
                <div style={{fontSize:9,color:G4}}>{r.categoria}</div>
              </div>
              <div style={{textAlign:"center",fontSize:11,color:G4,fontFamily:"DM Mono"}}>{r.unidad}/día</div>
              <div style={{textAlign:"center"}}>
                <span style={{fontSize:13,fontWeight:800,color:GD,fontFamily:"Outfit"}}>{r.rend_ia}</span>
                <span style={{fontSize:9,color:G4,marginLeft:2}}>{r.unidad}/día</span>
              </div>
              <div style={{textAlign:"center",fontSize:11,color:TS}}>{r.cuadrilla} personas</div>
              <div style={{textAlign:"center"}}>
                <button className="hbtn" onClick={()=>{setEditRend({...r});setShowEditRend(true);}}
                  style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:5,padding:"3px 8px",fontSize:11}}>✏️</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </Modal>

    {/* MODAL: Editar rendimiento */}
    <Modal show={showEditRend&&!!editRend} onClose={()=>{setShowEditRend(false);setEditRend(null);}}
      title={`✏️ Editar Rendimiento: ${editRend?.actividad||""}`} maxW={480}
      footer={<><GhBtn onClick={()=>{setShowEditRend(false);setEditRend(null);}}>Cancelar</GhBtn><GBtn onClick={saveRendimiento}>✅ Guardar rendimiento</GBtn></>}>
      {editRend&&<div style={{display:"flex",flexDirection:"column",gap:13}}>
        <div style={{padding:"10px 14px",background:GB,border:`1px solid ${GL}44`,borderLeft:`4px solid ${GD}`,borderRadius:9,fontSize:12,color:N2,lineHeight:1.6}}>
          💡 Ajusta este rendimiento a la realidad de tus cuadrillas en Los Mochis. La IA lo usará en los próximos programas generados.
        </div>
        <Inp label="Actividad" value={editRend.actividad} onChange={v=>setEditRend(p=>({...p,actividad:v}))} disabled/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={`Rendimiento (${editRend.unidad}/día) *`} value={String(editRend.rend_ia)} onChange={v=>setEditRend(p=>({...p,rend_ia:parseFloat(v)||0}))} type="number"
            placeholder={`IA base: ${editRend.rend_ia}`}/>
          <Inp label="Cuadrilla (personas)" value={String(editRend.cuadrilla)} onChange={v=>setEditRend(p=>({...p,cuadrilla:parseInt(v)||1}))} type="number"/>
        </div>
        <div style={{padding:"10px 14px",background:BG,borderRadius:8,fontSize:12,color:TS}}>
          <strong>Rendimiento actual IA:</strong> {editRend.rend_ia} {editRend.unidad}/día con {editRend.cuadrilla} personas
        </div>
      </div>}
    </Modal>

    {/* MODAL: Nueva actividad manual */}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editA?"✏️ Editar Actividad":"📅 Nueva Actividad"} maxW={560}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={()=>{const f={proyecto_id:projId,actividad:editA?editA.actividad:"",descripcion:"",fecha_inicio:"",fecha_fin:"",color:"#1a3d7a",...(editA||{})};saveAct(f);}} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      {/* Simple form inline */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Inp label="Nombre de la actividad *" value={editA?.actividad||""} onChange={v=>setEditA(p=>({...p,actividad:v}))} placeholder="Ej: Cimentación"/>
        <TA label="Descripción" value={editA?.descripcion||""} onChange={v=>setEditA(p=>({...p,descripcion:v}))} rows={2}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Fecha inicio *" value={editA?.fecha_inicio||""} onChange={v=>setEditA(p=>({...p,fecha_inicio:v}))} type="date"/>
          <Inp label="Fecha término *" value={editA?.fecha_fin||""} onChange={v=>setEditA(p=>({...p,fecha_fin:v}))} type="date"/>
          <Sel label="Responsable" value={editA?.responsable_id||""} onChange={v=>setEditA(p=>({...p,responsable_id:v}))}>
            <option value="">— Sin asignar —</option>
            {usuarios.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
          </Sel>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,fontWeight:700,color:TS}}>Color en Gantt</label>
            <input type="color" value={editA?.color||"#1a3d7a"} onChange={e=>setEditA(p=>({...p,color:e.target.value}))} style={{...iS,padding:4,height:42,cursor:"pointer"}}/>
          </div>
        </div>
      </div>
    </Modal>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
