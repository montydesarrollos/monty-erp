/* ══ CONTROL DE OBRA ════════════════════════════════════════ */
function ControlObra({user,curProj,proyectos,reload}){
  const [partidas,setPartidas]=useState([]);
  const [compras,setCompras]=useState([]);
  const [nominas,setNominas]=useState([]);
  const [loading,setLoading]=useState(false);
  const [showF,setShowF]=useState(false);
  const [saving,setSaving]=useState(false);
  const [projId,setProjId]=useState((curProj&&curProj.id)||"");

  const [editPart,setEditPart]=useState(null);
  const emptyF={categoria:"",nombre:"",unidad:"m²",cantidad:"",precio_unitario:"",tipo_mo:"jornal"};
  const [f,setF]=useState(emptyF);
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{if((curProj&&curProj.id))load();},[curProj]);
  const load=async()=>{
    if(!(curProj&&curProj.id))return;
    setLoading(true);
    try{
      const [p,c,n]=await Promise.all([
        SB.get("partidas",`?proyecto_id=eq.${curProj.id}&order=sort_order`),
        SB.get("compras",`?proyecto_id=eq.${curProj.id}`),
        SB.get("nominas",`?proyecto_id=eq.${curProj.id}`),
      ]);
      setPartidas(p||[]);setCompras(c||[]);setNominas(n||[]);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const savePart=async()=>{
    if(!(curProj&&curProj.id)||!f.nombre.trim()){alert("Selecciona proyecto y nombre.");return;}
    setSaving(true);
    try{
      const payload={...f,proyecto_id:curProj.id,cantidad:parseFloat(f.cantidad)||0,precio_unitario:parseFloat(f.precio_unitario)||0};
      if(editPart)await SB.patch("partidas",editPart.id,payload);
      else await SB.post("partidas",payload);
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };

  const updAvance=async(id,val)=>{
    try{await SB.patch("partidas",id,{avance_qty:parseFloat(val)||0,updated_at:new Date().toISOString()});load();}catch(e){}
  };

  if(!curProj)return<div style={{textAlign:"center",padding:"50px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:40,marginBottom:10}}>📈</div><div style={{fontWeight:700,color:N}}>Selecciona una obra en el menú superior</div></div>;

  const totalPres=partidas.reduce((s,p)=>s+(p.cantidad||0)*(p.precio_unitario||0),0);
  const totalGasto=(compras.reduce((s,c)=>s+(c.monto_total||0),0))+(nominas.reduce((s,n)=>s+(n.monto_total||0),0));
  const CATS=[...new Set(partidas.map(p=>p.categoria))];

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Control de Obra · {curProj.nombre}</h2><p style={{fontSize:12,color:TS,marginTop:2}}>Presupuesto vs gasto real por partida</p></div>
      <GBtn onClick={()=>{setEditPart(null);setF(emptyF);setShowF(true);}}>＋ Agregar partida</GBtn>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:18}}>
      <StatCard icon="💰" label="Presupuesto obra" value={`$${fmtM(totalPres)}`} color={GD} bg={GB}/>
      <StatCard icon="🧾" label="Gasto real" value={`$${fmtM(totalGasto)}`} color="#156534" bg="#f0fdf4"/>
      <StatCard icon="📊" label="Saldo" value={`$${fmtM(totalPres-totalGasto)}`} color={AC} bg="#eff4ff"/>
      <StatCard icon="📈" label="% Ejercido" value={pct(totalGasto,totalPres)+"%"} color={parseFloat(pct(totalGasto,totalPres))>90?"#dc2626":N}/>
    </div>
    {loading?<div style={{textAlign:"center",padding:30,color:TS}}><span className="spin">⟳</span> Cargando...</div>
    :partidas.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div style={{fontWeight:700,color:N,marginBottom:12}}>Sin partidas — agrega las partidas del presupuesto</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`,boxShadow:"0 2px 12px rgba(13,34,68,.07)"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 70px 90px 100px 100px 110px 80px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Concepto</span><span style={{textAlign:"center"}}>Unid.</span><span style={{textAlign:"center"}}>Cantidad</span>
        <span style={{textAlign:"right"}}>Presupuesto</span><span style={{textAlign:"right"}}>Ejercido</span><span style={{textAlign:"right"}}>% Ejercido</span><span style={{textAlign:"center"}}>Acc.</span>
      </div>
      {CATS.map(cat=>{
        const ci=partidas.filter(p=>p.categoria===cat);if(!ci.length)return null;
        const catPres=ci.reduce((s,p)=>s+(p.cantidad||0)*(p.precio_unitario||0),0);
        const catEj=ci.reduce((s,p)=>s+(p.monto_ejercido||0),0);
        return(<div key={cat}>
          <div style={{padding:"6px 14px",background:"#e8eef8",fontSize:9,fontWeight:800,color:N2,letterSpacing:.8,textTransform:"uppercase",borderTop:`1px solid ${BR}`,display:"flex",justifyContent:"space-between"}}>
            <span>▸ {cat}</span><span style={{fontFamily:"DM Mono"}}>Pres: ${fmtM(catPres)} · Ej: ${fmtM(catEj)}</span>
          </div>
          {ci.map((item,idx)=>{
            const pres=(item.cantidad||0)*(item.precio_unitario||0);
            const ej=item.monto_ejercido||0;
            const ejPct=pct(ej,pres);
            return(<div key={item.id} style={{display:"grid",gridTemplateColumns:"2fr 70px 90px 100px 100px 110px 80px",alignItems:"center",padding:"9px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
              <div><div style={{fontSize:12,fontWeight:600,color:N}}>{item.nombre}</div><div style={{fontSize:9,color:G4}}>{item.tipo_mo==="destajo"?"⚡ destajo":"📅 jornal"}</div></div>
              <div style={{textAlign:"center",fontSize:11,color:G4,fontFamily:"DM Mono"}}>{item.unidad}</div>
              <div style={{textAlign:"center",fontSize:11,fontFamily:"DM Mono"}}>{item.cantidad}</div>
              <div style={{textAlign:"right",fontSize:12,fontWeight:700,color:GD,fontFamily:"Outfit"}}>$ {fmtM(pres)}</div>
              <div style={{textAlign:"right",fontSize:12,fontWeight:700,color:"#156534",fontFamily:"Outfit"}}>$ {fmtM(ej)}</div>
              <div style={{padding:"0 8px"}}><Sem v={ejPct}/></div>
              <div style={{textAlign:"center",display:"flex",gap:4,justifyContent:"center"}}>
                <button className="hbtn" onClick={()=>{setEditPart(item);setF({...emptyF,...item,cantidad:String(item.cantidad||""),precio_unitario:String(item.precio_unitario||"")});setShowF(true);}} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:5,padding:"3px 7px",fontSize:10}}>✏️</button>
                <button className="hbtn" onClick={()=>{if(confirm("¿Eliminar partida?"))SB.del("partidas",item.id).then(load).catch(e=>alert(e.message));}} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:5,padding:"3px 7px",fontSize:10}}>🗑️</button>
              </div>
            </div>);
          })}
        </div>);
      })}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editPart?"✏️ Editar Partida":"📋 Nueva Partida"} maxW={560}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={savePart} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Categoría" value={f.categoria} onChange={v=>sf("categoria",v)} placeholder="Ej: Cimentación, Muros..."/>
          <Sel label="Unidad" value={f.unidad} onChange={v=>sf("unidad",v)}>
            {["m²","m³","ml","kg","pto","pza","hr","saco","ton"].map(u=><option key={u}>{u}</option>)}
          </Sel>
        </div>
        <Inp label="Nombre de la partida *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Ej: Colado concreto f c=200 kg/cm²"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <Inp label="Cantidad" value={f.cantidad} onChange={v=>sf("cantidad",v)} type="number" placeholder="0"/>
          <Inp label="Precio unitario ($)" value={f.precio_unitario} onChange={v=>sf("precio_unitario",v)} type="number" placeholder="0.00"/>
          <Sel label="Tipo MO" value={f.tipo_mo} onChange={v=>sf("tipo_mo",v)}>
            <option value="jornal">📅 Jornal</option>
            <option value="destajo">⚡ Destajo</option>
          </Sel>
        </div>
        {f.cantidad&&f.precio_unitario&&<div style={{padding:"10px 14px",background:GB,border:`1px solid ${GL}44`,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:N2,fontWeight:700}}>Total partida</span>
          <span style={{fontSize:15,fontWeight:900,color:GD,fontFamily:"Outfit"}}>$ {fmt((parseFloat(f.cantidad)||0)*(parseFloat(f.precio_unitario)||0))}</span>
        </div>}
      </div>
    </Modal>
  </div>);
}

/* ══ PRESUPUESTOS ═══════════════════════════════════════════ */
function Presupuestos({user}){
  const [pres,setPres]=useState([]);const [loading,setLoading]=useState(true);
  useEffect(()=>{SB.get("presupuestos","?order=created_at.desc").then(d=>{setPres(d||[]);setLoading(false);}).catch(()=>setLoading(false));},[]);
  const SC={borrador:{c:G4,bg:"#e8eef8"},enviado:{c:AC,bg:"#eff4ff"},en_espera:{c:"#b45309",bg:"#fef3c7"},aprobado:{c:"#156534",bg:"#f0fdf4"},cancelado:{c:"#dc2626",bg:"#fef2f2"}};
  const setStatus=async(id,status)=>{try{await SB.patch("presupuestos",id,{status,updated_at:new Date().toISOString()});setPres(p=>p.map(x=>x.id===id?{...x,status}:x));}catch(e){alert(e.message);}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Presupuestos</h2><p style={{fontSize:12,color:TS,marginTop:2}}>Cotizaciones guardadas en la nube</p></div></div>
    {loading?<div style={{textAlign:"center",padding:30}}><span className="spin">⟳</span></div>:pres.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:40,marginBottom:10}}>💰</div><div style={{fontWeight:700,color:N}}>Sin presupuestos aún</div><div style={{fontSize:12,color:TS,marginTop:6}}>Los presupuestos del Cotizador aparecerán aquí al guardarse.</div></div>
    :<div style={{display:"flex",flexDirection:"column",gap:10}}>{pres.map(p=>{const sc=SC[p.status]||SC.borrador;return(<div key={p.id} className="card fi">
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div><div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>{p.nombre_obra||"Sin nombre"}</div><div style={{fontSize:11,color:TS,marginTop:2}}>👤 {p.cliente_nombre||"—"} · 📍 {p.obra_ciudad||"—"} · {p.obra_tipo||"—"}</div><div style={{fontSize:10,color:G4,marginTop:2}}>📅 {fmtD(p.created_at)} · {p.created_by||"—"}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:900,color:GD,fontFamily:"Outfit"}}>$ {fmt(p.total)}</div><span style={{fontSize:10,padding:"2px 9px",borderRadius:10,fontWeight:700,background:sc.bg,color:sc.c}}>{p.status}</span></div>
      </div>
      <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
        {Object.entries(SC).filter(([k])=>k!==p.status).map(([k,v])=>(
          <button key={k} className="hbtn" onClick={()=>setStatus(p.id,k)} style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:v.bg,color:v.c,border:`1px solid ${v.c}33`}}>{k}</button>
        ))}
      </div>
    </div>);})}
    </div>}
  </div>);
}

/* ══ REQUISICIONES ══════════════════════════════════════════ */
function Requisiciones({user,curProj,proyectos,isRes}){
  const [reqs,setReqs]=useState([]);const [projId,setProjId]=useState((curProj&&curProj.id)||"");
  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);
  const [f,setF]=useState({proyecto_id:"",urgente:false,notas:"",items:[{nombre_material:"",unidad:"pza",cantidad_solicitada:""}]});
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if((curProj&&curProj.id))setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("requisiciones",`?proyecto_id=eq.${projId}&order=created_at.desc`);setReqs(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id){alert("Selecciona proyecto.");return;}
    if(f.items.every(i=>!i.nombre_material.trim())){alert("Agrega al menos un material.");return;}
    setSaving(true);
    try{
      const folio="REQ-"+Date.now().toString().slice(-6);
      const [req]=await SB.post("requisiciones",{proyecto_id:f.proyecto_id,folio,urgente:f.urgente,notas:f.notas,estado:"pendiente",solicitado_por:user.id});
      const items=f.items.filter(i=>i.nombre_material.trim()).map(i=>({...i,requisicion_id:req.id,cantidad_solicitada:parseFloat(i.cantidad_solicitada)||0}));
      if(items.length)await SB.post("requisicion_items",items);
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const cambiar=async(id,estado)=>{try{await SB.patch("requisiciones",id,{estado,updated_at:new Date().toISOString()});load();}catch(e){alert(e.message);}};
  const addItem=()=>setF(p=>({...p,items:[...p.items,{nombre_material:"",unidad:"pza",cantidad_solicitada:""}]}));
  const setItem=(idx,k,v)=>setF(p=>{const it=[...p.items];it[idx]={...it[idx],[k]:v};return{...p,items:it};});
  const SC={pendiente:{c:"#b45309",bg:"#fef3c7"},aprobada:{c:"#156534",bg:"#f0fdf4"},rechazada:{c:"#dc2626",bg:"#fef2f2"},surtida:{c:AC,bg:"#eff4ff"}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Requisiciones</h2></div><GBtn onClick={()=>{setF({proyecto_id:projId||"",urgente:false,notas:"",items:[{nombre_material:"",unidad:"pza",cantidad_solicitada:""}]});setShowF(true);}}>＋ Nueva</GBtn></div>
    {!isRes&&<div style={{marginBottom:14,maxWidth:360}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>}
    {reqs.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>🛒</div><div style={{fontWeight:700,color:N}}>Sin requisiciones</div></div>
    :<div style={{display:"flex",flexDirection:"column",gap:10}}>{reqs.map(r=>{const sc=SC[r.estado]||SC.pendiente;return(<div key={r.id} className="card fi">
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div><div style={{fontFamily:"Outfit",fontWeight:700,fontSize:14,color:N}}>📋 {r.folio}</div><div style={{fontSize:11,color:TS,marginTop:2}}>{fmtD(r.fecha)} {r.urgente&&<span style={{color:"#dc2626",fontWeight:700,marginLeft:6}}>🚨 URGENTE</span>}</div>{r.notas&&<div style={{fontSize:11,color:G4,fontStyle:"italic",marginTop:2}}>{r.notas}</div>}</div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>

/* ══ COMPRAS ════════════════════════════════════════════════ */
function Compras({user,curProj,proyectos,reload}){
  const [compras,setCompras]=useState([]);const [projId,setProjId]=useState((curProj&&curProj.id)||"");
  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);const [uploading,setUploading]=useState(false);
  const [f,setF]=useState({proyecto_id:"",folio_factura:"",proveedor:"",fecha_compra:new Date().toISOString().slice(0,10),monto_total:"",iva:"",tipo_documento:"factura",categoria:"",notas:""});
  const [file,setFile]=useState(null);const fileRef=useRef();
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if((curProj&&curProj.id))setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("compras",`?proyecto_id=eq.${projId}&order=created_at.desc`);setCompras(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.monto_total){alert("Proyecto y monto son obligatorios.");return;}
    setSaving(true);
    try{
      let archivo_url=null,archivo_nombre=null;
      if(file){setUploading(true);try{const path=`${f.proyecto_id}/${Date.now()}_${file.name}`;archivo_url=await SB.upload("facturas",path,file);archivo_nombre=file.name;}catch(e){console.warn(e.message);}setUploading(false);}
      const monto=parseFloat(f.monto_total)||0,iva=parseFloat(f.iva)||0;
      await SB.post("compras",{...f,monto_total:monto,iva,monto_sin_iva:monto-iva,archivo_url,archivo_nombre,registrado_por:user.id});
      // Update gasto real
      const proj=proyectos.find(p=>p.id===f.proyecto_id);

      setShowF(false);setFile(null);load();if(reload)reload();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);

      {projId&&<StatCard icon="🧾" label="Total compras" value={`$${fmtM(totalC)}`} sub={`${compras.length} registros`} color={GD} bg={GB}/>}
    </div>
    {compras.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>🧾</div><div style={{fontWeight:700,color:N}}>Sin compras registradas</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px 120px 70px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Proveedor / Folio</span><span>Categoría</span><span style={{textAlign:"center"}}>Fecha</span><span style={{textAlign:"right"}}>Monto</span><span style={{textAlign:"center"}}>Doc.</span>
      </div>
      {compras.map((c,idx)=>(
        <div key={c.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px 120px 70px",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
          <div><div style={{fontSize:12,fontWeight:600,color:N}}>{c.proveedor||"—"}</div><div style={{fontSize:10,color:G4}}>{c.folio_factura||"—"} · {c.tipo_documento}</div></div>
          <div style={{fontSize:11,color:TS}}>{c.categoria||"—"}</div>
          <div style={{textAlign:"center",fontSize:10,color:G4}}>{fmtD(c.fecha_compra)}</div>
          <div style={{textAlign:"right",fontSize:13,fontWeight:800,color:GD,fontFamily:"Outfit"}}>$ {fmt(c.monto_total)}</div>

        </div>
      ))}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="🧾 Registrar Compra / Factura" maxW={620}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving||uploading}>{saving?"Guardando...":(uploading?"Subiendo archivo...":"✅ Registrar")}</GBtn></>}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Proveedor" value={f.proveedor} onChange={v=>sf("proveedor",v)} placeholder="Nombre del proveedor"/>
          <Inp label="Folio de factura" value={f.folio_factura} onChange={v=>sf("folio_factura",v)} placeholder="A-00123"/>
          <Sel label="Tipo documento" value={f.tipo_documento} onChange={v=>sf("tipo_documento",v)}><option value="factura">Factura</option><option value="nota">Nota de compra</option><option value="recibo">Recibo</option><option value="otro">Otro</option></Sel>
          <Sel label="Categoría de partida" value={f.categoria} onChange={v=>sf("categoria",v)}><option value="">— Seleccionar —</option>{["Concreto","Acero","Block/Tabique","Carpintería","Herrería","Pintura","Hidráulico","Eléctrico","Impermeabilizante","Acabados","Decoración","Herramienta","Otro"].map(c=><option key={c}>{c}</option>)}</Sel>
          <Inp label="Monto total ($MXN) *" value={f.monto_total} onChange={v=>sf("monto_total",v)} type="number" placeholder="0.00"/>
          <Inp label="IVA ($MXN)" value={f.iva} onChange={v=>sf("iva",v)} type="number" placeholder="0.00"/>

          <div className="drop-zone" onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:"14px"}}>{file?<div style={{fontSize:12,color:GD,fontWeight:700}}>📄 {file.name}</div>:<div style={{fontSize:12,color:TS}}>Arrastra o toca para subir factura/nota</div>}</div>

  </div>);

  const setT=(idx,k,v)=>setF(p=>{const t=[...p.trabajadores];t[idx]={...t[idx],[k]:v};return{...p,trabajadores:t};});
  const calcT=()=>f.trabajadores.reduce((s,t)=>s+(parseFloat(t.dias_trabajados)||0)*(parseFloat(t.jornal_diario)||0)+(parseFloat(t.destajo_monto)||0),0);
  const save=async()=>{
    if(!f.proyecto_id||!f.semana){alert("Completa los campos obligatorios.");return;}

      let archivo_url=null,archivo_nombre=null;

      const monto=parseFloat(f.monto_total)||calcT();
      const [nom]=await SB.post("nominas",{...f,monto_total:monto,num_trabajadores:f.trabajadores.filter(t=>t.nombre.trim()).length,archivo_url,archivo_nombre,registrado_por:user.id});

      if(trabs.length)await SB.post("nomina_trabajadores",trabs);

    {nominas.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>👷</div><div style={{fontWeight:700,color:N}}>Sin nóminas registradas</div></div>

        <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:900,color:"#156534",fontFamily:"Outfit"}}>$ {fmt(n.monto_total)}</div>{n.archivo_url&&<a href={n.archivo_url} target="_blank" style={{fontSize:11,color:AC,textDecoration:"none"}}>📄 Ver</a>}</div>

          <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>

/* ══ PROGRAMA DE OBRA (GANTT) ═══════════════════════════════ */
function Programa({user,curProj,proyectos,isRes}){
  const [acts,setActs]=useState([]);const [projId,setProjId]=useState((curProj&&curProj.id)||"");
  const [showF,setShowF]=useState(false);const [editA,setEditA]=useState(null);const [saving,setSaving]=useState(false);
  const [usuarios,setUsuarios]=useState([]);
  const emptyF={proyecto_id:"",actividad:"",descripcion:"",fecha_inicio:"",fecha_fin:"",responsable_id:"",color:"#1a3d7a"};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{SB.get("usuarios","?activo=eq.true&order=nombre").then(d=>setUsuarios(d||[])).catch(()=>{});},[]);
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if((curProj&&curProj.id))setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("programa_obra",`?proyecto_id=eq.${projId}&order=fecha_inicio`);setActs(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.actividad||!f.fecha_inicio||!f.fecha_fin){alert("Completa los campos obligatorios.");return;}
    setSaving(true);
    try{
      if(editA)await SB.patch("programa_obra",editA.id,{...f,updated_at:new Date().toISOString()});
      else await SB.post("programa_obra",{...f,avance_real:0,estado:"pendiente"});
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const updAvance=async(id,v)=>{const estado=v>=100?"completada":v>0?"en_proceso":"pendiente";try{await SB.patch("programa_obra",id,{avance_real:v,estado,updated_at:new Date().toISOString()});load();}catch(e){}};
  const minD=acts.length?new Date(acts.reduce((m,a)=>a.fecha_inicio<m?a.fecha_inicio:m,acts[0].fecha_inicio)):new Date();
  const maxD=acts.length?new Date(acts.reduce((m,a)=>a.fecha_fin>m?a.fecha_fin:m,acts[0].fecha_fin)):new Date();
  const total=Math.max(1,Math.ceil((maxD-minD)/(86400000)));
  const bar=a=>{const s=new Date(a.fecha_inicio),e=new Date(a.fecha_fin);return{left:Math.max(0,(s-minD)/86400000/total*100)+"%",width:Math.max(2,(e-s)/86400000/total*100)+"%"};};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Programa de Obra</h2></div>{!isRes&&<GBtn onClick={()=>{setEditA(null);setF({...emptyF,proyecto_id:projId||""});setShowF(true);}}>＋ Nueva actividad</GBtn>}</div>
    {!isRes&&<div style={{marginBottom:14,maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>}
    {acts.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>📅</div><div style={{fontWeight:700,color:N}}>Sin actividades programadas</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`}}>
      <div style={{padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",display:"flex",justifyContent:"space-between"}}>
        <span>DIAGRAMA DE GANTT</span><span>{fmtD(minD.toISOString().slice(0,10))} — {fmtD(maxD.toISOString().slice(0,10))}</span>
      </div>
      {acts.map((a,idx)=>{
        const {left,width}=bar(a);const rPct=parseFloat(a.avance_real)||0;
        const ec={pendiente:N3,en_proceso:GD,completada:"#156534",retrasada:"#dc2626",cancelada:G4};
        return(<div key={a.id} style={{display:"flex",alignItems:"center",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
          <div style={{width:200,padding:"8px 12px",flexShrink:0,borderRight:`1px solid ${BR}`}}>
            <div style={{fontSize:11,fontWeight:700,color:N,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.actividad}</div>
            <div style={{fontSize:9,color:G4}}>{fmtD(a.fecha_inicio)} → {fmtD(a.fecha_fin)}</div>
          </div>
          <div style={{flex:1,padding:"8px 8px",position:"relative",height:46,display:"flex",alignItems:"center"}}>
            <div style={{position:"absolute",left:0,right:0,top:"50%",transform:"translateY(-50%)",height:22}}>
              <div className="gantt-bar" style={{position:"absolute",left,width,background:a.color||ec[a.estado]||N3}}>{rPct>10?rPct+"%":""}</div>
              {rPct>0&&<div style={{position:"absolute",left,width:`calc(${width} * ${rPct/100})`,top:0,height:22,background:"rgba(255,255,255,.25)",borderRadius:5}}/>}
            </div>
          </div>
          <div style={{width:140,padding:"6px 12px",flexShrink:0,borderLeft:`1px solid ${BR}`}}>
            {isRes?(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="number" min="0" max="100" value={a.avance_real||0} onChange={e=>updAvance(a.id,parseFloat(e.target.value)||0)}
                  style={{width:52,background:BG,border:`1px solid ${BR}`,borderRadius:5,padding:"3px 6px",fontSize:12,textAlign:"center"}}/>
                <span style={{fontSize:11,color:G4}}>%</span>
              </div>
            ):(
              <div style={{display:"flex",gap:5}}>
                <button className="hbtn" onClick={()=>{setEditA(a);setF({...emptyF,...a});setShowF(true);}} style={{fontSize:10,color:AC,background:"#eff4ff",border:`1px solid ${AC}33`,padding:"3px 7px",borderRadius:5}}>✏️</button>
                <button className="hbtn" onClick={()=>{if(confirm("¿Eliminar?"))SB.del("programa_obra",a.id).then(load).catch(e=>alert(e.message));}} style={{fontSize:10,color:"#dc2626",background:"#fef2f2",border:"1px solid #fca5a5",padding:"3px 7px",borderRadius:5}}>🗑️</button>
              </div>
            )}
          </div>
        </div>);
      })}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editA?"✏️ Editar Actividad":"📅 Nueva Actividad"} maxW={560}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
        <Inp label="Nombre de la actividad *" value={f.actividad} onChange={v=>sf("actividad",v)} placeholder="Ej: Cimentación, Estructura, Muros..."/>
        <TA label="Descripción" value={f.descripcion} onChange={v=>sf("descripcion",v)} rows={2}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Fecha inicio *" value={f.fecha_inicio} onChange={v=>sf("fecha_inicio",v)} type="date"/>
          <Inp label="Fecha término *" value={f.fecha_fin} onChange={v=>sf("fecha_fin",v)} type="date"/>
          <Sel label="Responsable" value={f.responsable_id} onChange={v=>sf("responsable_id",v)}><option value="">— Sin asignar —</option>{usuarios.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}</Sel>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:11,fontWeight:700,color:TS}}>Color en Gantt</label><input type="color" value={f.color||"#1a3d7a"} onChange={e=>sf("color",e.target.value)} style={{...iS,padding:4,height:42,cursor:"pointer"}}/></div>
        </div>
      </div>
    </Modal>
  </div>);
}

/* ══ BITÁCORA ═══════════════════════════════════════════════ */
function Bitacora({user,curProj,proyectos,isRes}){
  const [entradas,setEntradas]=useState([]);const [projId,setProjId]=useState((curProj&&curProj.id)||"");
  const [showF,setShowF]=useState(false);const [saving,setSaving]=useState(false);const [files,setFiles]=useState([]);const fileRef=useRef();
  const emptyF={proyecto_id:"",tipo:"general",titulo:"",descripcion:"",clima:"",personal_presente:""};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const TIPOS=["general","avance","anomalia","contratiempo","visita","clima","seguridad","otro"];
  const TC={general:{c:N,bg:"#e8eef8"},avance:{c:"#156534",bg:"#f0fdf4"},anomalia:{c:"#dc2626",bg:"#fef2f2"},contratiempo:{c:"#b45309",bg:"#fef3c7"},visita:{c:AC,bg:"#eff4ff"},clima:{c:"#0e7490",bg:"#ecfeff"},seguridad:{c:"#7c3aed",bg:"#f5f3ff"},otro:{c:G4,bg:BG}};
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if((curProj&&curProj.id))setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("bitacora",`?proyecto_id=eq.${projId}&order=created_at.desc`);setEntradas(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.titulo.trim()){alert("Proyecto y título son obligatorios.");return;}
    setSaving(true);
    try{
      const [entrada]=await SB.post("bitacora",{...f,personal_presente:parseInt(f.personal_presente)||0,registrado_por:user.id});
      for(const fi of files){try{const path=`${f.proyecto_id}/${Date.now()}_${fi.name}`;const url=await SB.upload("bitacora",path,fi);await SB.post("bitacora_archivos",{bitacora_id:entrada.id,archivo_url:url,archivo_nombre:fi.name,tipo_archivo:fi.type.startsWith("image")?"foto":"documento"});}catch(e){}}
      setShowF(false);setFiles([]);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Bitácora Digital</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{entradas.length} entradas</p></div><GBtn onClick={()=>{setF({...emptyF,proyecto_id:projId||""});setFiles([]);setShowF(true);}}>＋ Nueva entrada</GBtn></div>
    {!isRes&&<div style={{marginBottom:14,maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>}
    {entradas.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>📔</div><div style={{fontWeight:700,color:N}}>Sin entradas en bitácora</div></div>
    :<div style={{display:"flex",flexDirection:"column",gap:12}}>
      {entradas.map(e=>{const tc=TC[e.tipo]||TC.general;return(<div key={e.id} className="card fi">
        <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
          <span style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:tc.bg,color:tc.c,whiteSpace:"nowrap"}}>{e.tipo}</span>
          <div><div style={{fontFamily:"Outfit",fontWeight:700,fontSize:14,color:N}}>{e.titulo}</div><div style={{fontSize:10,color:G4,marginTop:1}}>{fmtD(e.fecha)} {e.personal_presente>0&&` · 👷 ${e.personal_presente}`} {e.clima&&` · 🌤️ ${e.clima}`}</div></div>
        </div>
        {e.descripcion&&<div style={{fontSize:12,color:TS,lineHeight:1.6,background:BG,borderRadius:7,padding:"8px 12px"}}>{e.descripcion}</div>}
      </div>);})}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="📔 Nueva Entrada de Bitácora" maxW={600}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
          <Sel label="Tipo" value={f.tipo} onChange={v=>sf("tipo",v)}>{TIPOS.map(t=><option key={t}>{t}</option>)}</Sel>
        </div>
        <Inp label="Título *" value={f.titulo} onChange={v=>sf("titulo",v)} placeholder="Resumen breve"/>
        <TA label="Descripción detallada" value={f.descripcion} onChange={v=>sf("descripcion",v)} placeholder="Describe avances, anomalías, instrucciones..." rows={4}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Clima" value={f.clima} onChange={v=>sf("clima",v)} placeholder="Soleado, lluvioso..."/>
          <Inp label="Personal presente" value={f.personal_presente} onChange={v=>sf("personal_presente",v)} type="number"/>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:5}}>📸 Evidencia</label>
          <div className="drop-zone" onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:"12px"}}>{files.length>0?<div style={{fontSize:12,color:GD,fontWeight:700}}>📎 {files.length} archivo{files.length>1?"s":""}</div>:<div style={{fontSize:12,color:TS}}>Fotos o documentos de evidencia</div>}</div>
          <input ref={fileRef} type="file" accept="image/*,.pdf" multiple style={{display:"none"}} onChange={e=>setFiles(Array.from(e.target.files))}/></div>
      </div>
    </Modal>
  </div>);
}

/* ══ FOTOS ══════════════════════════════════════════════════ */
function Fotos({user,curProj,proyectos}){
  var ZONAS=["Fachada Norte","Fachada Sur","Fachada Este","Fachada Oeste","Interior Sala","Interior Cocina","Interior Baño","Cimentación","Estructura","Cubierta/Techo","Instalaciones","Otro"];
  var SEV_COLOR={normal:"#156534",atencion:"#b45309",critica:"#dc2626"};
  var SEV_BG={normal:"#f0fdf4",atencion:"#fffbeb",critica:"#fef2f2"};
  var SEV_LABEL={normal:"✅ Normal",atencion:"⚠️ Atención",critica:"🚨 Crítico"};
  var initProjId=(curProj&&curProj.id)||"";
  const [fotos,setFotos]=useState([]);
  const [projId,setProjId]=useState(initProjId);
  const [showF,setShowF]=useState(false);
  const [files,setFiles]=useState([]);
  const [saving,setSaving]=useState(false);
  const [analyzing,setAnalyzing]=useState({});
  const [filterZona,setFilterZona]=useState("Todas");
  const [filterSev,setFilterSev]=useState("Todas");
  const [fForm,setFForm]=useState({descripcion:"",zona:"",punto_toma:"",actividad_relacionada:""});
  const fileRef=useRef();

  useEffect(function(){if(projId)loadFotos();},[projId]);

  function loadFotos(){
    SB.get("fotos_avance","?proyecto_id=eq."+projId+"&order=created_at.desc")
      .then(function(d){setFotos(d||[]);}).catch(function(){});
  }

  function savePhoto(){
    if(!files.length||!projId){alert("Selecciona proyecto y fotos.");return;}
    setSaving(true);
    var arr=Array.from(files);
    var i=0;
    function next(){
      if(i>=arr.length){
        setShowF(false);setFiles([]);
        setFForm({descripcion:"",zona:"",punto_toma:"",actividad_relacionada:""});
        loadFotos();setSaving(false);return;
      }
      var file=arr[i++];
      var path="fotos-avance/"+projId+"/"+Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      SB.upload("fotos-avance",path,file).then(function(url){
        return SB.post("fotos_avance",{
          proyecto_id:projId,descripcion:fForm.descripcion,zona:fForm.zona,
          punto_toma:fForm.punto_toma,actividad_relacionada:fForm.actividad_relacionada,
          archivo_url:url,severidad:"normal",
          analisis_ia:null,anomalias_detectadas:JSON.stringify([])
        });
      }).then(function(){next();}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
    }
    next();
  }

  function analizarIA(foto){
    if(!foto.archivo_url){alert("Sin archivo disponible.");return;}
    var newA=Object.assign({},analyzing);newA[foto.id]=true;setAnalyzing(newA);
    var prev=fotos.find(function(ff){return ff.id!==foto.id&&ff.zona===foto.zona&&ff.punto_toma===foto.punto_toma&&new Date(ff.created_at)<new Date(foto.created_at);});
    var ctx=["Proyecto Los Mochis Sinaloa",foto.zona?"Zona: "+foto.zona:"",foto.punto_toma?"Punto: "+foto.punto_toma:"",foto.actividad_relacionada?"Actividad: "+foto.actividad_relacionada:"",foto.descripcion?"Desc: "+foto.descripcion:"",prev?"Hay foto anterior del mismo punto ("+new Date(prev.created_at).toLocaleDateString("es-MX")+"). Compara progreso.":"Sin foto anterior."].filter(Boolean).join(" ");
    var sys="Inspector experto construccion Mexico. Responde SOLO JSON valido sin backticks, sin texto extra.";
    var msg=ctx+"Analiza esta foto de avance de obra. Detecta: actividad en ejecucion, porcentaje de avance visible, calidad de ejecucion, problemas de seguridad (cascos, arneses), errores constructivos (acero mal colocado, concreto con coqueras, cimbra sin apuntalar, mamposteria sin plomada), materiales incorrectos. Responde SOLO JSON: {actividad_detectada:string,porcentaje_avance_estimado:numero,calidad_ejecucion:buena|regular|deficiente,anomalias:[{tipo:string,descripcion:string,severidad:leve|moderada|critica,recomendacion:string}],seguridad:{nivel:ok|atencion|critica,observaciones:string},progreso_vs_anterior:string,severidad_general:normal|atencion|critica}";
    function done(){var a=Object.assign({},analyzing);a[foto.id]=false;setAnalyzing(a);}
    fetch(foto.archivo_url).then(function(r){return r.blob();}).then(function(blob){
      var reader=new FileReader();
      reader.onerror=function(){alert("No se pudo leer imagen.");done();};
      reader.onload=function(e){
        // Resize image to max 1024px to avoid Anthropic 400 error (image too large)
        var img=new Image();
        img.onload=function(){
          var MAX=1024;
          var w=img.width,h=img.height;
          if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
          var canvas=document.createElement("canvas");
          canvas.width=w;canvas.height=h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          var b64=canvas.toDataURL("image/jpeg",0.85).split(",")[1];
          AI.callWithImage(sys,b64,"image/jpeg",msg,1500).then(function(txt){
          var res;try{res=JSON.parse(txt.replace(/```json|```/g,"").trim());}catch(e2){alert("Error IA: "+e2.message);done();return;}
          SB.patch("fotos_avance",foto.id,{analisis_ia:JSON.stringify(res),anomalias_detectadas:JSON.stringify(res.anomalias||[]),severidad:res.severidad_general||"normal",actividad_detectada:res.actividad_detectada||"",avance_estimado:res.porcentaje_avance_estimado||0,analizado_en:new Date().toISOString()})
            .then(function(){
              loadFotos();
              var crit=(res.anomalias||[]).filter(function(a){return a.severidad==="critica";});
              if(crit.length>0){alert("ANOMALIAS CRITICAS:\n"+crit.map(function(a){return "- "+a.tipo+": "+a.descripcion;}).join("\n")+"\nAtencion inmediata requerida.");}
              else{alert("Analisis OK: "+res.actividad_detectada+" | "+res.porcentaje_avance_estimado+"% | Calidad: "+res.calidad_ejecucion);}
              done();
            }).catch(function(e3){alert("Error guardando: "+e3.message);done();});
        }).catch(function(e4){alert("Error IA: "+e4.message);done();});
      };
          }).catch(function(e4){alert("Error IA: "+e4.message);done();});
        };
        img.onerror=function(){alert("No se pudo procesar imagen.");done();};
        img.src=e.target.result;
      };
      reader.readAsDataURL(blob);
    }).catch(function(){alert("No se pudo cargar imagen.");done();});
  }

  var allZonas=["Todas"].concat(Array.from(new Set(fotos.map(function(ff){return ff.zona;}).filter(Boolean))));
  var filtradas=fotos.filter(function(ff){return(filterZona==="Todas"||ff.zona===filterZona)&&(filterSev==="Todas"||ff.severidad===filterSev);});
  var numCritic=fotos.filter(function(ff){return ff.severidad==="critica";}).length;
  var numAten=fotos.filter(function(ff){return ff.severidad==="atencion";}).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Fotos de Avance</h2>
          <p style={{fontSize:12,color:TS,marginTop:2}}>Análisis IA — anomalías, seguridad, calidad constructiva</p>
        </div>
        <GBtn onClick={function(){setShowF(true);}}>+ Subir Fotos</GBtn>
      </div>

      <div style={{marginBottom:14,maxWidth:360}}>
        <select value={projId} onChange={function(e){setProjId(e.target.value);}}
          style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:8,padding:"9px 12px",color:N,fontSize:13,fontFamily:"inherit"}}>
          <option value="">— Seleccionar proyecto —</option>
          {proyectos.map(function(p){return <option key={p.id} value={p.id}>{p.nombre}</option>;})}
        </select>
      </div>

      {numCritic>0&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",background:"#fef2f2",border:"2px solid #dc2626",borderRadius:10,marginBottom:12}}>
        <span style={{fontSize:18}}>🚨</span>
        <div><div style={{fontWeight:800,color:"#dc2626",fontSize:13}}>{numCritic} foto(s) con anomalías CRÍTICAS</div><div style={{fontSize:11,color:TS}}>Requieren atención inmediata</div></div>
      </div>}
      {numAten>0&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",background:"#fffbeb",border:"2px solid #f59e0b",borderRadius:10,marginBottom:12}}>
        <span style={{fontSize:18}}>⚠️</span>
        <div><div style={{fontWeight:800,color:"#b45309",fontSize:13}}>{numAten} foto(s) requieren atención</div></div>
      </div>}

      {fotos.length>0&&<div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {allZonas.map(function(z){return(
          <button key={z} className="hbtn" onClick={function(){setFilterZona(z);}}
            style={{padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:700,background:filterZona===z?N:W,color:filterZona===z?W:TS,border:"1.5px solid "+(filterZona===z?N:BR)}}>
            {z}
          </button>
        );})}
        {["Todas","normal","atencion","critica"].map(function(s){return(
          <button key={s} className="hbtn" onClick={function(){setFilterSev(s);}}
            style={{padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:700,background:filterSev===s?SEV_COLOR[s]||N:W,color:filterSev===s?W:TS,border:"1.5px solid "+(filterSev===s?"transparent":BR)}}>
            {s==="Todas"?"Todas las severidades":SEV_LABEL[s]||"Todas"}
          </button>
        );})}
      </div>}

      {filtradas.length===0?(
        <div style={{textAlign:"center",padding:"40px",background:W,borderRadius:14,border:"1.5px solid "+BR}}>

                    {SEV_LABEL[sev]}

                  {foto.zona&&<div style={{position:"absolute",bottom:8,left:8,padding:"2px 8px",borderRadius:6,fontSize:9,fontWeight:700,background:"rgba(13,34,68,.7)",color:W}}>
                    {foto.zona}

                </div>
                <div style={{padding:"10px 12px"}}>
                  <div style={{fontSize:12,fontWeight:600,color:N,marginBottom:3}}>{foto.descripcion||"Sin descripción"}</div>
                  <div style={{fontSize:10,color:TS,marginBottom:4}}>{new Date(foto.created_at).toLocaleDateString("es-MX")} · {foto.subido_por||user.nombre}</div>
                  {foto.punto_toma&&<div style={{fontSize:10,color:AC,fontWeight:700,marginBottom:6}}>Punto: {foto.punto_toma}</div>}
                  {analisis&&<div style={{marginBottom:8}}>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
                      <span style={{fontSize:10,padding:"2px 6px",borderRadius:5,background:"#e8eef8",color:N2,fontWeight:700}}>{analisis.actividad_detectada}</span>
                      <span style={{fontSize:10,padding:"2px 6px",borderRadius:5,background:GB,color:GD,fontWeight:700}}>{analisis.porcentaje_avance_estimado}%</span>
                      <span style={{fontSize:10,padding:"2px 6px",borderRadius:5,background:analisis.calidad_ejecucion==="buena"||analisis.calidad_ejecucion==="excelente"?"#f0fdf4":"#fef2f2",color:analisis.calidad_ejecucion==="buena"||analisis.calidad_ejecucion==="excelente"?"#156534":"#dc2626",fontWeight:700}}>{analisis.calidad_ejecucion}</span>
                    </div>
                    {scrit.length>0&&<div style={{padding:"5px 8px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,marginBottom:4}}>
                      <div style={{fontSize:10,fontWeight:800,color:"#dc2626",marginBottom:2}}>Anomalías críticas:</div>
                      {scrit.map(function(a,idx){return <div key={idx} style={{fontSize:10,color:"#dc2626"}}>• {a.tipo}: {a.descripcion}</div>;})}
                    </div>}
                    {smod.length>0&&<div style={{padding:"5px 8px",background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:6,marginBottom:4}}>
                      {smod.slice(0,2).map(function(a,idx){return <div key={idx} style={{fontSize:10,color:"#b45309"}}>• {a.tipo}: {a.descripcion}</div>;})}
                    </div>}
                    {analisis.seguridad&&analisis.seguridad.nivel!=="ok"&&<div style={{fontSize:10,color:"#b45309",marginBottom:4}}>Seguridad: {analisis.seguridad.observaciones}</div>}
                    {analisis.progreso_vs_anterior&&<div style={{fontSize:10,color:TS,fontStyle:"italic"}}>{analisis.progreso_vs_anterior}</div>}
                  </div>}
                  <button className="hbtn" onClick={function(){analizarIA(foto);}} disabled={!!analyzing[foto.id]}
                    style={{width:"100%",background:analyzing[foto.id]?BG:analisis?"linear-gradient(135deg,#059669,#047857)":"linear-gradient(135deg,#7c3aed,#5b21b6)",color:analyzing[foto.id]?TS:W,border:"none",borderRadius:7,padding:"7px",fontSize:11,fontWeight:800}}>
                    {analyzing[foto.id]?"Analizando...":analisis?"Re-analizar con IA":"Analizar con IA"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <Modal show={showF} onClose={function(){setShowF(false);}} title="Subir Fotos de Avance" maxW={520}
        footer={<><GhBtn onClick={function(){setShowF(false);}}>Cancelar</GhBtn><GBtn onClick={savePhoto} disabled={saving}>{saving?"Subiendo...":"Guardar fotos"}</GBtn></>}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{padding:"8px 12px",background:"#eff4ff",border:"1px solid #bfdbfe",borderLeft:"4px solid "+AC,borderRadius:8,fontSize:12,color:AC,lineHeight:1.6}}>
            Para comparar progreso usa siempre la misma Zona y Punto de toma — la IA comparará con la foto anterior del mismo punto.
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Fotos *</label>
            <div className="drop-zone" onClick={function(){fileRef.current&&fileRef.current.click();}}
              onDragOver={function(e){e.preventDefault();}} onDrop={function(e){e.preventDefault();setFiles(Array.from(e.dataTransfer.files));}}>
              {files.length>0?<div style={{fontSize:13,color:GD,fontWeight:700}}>{files.length} foto(s) seleccionada(s)</div>:
                <div><div style={{fontSize:24,marginBottom:6}}>📷</div><div style={{fontSize:13,fontWeight:700,color:N}}>Toca para seleccionar fotos</div><div style={{fontSize:11,color:TS,marginTop:3}}>JPG, PNG · puedes subir varias</div></div>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={function(e){setFiles(Array.from(e.target.files));}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Zona *</label>
              <select value={fForm.zona} onChange={function(e){setFForm(function(p){return Object.assign({},p,{zona:e.target.value});});}}
                style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:12,fontFamily:"inherit"}}>
                <option value="">— Seleccionar —</option>
                {ZONAS.map(function(z){return <option key={z} value={z}>{z}</option>;})}

            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Punto de toma</label>
              <input value={fForm.punto_toma} onChange={function(e){setFForm(function(p){return Object.assign({},p,{punto_toma:e.target.value});});}}

                style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:12,fontFamily:"inherit"}}/>
            </div>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Actividad relacionada</label>
            <input value={fForm.actividad_relacionada} onChange={function(e){setFForm(function(p){return Object.assign({},p,{actividad_relacionada:e.target.value});});}}
              placeholder="Ej: Colado de losa planta alta"
              style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:12,fontFamily:"inherit"}}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Descripción / Notas</label>
            <textarea value={fForm.descripcion} onChange={function(e){setFForm(function(p){return Object.assign({},p,{descripcion:e.target.value});});}}
              placeholder="¿Qué se realizó? Observaciones del residente"
              style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:12,fontFamily:"inherit",minHeight:65,resize:"vertical"}}/>
          </div>
        </div>
      </Modal>
    </div>
  );
}

function Documentos({user,curProj,proyectos}){
  const [docs,setDocs]=useState([]);const [projId,setProjId]=useState((curProj&&curProj.id)||"");
  const [showF,setShowF]=useState(false);const [file,setFile]=useState(null);const [saving,setSaving]=useState(false);const fileRef=useRef();
  const [f,setF]=useState({proyecto_id:"",categoria:"plano",nombre:"",descripcion:"",version:"1.0"});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const CATS=["plano","render","contrato","licencia","estudio","acta","permiso","otro"];
  const CI={plano:"📐",render:"🎨",contrato:"📝",licencia:"🏛️",estudio:"🔬",acta:"📋",permiso:"✅",otro:"📁"};
  useEffect(()=>{if(projId)load();},[projId]);
  useEffect(()=>{if((curProj&&curProj.id))setProjId(curProj.id);},[curProj]);
  const load=async()=>{try{const d=await SB.get("documentos",`?proyecto_id=eq.${projId}&order=created_at.desc`);setDocs(d||[]);}catch(e){}};
  const save=async()=>{
    if(!f.proyecto_id||!f.nombre.trim()||!file){alert("Completa todos los campos y selecciona un archivo.");return;}
    setSaving(true);
    try{const path=`${f.proyecto_id}/${f.categoria}/${Date.now()}_${file.name}`;const url=await SB.upload("documentos",path,file);await SB.post("documentos",{...f,archivo_url:url,archivo_nombre:file.name,subido_por:user.id});setShowF(false);setFile(null);load();}
    catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const byCat=CATS.reduce((acc,cat)=>{acc[cat]=docs.filter(d=>d.categoria===cat);return acc;},{});
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Expediente Digital</h2></div><GBtn onClick={()=>{setF({proyecto_id:projId||"",categoria:"plano",nombre:"",descripcion:"",version:"1.0"});setFile(null);setShowF(true);}}>＋ Subir documento</GBtn></div>
    <div style={{marginBottom:14,maxWidth:320}}><Sel label="Proyecto" value={projId} onChange={setProjId}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel></div>
    {docs.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>📁</div><div style={{fontWeight:700,color:N}}>Sin documentos</div></div>
    :<div>{CATS.map(cat=>{const cd=byCat[cat];if(!cd.length)return null;return(<div key={cat} style={{marginBottom:18}}><SLbl t={`${CI[cat]} ${cat.charAt(0).toUpperCase()+cat.slice(1)}s`}/><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>{cd.map(d=>(<a key={d.id} href={d.archivo_url} target="_blank" style={{textDecoration:"none"}}><div className="card card-h"><div style={{fontSize:26,marginBottom:6}}>{CI[d.categoria]||"📄"}</div><div style={{fontSize:13,fontWeight:700,color:N,marginBottom:3}}>{d.nombre}</div><div style={{fontSize:10,color:G4}}>v{d.version} · {fmtD(d.created_at)}</div>{d.descripcion&&<div style={{fontSize:11,color:TS,marginTop:3}}>{d.descripcion}</div>}</div></a>))}</div></div>);})}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title="📁 Subir Documento" maxW={500}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Subiendo...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Proyecto *" value={f.proyecto_id} onChange={v=>sf("proyecto_id",v)}><option value="">— Seleccionar —</option>{proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</Sel>
          <Sel label="Categoría *" value={f.categoria} onChange={v=>sf("categoria",v)}>{CATS.map(c=><option key={c} value={c}>{CI[c]} {c}</option>)}</Sel>
        </div>
        <Inp label="Nombre del documento *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Ej: Plano arquitectónico PB"/>
        <Inp label="Versión" value={f.version} onChange={v=>sf("version",v)} placeholder="1.0"/>
        <TA label="Descripción" value={f.descripcion} onChange={v=>sf("descripcion",v)} rows={2}/>
        <div><label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:5}}>📎 Archivo *</label>
          <div className="drop-zone" onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:"12px"}}>{file?<div style={{fontSize:12,color:GD,fontWeight:700}}>📄 {file.name}</div>:<div style={{fontSize:12,color:TS}}>PDF, DWG, JPG, PNG, DOCX...</div>}</div>
          <input ref={fileRef} type="file" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/></div>
      </div>
    </Modal>
  </div>);
}

/* ══ MATERIALES ═════════════════════════════════════════════ */
function Materiales({user}){
  const [mats,setMats]=useState([]);const [search,setSearch]=useState("");
  const [showF,setShowF]=useState(false);const [editM,setEditM]=useState(null);const [saving,setSaving]=useState(false);
  const [f,setF]=useState({nombre:"",unidad:"pza",categoria:"General",precio:"",proveedor:"",notas:""});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const CATS=["General","Concreto","Acero","Block / Tabique","Pintura","Hidráulico","Eléctrico","Madera","Herrería","Impermeabilizante","Acabados","Decoración","Otros"];
  useEffect(()=>{load();},[]);
  const load=async()=>{try{const d=await SB.get("materiales","?order=nombre");setMats(d||[]);}catch(e){}};
  const open=(m=null)=>{setEditM(m);setF(m?{...m,precio:String(m.precio||"")}:{nombre:"",unidad:"pza",categoria:"General",precio:"",proveedor:"",notas:""});setShowF(true);};
  const save=async()=>{
    if(!f.nombre.trim()){alert("El nombre es obligatorio.");return;}
    setSaving(true);
    try{const payload={...f,precio:parseFloat(f.precio)||0,ultima_actualizacion:new Date().toISOString()};if(editM)await SB.patch("materiales",editM.id,payload);else await SB.post("materiales",payload);setShowF(false);load();}
    catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const del=async id=>{if(!confirm("¿Eliminar?"))return;try{await SB.del("materiales",id);load();}catch(e){alert(e.message);}};
  const filtered=mats.filter(m=>m.nombre.toLowerCase().includes(search.toLowerCase()));
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Base de Materiales</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{mats.length} materiales en Supabase</p></div><GBtn onClick={()=>open()}>＋ Agregar</GBtn></div>
    <div style={{marginBottom:14,maxWidth:360}}><div style={{position:"relative"}}><span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:G4}}>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar material..." style={{...iS,paddingLeft:34}}/></div></div>
    {filtered.length===0?<div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:`1px solid ${BR}`}}><div style={{fontSize:36,marginBottom:8}}>🧱</div><div style={{fontWeight:700,color:N}}>Sin materiales registrados</div></div>
    :<div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 70px 110px 120px 80px 80px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Material</span><span style={{textAlign:"center"}}>Unid.</span><span style={{textAlign:"center"}}>Categoría</span><span style={{textAlign:"right"}}>Precio</span><span style={{textAlign:"center"}}>Actualizado</span><span style={{textAlign:"center"}}>Acc.</span>
      </div>
      {filtered.map((m,idx)=>(
        <div key={m.id} style={{display:"grid",gridTemplateColumns:"2fr 70px 110px 120px 80px 80px",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
          <div><div style={{fontSize:12,fontWeight:600,color:N}}>{m.nombre}</div>{m.proveedor&&<div style={{fontSize:9,color:G4}}>📦 {m.proveedor}</div>}</div>
          <div style={{textAlign:"center",fontSize:11,color:G4,fontFamily:"DM Mono"}}>{m.unidad}</div>
          <div style={{textAlign:"center"}}><span className="badge" style={{background:"#e8eef8",color:N2,fontSize:9}}>{m.categoria}</span></div>
          <div style={{textAlign:"right",fontSize:13,fontWeight:800,color:GD,fontFamily:"Outfit"}}>$ {fmt(m.precio)}</div>
          <div style={{textAlign:"center",fontSize:9,color:G4}}>{m.ultima_actualizacion?new Date(m.ultima_actualizacion).toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"2-digit"}):"—"}</div>
          <div style={{textAlign:"center",display:"flex",gap:5,justifyContent:"center"}}>
            <button className="hbtn" onClick={()=>open(m)} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:5,padding:"3px 7px",fontSize:10}}>✏️</button>
            <button className="hbtn" onClick={()=>del(m.id)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:5,padding:"3px 7px",fontSize:10}}>🗑️</button>
          </div>
        </div>
      ))}
    </div>}
    <Modal show={showF} onClose={()=>setShowF(false)} title={editM?"✏️ Editar Material":"🧱 Nuevo Material"} maxW={480}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Inp label="Nombre *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Ej: Cemento gris 50kg"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Sel label="Unidad" value={f.unidad} onChange={v=>sf("unidad",v)}>{["pza","m²","m³","ml","kg","saco","lts","ton","jgo","gl"].map(u=><option key={u}>{u}</option>)}</Sel>
          <Sel label="Categoría" value={f.categoria} onChange={v=>sf("categoria",v)}>{CATS.map(c=><option key={c}>{c}</option>)}</Sel>
          <Inp label="Precio ($MXN s/IVA)" value={f.precio} onChange={v=>sf("precio",v)} type="number" placeholder="0.00"/>
          <Inp label="Proveedor" value={f.proveedor} onChange={v=>sf("proveedor",v)} placeholder="Nombre del proveedor"/>
        </div>
        <TA label="Notas" value={f.notas} onChange={v=>sf("notas",v)} rows={2}/>
      </div>
    </Modal>
  </div>);
}

/* ══ SEGUIMIENTO ════════════════════════════════════════════ */
function Seguimiento({user,proyectos,reload}){
  const [pres,setPres]=useState([]);const [filter,setFilter]=useState("all");const [loading,setLoading]=useState(true);
  const ST=[{k:"borrador",l:"📝 Borrador",c:G4,bg:"#e8eef8"},{k:"enviado",l:"📤 Enviado",c:AC,bg:"#eff4ff"},{k:"en_espera",l:"⏳ En Espera",c:"#b45309",bg:"#fef3c7"},{k:"aprobado",l:"✅ Aprobado",c:"#156534",bg:"#f0fdf4"},{k:"en_proceso",l:"🏗️ En Proceso",c:"#0e7490",bg:"#ecfeff"},{k:"cancelado",l:"❌ Cancelado",c:"#dc2626",bg:"#fef2f2"}];
  useEffect(()=>{SB.get("presupuestos","?order=created_at.desc").then(d=>{setPres(d||[]);setLoading(false);}).catch(()=>setLoading(false));},[]);
  const setStatus=async(id,s)=>{try{await SB.patch("presupuestos",id,{status:s,updated_at:new Date().toISOString()});setPres(p=>p.map(x=>x.id===id?{...x,status:s}:x));}catch(e){alert(e.message);}};
  const filtered=pres.filter(p=>filter==="all"||p.status===filter);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Seguimiento de Presupuestos</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{pres.length} presupuestos</p></div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8,marginBottom:18}}>
      {ST.map(s=>(
        <div key={s.k} className="hbtn card-h" onClick={()=>setFilter(filter===s.k?"all":s.k)}
          style={{background:filter===s.k?s.bg:W,border:`2px solid ${filter===s.k?s.c:BR}`,borderRadius:10,padding:"10px",textAlign:"center",cursor:"pointer"}}>
          <div style={{fontSize:10,fontWeight:700,color:s.c}}>{s.l}</div>
          <div style={{fontSize:24,fontWeight:900,color:N,fontFamily:"Outfit",marginTop:2}}>{pres.filter(p=>p.status===s.k).length}</div>
        </div>
      ))}
    </div>

function Usuarios({user}){
  const [usuarios,setUsuarios]=useState([]);const [showF,setShowF]=useState(false);const [editU,setEditU]=useState(null);const [saving,setSaving]=useState(false);
  const emptyF={nombre:"",email:"",password_hash:"",rol:"residente",telefono:"",activo:true};
  const [f,setF]=useState(emptyF);const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{load();},[]);
  const load=async()=>{try{const d=await SB.get("usuarios","?order=nombre");setUsuarios(d||[]);}catch(e){}};
  const open=(u=null)=>{setEditU(u);setF(u?{nombre:u.nombre,email:u.email,password_hash:"",rol:u.rol,telefono:u.telefono||"",activo:u.activo}:emptyF);setShowF(true);};
  const save=async()=>{
    if(!f.nombre.trim()||!f.email.trim()){alert("Nombre y email son obligatorios.");return;}
    if(!editU&&!f.password_hash.trim()){alert("La contraseña es obligatoria para nuevos usuarios.");return;}
    setSaving(true);
    try{
      const payload={nombre:f.nombre,email:f.email,rol:f.rol,telefono:f.telefono,activo:f.activo,updated_at:new Date().toISOString()};
      if(f.password_hash.trim())payload.password_hash=f.password_hash;
      if(editU)await SB.patch("usuarios",editU.id,payload);else await SB.post("usuarios",{...payload});
      setShowF(false);load();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const toggle=async u=>{try{await SB.patch("usuarios",u.id,{activo:!u.activo,updated_at:new Date().toISOString()});load();}catch(e){alert(e.message);}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Usuarios del Sistema</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{usuarios.length} usuarios registrados</p></div><GBtn onClick={()=>open()}>＋ Nuevo usuario</GBtn></div>
    <div style={{background:W,borderRadius:13,overflow:"hidden",border:`1.5px solid ${BR}`,boxShadow:"0 2px 12px rgba(13,34,68,.07)"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px 90px",padding:"9px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:.8,textTransform:"uppercase"}}>
        <span>Usuario</span><span style={{textAlign:"center"}}>Rol</span><span style={{textAlign:"center"}}>Teléfono</span><span style={{textAlign:"center"}}>Estado</span><span style={{textAlign:"center"}}>Acciones</span>
      </div>
      {usuarios.map((u,idx)=>{const r=ROLES[u.rol]||ROLES.residente;return(<div key={u.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px 90px",alignItems:"center",padding:"11px 14px",borderBottom:`1px solid ${BG}`,background:idx%2===0?W:OW}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:r.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,border:`1.5px solid ${r.color}33`,flexShrink:0}}>{r.icon}</div>
          <div><div style={{fontSize:13,fontWeight:700,color:N}}>{u.nombre}</div><div style={{fontSize:10,color:G4}}>{u.email}</div></div>
        </div>
        <div style={{textAlign:"center"}}><span style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:r.bg,color:r.color}}>{r.icon} {r.label}</span></div>
        <div style={{textAlign:"center",fontSize:11,color:TS}}>{u.telefono||"—"}</div>
        <div style={{textAlign:"center"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,fontWeight:700,background:u.activo?"#f0fdf4":"#fef2f2",color:u.activo?"#156534":"#dc2626"}}>{u.activo?"● Activo":"○ Inactivo"}</span></div>
        <div style={{textAlign:"center",display:"flex",gap:5,justifyContent:"center"}}>
          <button className="hbtn" onClick={()=>open(u)} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,borderRadius:5,padding:"4px 8px",fontSize:11}}>✏️</button>
          {u.id!==user.id&&<button className="hbtn" onClick={()=>toggle(u)} style={{background:"#fef3c7",color:"#b45309",border:"1px solid #fcd34d44",borderRadius:5,padding:"4px 8px",fontSize:11}}>{u.activo?"⏸️":"▶️"}</button>}
        </div>
      </div>);})}
    </div>
    <Modal show={showF} onClose={()=>setShowF(false)} title={editU?"✏️ Editar Usuario":"👤 Nuevo Usuario"} maxW={520}
      footer={<><GhBtn onClick={()=>setShowF(false)}>Cancelar</GhBtn><GBtn onClick={save} disabled={saving}>{saving?"Guardando...":"✅ Guardar"}</GBtn></>}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Nombre completo *" value={f.nombre} onChange={v=>sf("nombre",v)} placeholder="Nombre completo"/>
          <Inp label="Email *" value={f.email} onChange={v=>sf("email",v)} type="email" placeholder="correo@empresa.com"/>
          <Inp label={editU?"Nueva contraseña (vacío = sin cambio)":"Contraseña *"} value={f.password_hash} onChange={v=>sf("password_hash",v)} type="password" placeholder="Contraseña"/>
          <Inp label="Teléfono" value={f.telefono} onChange={v=>sf("telefono",v)} placeholder="(668) 000-0000"/>
        </div>
        <Sel label="Rol y permisos *" value={f.rol} onChange={v=>sf("rol",v)}>
          <option value="directivo">👔 Directivo — Acceso total</option>
          <option value="admin_senior">🏢 Admin Senior — Gestión completa</option>
          <option value="admin_junior">📋 Admin Junior — Compras, nóminas, docs</option>
          <option value="residente">👷 Residente — Bitácora, fotos, requisiciones</option>
        </Sel>
        <div style={{padding:"9px 12px",background:BG,borderRadius:7,fontSize:11,color:TS,lineHeight:1.6}}>
          <strong>Permisos:</strong> {(PERMISOS[f.rol]||[]).join(" · ")}
        </div>
        {editU&&<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={f.activo} onChange={e=>sf("activo",e.target.checked)} style={{width:16,height:16,accentColor:GD}}/><span style={{fontSize:12,fontWeight:700,color:TS}}>Usuario activo</span></label>}
      </div>
    </Modal>
  </div>);
}

  const [wizStep,setWizStep]=useState(0);
  const [wiz,setWiz]=useState(null);

    }
  },[curProj]);
  // AUTOSAVE: save items to Supabase whenever they change (after first load)
  const autoSaveRef=React.useRef(null);
  useEffect(()=>{
    if(!presupId)return; // only autosave if presupuesto exists
    if(autoSaveRef.current)clearTimeout(autoSaveRef.current);

      SB.patch("presupuestos",presupId,{

        updated_at:new Date().toISOString()
      }).catch(function(){});

  },[items,extraItems]);

  // AUTO-SAVE: guardar en Supabase cada vez que cambian las partidas
  useEffect(()=>{
    if(!presupId||!projId)return;

        items_json:JSON.stringify(items.map(function(i){return Object.assign({},i,{aiPrice:aiPrices[i.id]||null});})),

          return s+base*(i.qty||0);
        },0),
        updated_at:new Date().toISOString()
      }).catch(function(){});
    },1500);
    return function(){clearTimeout(timer);};

  // ── WIZARD ──────────────────────────────────────────────
  function calcWiz(w){
    if(!w)return{mat:0,mo:0,ind:0,ut:0,dc:0,precio:0};
    if(w.useManual&&parseFloat(w.manualPrice)>0){const p=parseFloat(w.manualPrice);return{mat:0,mo:0,ind:0,ut:0,dc:p,precio:p};}
    const mat=(w.materials||[]).reduce((s,m)=>s+(parseFloat(m.qty)||0)*(parseFloat(m.price)||0),0);
    let mo=0;
    if(w.moType==="jornal"){const c=parseFloat(w.jCuad)||1,s=parseFloat(w.jSal)||0,r=parseFloat(w.jRend)||1;mo=(c*s)/r;}
    else mo=parseFloat(w.dPrice)||0;
    const dc=mat+mo,ind=dc*(parseFloat(w.indirectos)||0)/100,ut=dc*(parseFloat(w.utilidad)||0)/100;
    return{mat,mo,ind,ut,dc,precio:dc+ind+ut};
  }
  const wc=React.useMemo(()=>calcWiz(wiz),[wiz]);

  function openWiz(item=null){

        moType:item.moType||"jornal",

        dPrice:String((item.moData&&item.moData.precio)||""),
        indirectos:String(item.indirectosPct||10),utilidad:String(item.utilidadPct||40),
        useManual:item.manualSet||false,manualPrice:String(item.customPrice||""),

    }else{
      setWiz({name:"",cat:"",newCat:"",unit:"m²",emoji:"🏗️",
        materials:[{id:Date.now(),name:"",unit:"kg",qty:"",price:""}],

  async function saveWiz(){

      id:wiz._editItem?wiz._editItem.id:"c_"+Date.now(),

    };

  }

          <GhBtn onClick={()=>wizStep===0?setShowWiz(false):setWizStep(s=>s-1)}>{wizStep===0?"Cancelar":"← Anterior"}</GhBtn>
          <span style={{fontSize:10,color:G4}}>Paso {wizStep+1}/{WIZ_STEPS.length}</span>
          {wizStep<WIZ_STEPS.length-1
            ?<GBtn onClick={()=>setWizStep(s=>s+1)} disabled={wizStep===0&&!wiz.name.trim()}>Siguiente →</GBtn>
            :<GBtn onClick={saveWiz} disabled={!wiz.name.trim()}>☁️ {wiz._editItem?"Guardar cambios":"Guardar en catálogo"}</GBtn>
          }
        </>}>
        {/* Step indicator */}
        <div style={{display:"flex",gap:0,marginBottom:16,position:"relative"}}>
          <div style={{position:"absolute",top:11,left:0,right:0,height:2,background:BG,zIndex:0}}/>

              <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,
                background:i<wizStep?GD:i===wizStep?N:BG,color:i<=wizStep?W:G4,border:"2px solid "+(i<=wizStep?GD:BR)}}>
                {i<wizStep?"✓":i+1}
              </div>
              <div style={{fontSize:8,fontWeight:700,color:i===wizStep?N:G4}}>{s}</div>
            </div>
          ))}
        </div>

        {/* P0 — Identidad */}
        {wizStep===0&&(
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            <Inp label="Nombre del concepto *" value={wiz.name} onChange={v=>setWiz(w=>({...w,name:v}))} placeholder="Ej: Muro block 15×20×40"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Sel label="Categoría existente" value={wiz.cat} onChange={v=>setWiz(w=>({...w,cat:v}))}>
                <option value="">— Seleccionar —</option>
                {allCats.map(c=><option key={c} value={c}>{c}</option>)}
              </Sel>
              <Inp label="O crear nueva categoría" value={wiz.newCat||""} onChange={v=>setWiz(w=>({...w,newCat:v}))} placeholder="Nueva categoría"/>
              <Sel label="Unidad de medida *" value={wiz.unit} onChange={v=>setWiz(w=>({...w,unit:v}))}>
                {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
              </Sel>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:6}}>Ícono</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,maxHeight:80,overflowY:"auto",background:BG,borderRadius:8,padding:8}}>
                {EMOJIS.map(e=>(<button key={e} className="hbtn" onClick={()=>setWiz(w=>({...w,emoji:e}))} style={{fontSize:18,padding:"3px 5px",borderRadius:6,background:wiz.emoji===e?N:"transparent",border:"1.5px solid "+(wiz.emoji===e?N:BR)}}>{e}</button>))}
              </div>
            </div>
          </div>
        )}

        {/* P1 — Materiales */}
        {wizStep===1&&(
          <div>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N,marginBottom:12}}>Materiales por {wiz.unit}</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 24px",gap:5,marginBottom:7,fontSize:9,color:G4,fontWeight:700,textTransform:"uppercase",padding:"0 2px"}}>
              <span>Material</span><span style={{textAlign:"center"}}>Unid.</span><span style={{textAlign:"center"}}>Cant.</span><span style={{textAlign:"center"}}>$ c/u</span><span></span>
            </div>
            {(wiz.materials||[]).map((m,idx)=>(
              <div key={m.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 24px",gap:5,marginBottom:6,alignItems:"center"}}>
                <input value={m.name} onChange={e=>{const ms=[...wiz.materials];ms[idx]={...ms[idx],name:e.target.value};setWiz(w=>({...w,materials:ms}));}} placeholder="Ej: Block 15×20×40"
                  style={{background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 9px",color:N,fontSize:12,fontFamily:"inherit"}}/>
                <select value={m.unit} onChange={e=>{const ms=[...wiz.materials];ms[idx]={...ms[idx],unit:e.target.value};setWiz(w=>({...w,materials:ms}));}}
                  style={{background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 6px",color:N,fontSize:12,fontFamily:"inherit"}}>
                  {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                </select>
                <input type="number" min="0" step="0.001" value={m.qty} onChange={e=>{const ms=[...wiz.materials];ms[idx]={...ms[idx],qty:e.target.value};setWiz(w=>({...w,materials:ms}));}}
                  style={{background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px",color:N,fontSize:12,textAlign:"center",fontFamily:"DM Mono"}}/>
                <input type="number" min="0" step="0.01" value={m.price} onChange={e=>{const ms=[...wiz.materials];ms[idx]={...ms[idx],price:e.target.value};setWiz(w=>({...w,materials:ms}));}}
                  style={{background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px",color:N,fontSize:12,textAlign:"right",fontFamily:"DM Mono"}}/>
                <button className="hbtn" onClick={()=>setWiz(w=>({...w,materials:w.materials.filter((_,i)=>i!==idx)}))} style={{color:"#dc2626",background:"none",border:"none",fontSize:15,padding:0}}>✕</button>
              </div>
            ))}
            <button className="hbtn" onClick={()=>setWiz(w=>({...w,materials:[...(w.materials||[]),{id:Date.now(),name:"",unit:"kg",qty:"",price:""}]}))}
              style={{marginTop:6,background:"none",border:"1.5px dashed "+GD,color:GD,padding:"6px 14px",borderRadius:7,fontSize:11,fontWeight:700,width:"100%"}}>
              + Agregar material
            </button>
            <div style={{marginTop:12,padding:"10px 14px",background:W,borderRadius:8,border:"1.5px solid "+BR,display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:TS,fontWeight:700}}>Subtotal materiales / {wiz.unit}</span>
              <span style={{fontSize:14,fontWeight:900,color:GD,fontFamily:"Outfit"}}>$ {fmt(wc.mat)}</span>

          </div>

        {/* P2 — Mano de Obra */}
        {wizStep===2&&(
          <div>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N,marginBottom:14}}>Mano de Obra</div>

                  <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:12,color:wiz.moType===m.k?W:TS}}>{m.l}</div>
                  <div style={{fontSize:9,color:wiz.moType===m.k?"rgba(255,255,255,.7)":G4,marginTop:1}}>{m.s}</div>

            </div>
            {wiz.moType==="jornal"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Inp label="Cuadrilla (personas)" value={wiz.jCuad} onChange={v=>setWiz(w=>({...w,jCuad:v}))} type="number" placeholder="2"/>
