<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit','Segoe UI',sans-serif;background:#eef2f9;color:#1a2d50;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#e4ecf7;}
::-webkit-scrollbar-thumb{background:#b8922a;border-radius:4px;}
.hbtn{cursor:pointer;transition:all .17s;border:none;font-family:inherit;}
.hbtn:hover{opacity:.86;}
.sidebar-item{cursor:pointer;transition:all .18s;border-radius:10px;display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:2px;}
.sidebar-item:hover{background:rgba(255,255,255,.08);}
.sidebar-item.on{background:rgba(184,146,42,.18);border-left:3px solid #b8922a;}
.card{background:#fff;border:1.5px solid #c8d4e8;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(13,34,68,.07);}
.card-h:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,34,68,.13)!important;border-color:#b8922a!important;transition:all .2s;}
.modal-bg{position:fixed;inset:0;background:rgba(8,20,50,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;}
.modal-box{background:#fff;border-radius:16px;width:100%;box-shadow:0 20px 70px rgba(13,34,68,.22);display:flex;flex-direction:column;max-height:93vh;overflow:hidden;}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.fi{animation:fadeIn .25s ease;}
input:focus,textarea:focus,select:focus{outline:2px solid rgba(184,146,42,.45);border-color:#b8922a!important;}
textarea{resize:vertical;}
.progress-bar{height:8px;border-radius:4px;background:#e8eef8;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .4s;}
.badge{display:inline-block;font-size:9px;font-weight:800;border-radius:6px;padding:2px 8px;}
.drop-zone{border:2px dashed #b8922a;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fdf9f0;}
.drop-zone:hover,.drop-zone.over{background:#fdf3d8;border-color:#d4aa45;}
.gantt-bar{height:26px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ── SUPABASE ────────────────────────────────────────────── */
const SB={
  h:()=>({
    'Content-Type':'application/json',
    'apikey':window.__SB_KEY__,
    'Authorization':'Bearer '+window.__SB_KEY__,
  }),
  xhr(method,url,headers,body){
    return new Promise((resolve,reject)=>{
      const x=new XMLHttpRequest();
      x.open(method,url,true);
      Object.entries(headers).forEach(([k,v])=>x.setRequestHeader(k,v));
      x.onload=()=>{
        if(x.status>=200&&x.status<300){
          try{resolve(x.responseText?JSON.parse(x.responseText):true);}
          catch{resolve(true);}
        }else{reject(new Error(x.responseText||x.status));}
      };
      x.onerror=()=>reject(new Error('Network error - verifica conexion a internet'));
      x.send(body||null);
    });
  },
  async get(t,q=''){
    return SB.xhr('GET',`${window.__SB_URL__}/rest/v1/${t}${q}`,
      {...SB.h(),'Prefer':'return=representation'});
  },
  async post(t,d){
    return SB.xhr('POST',`${window.__SB_URL__}/rest/v1/${t}`,
      {...SB.h(),'Prefer':'return=representation'},JSON.stringify(d));
  },
  async patch(t,id,d){
    return SB.xhr('PATCH',`${window.__SB_URL__}/rest/v1/${t}?id=eq.${id}`,
      {...SB.h(),'Prefer':'return=representation'},JSON.stringify(d));
  },
  async del(t,id){
    return SB.xhr('DELETE',`${window.__SB_URL__}/rest/v1/${t}?id=eq.${id}`,SB.h());
  },
  async upload(bucket,path,file){
    return new Promise((resolve,reject)=>{
      const x=new XMLHttpRequest();
      x.open('POST',`${window.__SB_URL__}/storage/v1/object/${bucket}/${path}`,true);
      x.setRequestHeader('apikey',window.__SB_KEY__);
      x.setRequestHeader('Authorization','Bearer '+window.__SB_KEY__);
      x.setRequestHeader('x-upsert','true');
      x.onload=()=>{
        if(x.status>=200&&x.status<300){
          resolve(`${window.__SB_URL__}/storage/v1/object/public/${bucket}/${path}`);
        }else{reject(new Error(x.responseText));}
      };
      x.onerror=()=>reject(new Error('Upload failed'));
      x.send(file);
    });
  },
};

var AI={
  key:window.__AI_KEY__,
  call:function(sysPrompt,userMsg,maxTokens){
    return new Promise(function(resolve,reject){
      var x=new XMLHttpRequest();
      x.open("POST","https://api.anthropic.com/v1/messages",true);
      x.setRequestHeader("Content-Type","application/json");
      x.setRequestHeader("x-api-key",AI.key);
      x.setRequestHeader("anthropic-version","2023-06-01");

      x.onload=function(){
        if(x.status>=200&&x.status<300){
          try{
            var res=JSON.parse(x.responseText);
            var txt=res.content&&res.content[0]&&res.content[0].text||"";
            resolve(txt);
          }catch(e){reject(new Error("Error parsing AI response: "+e.message));}
        }else{
          reject(new Error("AI Error "+x.status+": "+x.responseText));
        }
      };
      x.onerror=function(){reject(new Error("Network error calling AI"));};
      x.send(JSON.stringify({
        model:"claude-haiku-4-5",
        max_tokens:maxTokens||1000,
        messages:[{role:"user",content:[
          {type:"text",text:sysPrompt+" "+userMsg}
        ]}]
      }));
    });
  },
  callWithImage:function(sysPrompt,b64,mimeType,userMsg,maxTokens){
    return new Promise(function(resolve,reject){
      var x=new XMLHttpRequest();
      x.open("POST","https://api.anthropic.com/v1/messages",true);
      x.setRequestHeader("Content-Type","application/json");
      x.setRequestHeader("x-api-key",AI.key);
      x.setRequestHeader("anthropic-version","2023-06-01");
      x.setRequestHeader("anthropic-dangerous-direct-browser-access","true");
      x.onload=function(){
        if(x.status>=200&&x.status<300){
          try{
            var res=JSON.parse(x.responseText);
            var txt=res.content&&res.content[0]&&res.content[0].text||"";
            resolve(txt);
          }catch(e){reject(new Error("Error parsing AI response: "+e.message));}
        }else{
          reject(new Error("AI Error "+x.status+": "+x.responseText));
        }
      };
      x.onerror=function(){reject(new Error("Network error calling AI"));};
      var mediaType=mimeType==="application/pdf"?"document":"image";
      var msgContent=[
        {type:"text",text:sysPrompt},

  const [cotProjId,setCotProjId]=useState((curProj&&curProj.id)||"");
  const [showNew,setShowNew]=useState(false);
  const [selReq,setSelReq]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [analyzing,setAnalyzing]=useState(false);
  const [cotFiles,setCotFiles]=useState([{proveedor:"",file:null,monto:"",condiciones:"",entrega:""},{proveedor:"",file:null,monto:"",condiciones:"",entrega:""},{proveedor:"",file:null,monto:"",condiciones:"",entrega:""}]);
  const [selCot,setSelCot]=useState(null);
  const [showOC,setShowOC]=useState(null);
  const fileRefs=[useRef(),useRef(),useRef()];

  useEffect(function(){if(cotProjId){loadReqs();loadCots();};},[cotProjId]);

  function loadReqs(){
    SB.get("requisiciones","?proyecto_id=eq."+cotProjId+"&estado=eq.aprobada&order=created_at.desc")
      .then(function(d){setReqs(d||[]);}).catch(function(){});
  }
  function loadCots(){
    SB.get("cotizaciones_proveedor","?proyecto_id=eq."+cotProjId+"&order=created_at.desc")
      .then(function(d){setCots(d||[]);}).catch(function(){});
  }

  function analizarPDF(idx,file){
    if(!file)return;
    setAnalyzing(true);
    var reader=new FileReader();
    reader.onload=function(e){
      var b64=e.target.result.split(",")[1];
      AI.callWithImage(
        "Eres experto en compras de construccion Mexico. Extrae datos de cotizacion de proveedor. SOLO JSON sin backticks.",
        b64,"application/pdf",
        "Extrae de esta cotizacion: {proveedor:string,monto_total:numero,condiciones_pago:string,tiempo_entrega:string,conceptos:[{descripcion:string,cantidad:numero,unidad:string,precio_unitario:numero,subtotal:numero}]}",
        1500
      ).then(function(txt){
        try{
          var res=JSON.parse(txt.replace(/```json|```/g,"").trim());
          setCotFiles(function(prev){
            var n=prev.map(function(c,i){return i===idx?Object.assign({},c,{proveedor:res.proveedor||c.proveedor,monto:String(res.monto_total||c.monto),condiciones:res.condiciones_pago||c.condiciones,entrega:res.tiempo_entrega||c.entrega,conceptos:res.conceptos||[]}):c;});
            return n;
          });
        }catch(e2){alert("No se pudo extraer datos del PDF: "+e2.message);}
        setAnalyzing(false);
      }).catch(function(e){alert("Error IA: "+e.message);setAnalyzing(false);});
    };
    reader.readAsDataURL(file);
  }

  function guardarCotizacion(){
    if(!selReq){alert("Selecciona la requisicion.");return;}
    var validas=cotFiles.filter(function(c){return c.proveedor&&c.monto;});
    if(validas.length<1){alert("Ingresa al menos 1 cotizacion.");return;}
    setUploading(true);
    var proj=proyectos.find(function(p){return p.id===cotProjId;});
    var uploadPromises=cotFiles.map(function(c,i){
      if(!c.file||!c.proveedor)return Promise.resolve(null);
      var path="cotizaciones/"+cotProjId+"/"+Date.now()+"_cot"+i+"_"+c.file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      return SB.upload("cotizaciones",path,c.file).then(function(url){return Object.assign({},c,{url:url});}).catch(function(){return c;});
    });
    Promise.all(uploadPromises).then(function(uploaded){
      var cots_json=uploaded.filter(Boolean).map(function(c){return{proveedor:c.proveedor,monto:parseFloat(c.monto)||0,condiciones:c.condiciones,entrega:c.entrega,url:c.url||null,conceptos:c.conceptos||[]};});
      var montos=cots_json.map(function(c){return c.monto;}).filter(Boolean);
      var minMonto=montos.length?Math.min.apply(null,montos):0;
      return SB.post("cotizaciones_proveedor",{
        proyecto_id:cotProjId,
        requisicion_id:selReq,
        proyecto_nombre:(proj&&proj.nombre)||"",
        cotizaciones_json:JSON.stringify(cots_json),
        monto_minimo:minMonto,
        estado:"pendiente_autorizacion",
        creado_por:user.nombre,
        created_at:new Date().toISOString()
      });
    }).then(function(){
      setUploading(false);setShowNew(false);
      setCotFiles([{proveedor:"",file:null,monto:"",condiciones:"",entrega:""},{proveedor:"",file:null,monto:"",condiciones:"",entrega:""},{proveedor:"",file:null,monto:"",condiciones:"",entrega:""}]);
      setSelReq(null);loadCots();
    }).catch(function(e){alert("Error: "+e.message);setUploading(false);});
  }

  function autorizar(cot,cotIdx){
    if(!puedeAutorizar){alert("No tienes permiso para autorizar.");return;}
    var cots_json=JSON.parse(cot.cotizaciones_json||"[]");
    var ganadora=cots_json[cotIdx];
    if(!ganadora)return;
    if(!confirm("Autorizar cotizacion de "+ganadora.proveedor+" por $"+Number(ganadora.monto).toLocaleString("es-MX")+"?"))return;
    SB.patch("cotizaciones_proveedor",cot.id,{
      estado:"autorizada",
      proveedor_ganador:ganadora.proveedor,
      monto_autorizado:ganadora.monto,
      autorizado_por:user.nombre,
      autorizado_en:new Date().toISOString(),
      cotizacion_ganadora_idx:cotIdx
    }).then(function(){loadCots();setShowOC(Object.assign({},cot,{ganadora:ganadora,autorizador:user.nombre}));})
    .catch(function(e){alert("Error: "+e.message);});
  }

  function generarOC(cot){
    var ganadora=cot.ganadora||JSON.parse(cot.cotizaciones_json||"[]")[cot.cotizacion_ganadora_idx||0];
    var oc={folio:"OC-"+Date.now().toString().slice(-6),fecha:new Date().toLocaleDateString("es-MX"),proyecto:cot.proyecto_nombre,proveedor:ganadora.proveedor,monto:ganadora.monto,condiciones:ganadora.condiciones||"",entrega:ganadora.entrega||"",conceptos:ganadora.conceptos||[],autorizado_por:cot.autorizado_por||cot.autorizador,empresa:"MONTY Desarrollos y Construccion"};
    SB.patch("cotizaciones_proveedor",cot.id,{oc_generada:true,oc_json:JSON.stringify(oc)}).then(function(){loadCots();}).catch(function(){});
    setShowOC(Object.assign({},cot,{ganadora:ganadora,autorizador:oc.autorizado_por,oc:oc}));
  }

  var cotsPend=cots.filter(function(c){return c.estado==="pendiente_autorizacion";});
  var cotsAut=cots.filter(function(c){return c.estado==="autorizada";});

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Cotizaciones y Órdenes de Compra</h2>
          <p style={{fontSize:12,color:TS,marginTop:2}}>Compara cotizaciones de proveedores, autoriza y genera OC</p>
        </div>
        {puedeSubir&&<GBtn onClick={function(){setShowNew(true);}}>+ Nueva Cotizacion</GBtn>}
      </div>

      <div style={{marginBottom:14,maxWidth:380}}>
        <select value={cotProjId} onChange={function(e){setCotProjId(e.target.value);}}
          style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:8,padding:"9px 12px",color:N,fontSize:13,fontFamily:"inherit"}}>
          <option value="">— Seleccionar proyecto —</option>
          {proyectos.map(function(p){return <option key={p.id} value={p.id}>{p.nombre}</option>;})}
        </select>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["lista","Todas","📋"],["pendiente","Pendientes "+cotsPend.length,"⏳"],["autorizada","Autorizadas "+cotsAut.length,"✅"]].map(function(t){return(
          <button key={t[0]} className="hbtn" onClick={function(){setTab(t[0]);}}
            style={{padding:"7px 16px",borderRadius:8,fontSize:12,fontWeight:700,background:tab===t[0]?N:W,color:tab===t[0]?W:TS,border:"1.5px solid "+(tab===t[0]?N:BR)}}>
            {t[2]} {t[1]}
          </button>
        );})}
      </div>

      {cots.filter(function(c){return tab==="lista"||(tab==="pendiente"&&c.estado==="pendiente_autorizacion")||(tab==="autorizada"&&c.estado==="autorizada");}).length===0?(
        <div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:"1.5px solid "+BR}}>
          <div style={{fontSize:36,marginBottom:10}}>📋</div>
          <div style={{color:TS,fontSize:13}}>Sin cotizaciones registradas</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {cots.filter(function(c){return tab==="lista"||(tab==="pendiente"&&c.estado==="pendiente_autorizacion")||(tab==="autorizada"&&c.estado==="autorizada");}).map(function(cot){
            var cots_json=[];try{cots_json=JSON.parse(cot.cotizaciones_json||"[]");}catch(e){}
            var isAut=cot.estado==="autorizada";
            var minMonto=Math.min.apply(null,cots_json.map(function(c){return c.monto||0;}).filter(Boolean));
            return(
              <div key={cot.id} style={{background:W,borderRadius:12,border:"1.5px solid "+(isAut?"#86efac":BR),padding:"16px 18px",boxShadow:"0 2px 8px rgba(13,34,68,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:14,color:N,marginBottom:3}}>{cot.proyecto_nombre}</div>
                    <div style={{fontSize:11,color:TS}}>Subido por {cot.creado_por} · {new Date(cot.created_at).toLocaleDateString("es-MX")}</div>
                  </div>
                  <span style={{padding:"3px 12px",borderRadius:10,fontSize:10,fontWeight:800,background:isAut?"#f0fdf4":"#fef3c7",color:isAut?"#156534":"#b45309"}}>
                    {isAut?"✅ Autorizada":"⏳ Pendiente"}
                  </span>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,marginBottom:12}}>
                  {cots_json.map(function(c,idx){
                    var isGanadora=isAut&&cot.cotizacion_ganadora_idx===idx;
                    var isMin=c.monto===minMonto&&cots_json.length>1;
                    return(
                      <div key={idx} style={{padding:"10px 12px",borderRadius:9,border:"2px solid "+(isGanadora?"#22c55e":isMin?"#fcd34d":BR),background:isGanadora?"#f0fdf4":isMin?"#fefce8":OW}}>
                        <div style={{fontWeight:800,fontSize:12,color:N,marginBottom:2}}>{c.proveedor||"Proveedor "+(idx+1)}</div>
                        <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:18,color:isGanadora?"#156534":isMin?"#b45309":GD}}>
                          {"$"+Number(c.monto||0).toLocaleString("es-MX")}
                        </div>
                        {isMin&&!isGanadora&&<div style={{fontSize:9,color:"#b45309",fontWeight:700}}>PRECIO MAS BAJO</div>}
                        {isGanadora&&<div style={{fontSize:9,color:"#156534",fontWeight:700}}>AUTORIZADA</div>}
                        <div style={{fontSize:10,color:TS,marginTop:4}}>{c.condiciones||""}</div>
                        <div style={{fontSize:10,color:TS}}>{c.entrega?"Entrega: "+c.entrega:""}</div>
                        {c.url&&<a href={c.url} target="_blank" style={{fontSize:10,color:AC,display:"block",marginTop:4}}>Ver PDF</a>}
                        {!isAut&&puedeAutorizar&&(
                          <button className="hbtn" onClick={function(){autorizar(cot,idx);}}
                            style={{marginTop:8,width:"100%",background:"linear-gradient(135deg,#156534,#15803d)",color:W,border:"none",borderRadius:6,padding:"5px",fontSize:10,fontWeight:800}}>
                            Autorizar esta
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>

                {isAut&&(
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <div style={{fontSize:11,color:TS}}>Autorizado por {cot.autorizado_por} · Proveedor: <strong>{cot.proveedor_ganador}</strong> · ${Number(cot.monto_autorizado||0).toLocaleString("es-MX")}</div>
                    <GBtn onClick={function(){generarOC(cot);}}>Ver / Generar OC</GBtn>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <Modal show={showNew} onClose={function(){setShowNew(false);}} title="Nueva Cotizacion de Proveedores" maxW={680}
        footer={<><GhBtn onClick={function(){setShowNew(false);}}>Cancelar</GhBtn><GBtn onClick={guardarCotizacion} disabled={uploading}>{uploading?"Guardando...":"Guardar Cotizaciones"}</GBtn></>}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Requisicion que origina estas cotizaciones</label>
            <select value={selReq||""} onChange={function(e){setSelReq(e.target.value);}}
              style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"9px 12px",color:N,fontSize:13,fontFamily:"inherit"}}>
              <option value="">— Seleccionar requisicion —</option>
              {reqs.map(function(r){return <option key={r.id} value={r.id}>{r.folio||r.id.slice(0,8)} — {r.notas||"Requisicion"}</option>;})}
            </select>
          </div>
          <div style={{padding:"8px 12px",background:"#eff4ff",border:"1px solid #bfdbfe",borderLeft:"4px solid "+AC,borderRadius:8,fontSize:12,color:AC}}>
            Sube el PDF de cada cotizacion — la IA extraera automaticamente proveedor, monto y condiciones.
          </div>
          {[0,1,2].map(function(idx){return(
            <div key={idx} style={{padding:"14px",background:OW,borderRadius:10,border:"1.5px solid "+BR}}>
              <div style={{fontWeight:800,fontSize:12,color:N,marginBottom:10}}>Cotizacion {idx+1}{idx===0?" (requerida)":""}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:TS,display:"block",marginBottom:3}}>Proveedor</label>
                  <input value={cotFiles[idx].proveedor} onChange={function(e){var v=e.target.value;setCotFiles(function(prev){var n=prev.slice();n[idx]=Object.assign({},n[idx],{proveedor:v});return n;});}}
                    placeholder="Nombre del proveedor"
                    style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:12,fontFamily:"inherit"}}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:TS,display:"block",marginBottom:3}}>Monto total MXN</label>
                  <input value={cotFiles[idx].monto} onChange={function(e){var v=e.target.value;setCotFiles(function(prev){var n=prev.slice();n[idx]=Object.assign({},n[idx],{monto:v});return n;});}}
                    placeholder="0.00" type="number"
                    style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:12,fontFamily:"inherit"}}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:TS,display:"block",marginBottom:3}}>Condiciones de pago</label>
                  <input value={cotFiles[idx].condiciones} onChange={function(e){var v=e.target.value;setCotFiles(function(prev){var n=prev.slice();n[idx]=Object.assign({},n[idx],{condiciones:v});return n;});}}
                    placeholder="Contado, 30 dias, etc"
                    style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:12,fontFamily:"inherit"}}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:TS,display:"block",marginBottom:3}}>Tiempo de entrega</label>
                  <input value={cotFiles[idx].entrega} onChange={function(e){var v=e.target.value;setCotFiles(function(prev){var n=prev.slice();n[idx]=Object.assign({},n[idx],{entrega:v});return n;});}}
                    placeholder="3 dias, 1 semana, etc"
                    style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:12,fontFamily:"inherit"}}/>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button className="hbtn" onClick={function(){fileRefs[idx].current&&fileRefs[idx].current.click();}}
                  style={{padding:"6px 14px",background:W,border:"1.5px solid "+BR,borderRadius:7,fontSize:11,fontWeight:700,color:N}}>
                  {cotFiles[idx].file?"✅ "+cotFiles[idx].file.name:"📎 Subir PDF"}
                </button>
                {cotFiles[idx].file&&!analyzing&&(
                  <button className="hbtn" onClick={function(){analizarPDF(idx,cotFiles[idx].file);}}
                    style={{padding:"6px 14px",background:"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",borderRadius:7,fontSize:11,fontWeight:700,color:W}}>
                    🤖 Extraer con IA
                  </button>
                )}
                {analyzing&&<span style={{fontSize:11,color:TS}}>Analizando...</span>}
                <input ref={fileRefs[idx]} type="file" accept=".pdf" style={{display:"none"}}
                  onChange={function(e){var file=e.target.files[0];if(!file)return;var i2=idx;setCotFiles(function(prev){var n=prev.slice();n[i2]=Object.assign({},n[i2],{file:file});return n;});}}/>
              </div>
            </div>
          );})}
        </div>
      </Modal>

      <Modal show={!!showOC} onClose={function(){setShowOC(null);}} title="Orden de Compra" maxW={600}
        footer={<><GhBtn onClick={function(){setShowOC(null);}}>Cerrar</GhBtn><GBtn onClick={function(){window.print();}}>Imprimir OC</GBtn></>}>
        {showOC&&(function(){
          var ganadora=showOC.ganadora||{};
          var conceptos=ganadora.conceptos||[];
          return(
            <div style={{fontFamily:"inherit"}}>
              <div style={{textAlign:"center",marginBottom:16,paddingBottom:12,borderBottom:"2px solid "+N}}>
                <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:18,color:N}}>ORDEN DE COMPRA</div>
                <div style={{fontSize:12,color:TS}}>MONTY Desarrollos y Construccion · Los Mochis, Sinaloa</div>
                <div style={{fontSize:11,color:TS}}>Folio: OC-{showOC.id&&showOC.id.slice(0,8).toUpperCase()} · {new Date().toLocaleDateString("es-MX")}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div style={{padding:"10px 12px",background:OW,borderRadius:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:TS,marginBottom:4}}>PROVEEDOR</div>
                  <div style={{fontWeight:800,color:N}}>{ganadora.proveedor}</div>
                  <div style={{fontSize:11,color:TS}}>{ganadora.condiciones||""}</div>
                  <div style={{fontSize:11,color:TS}}>Entrega: {ganadora.entrega||"Por definir"}</div>
                </div>
                <div style={{padding:"10px 12px",background:GB,borderRadius:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:TS,marginBottom:4}}>PROYECTO</div>
                  <div style={{fontWeight:800,color:N}}>{showOC.proyecto_nombre}</div>
                  <div style={{fontSize:11,color:TS}}>Autorizado por: {showOC.autorizado_por||showOC.autorizador}</div>
                  <div style={{fontSize:11,color:TS}}>{new Date().toLocaleDateString("es-MX")}</div>
                </div>
              </div>
              {conceptos.length>0&&(
                <div style={{marginBottom:14}}>
                  <div style={{display:"grid",gridTemplateColumns:"3fr 60px 80px 100px",padding:"6px 10px",background:N,borderRadius:"6px 6px 0 0",fontSize:9,fontWeight:800,color:"rgba(255,255,255,.7)",textTransform:"uppercase"}}>
                    <span>Concepto</span><span style={{textAlign:"center"}}>Cant</span><span style={{textAlign:"center"}}>Unidad</span><span style={{textAlign:"right"}}>Subtotal</span>
                  </div>
                  {conceptos.map(function(c,i){return(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"3fr 60px 80px 100px",padding:"7px 10px",background:i%2===0?W:OW,borderBottom:"1px solid "+BG}}>
                      <span style={{fontSize:11,color:N}}>{c.descripcion}</span>
                      <span style={{textAlign:"center",fontSize:11,color:TS}}>{c.cantidad}</span>
                      <span style={{textAlign:"center",fontSize:11,color:TS}}>{c.unidad}</span>
                      <span style={{textAlign:"right",fontSize:11,fontWeight:700,color:GD}}>${Number(c.subtotal||0).toLocaleString("es-MX")}</span>
                    </div>
                  );})}
                </div>
              )}
              <div style={{textAlign:"right",padding:"12px",background:GB,borderRadius:8,marginBottom:14}}>
                <div style={{fontSize:12,color:TS}}>Total</div>
                <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:24,color:GD}}>${Number(ganadora.monto||0).toLocaleString("es-MX")}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,paddingTop:20,borderTop:"1px solid "+BR}}>
                <div style={{textAlign:"center"}}>
                  <div style={{height:40,borderBottom:"1px solid "+N,marginBottom:6}}></div>
                  <div style={{fontSize:10,color:TS}}>Firma Autoriza: {showOC.autorizado_por||showOC.autorizador}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{height:40,borderBottom:"1px solid "+N,marginBottom:6}}></div>
                  <div style={{fontSize:10,color:TS}}>Firma Proveedor: {ganadora.proveedor}</div>
                </div>
              </div>
            </div>
          );
        })()}
      </Modal>
    </div>
  );
}

/* ══ FINANZAS POR OBRA ══════════════════════════════════════════ */
function Finanzas({user,proyectos,curProj}){
  var puedeEditar=["directivo","admin_senior"].includes(user.rol);
  const [finProjId,setFinProjId]=useState((curProj&&curProj.id)||"");
  const [datos,setDatos]=useState(null);
  const [compras,setCompras]=useState([]);
  const [nominas,setNominas]=useState([]);
  const [showForm,setShowForm]=useState(false);
  const [saving,setSaving]=useState(false);

  const [f,setF]=useState({monto_contrato:"",anticipo_pct:"",ministraciones_json:"[]",liquidacion:""});
  const [newMin,setNewMin]=useState({concepto:"",monto:"",fecha:"",estado:"pendiente"});

  useEffect(function(){if(finProjId)load();},[finProjId]);

  function load(){
    Promise.all([
      SB.get("finanzas_obra","?proyecto_id=eq."+finProjId),
      SB.get("compras","?proyecto_id=eq."+finProjId),
      SB.get("nominas","?proyecto_id=eq."+finProjId)
    ]).then(function(res){
      var fin=res[0]&&res[0][0]||null;
      setDatos(fin);
      if(fin){setF({monto_contrato:String(fin.monto_contrato||""),anticipo_pct:String(fin.anticipo_pct||""),ministraciones_json:fin.ministraciones_json||"[]",liquidacion:String(fin.liquidacion||"")});}
      setCompras(res[1]||[]);
      setNominas(res[2]||[]);
    }).catch(function(){});
  }

  function guardar(){
    setSaving(true);
    var proj=proyectos.find(function(p){return p.id===finProjId;});
    var payload={proyecto_id:finProjId,proyecto_nombre:(proj&&proj.nombre)||"",monto_contrato:parseFloat(f.monto_contrato)||0,anticipo_pct:parseFloat(f.anticipo_pct)||0,ministraciones_json:f.ministraciones_json,liquidacion:parseFloat(f.liquidacion)||0,updated_at:new Date().toISOString()};
    var op=datos?SB.patch("finanzas_obra",datos.id,payload):SB.post("finanzas_obra",payload);
    op.then(function(){setSaving(false);setShowForm(false);load();}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }

  function agregarMinistracion(){
    if(!newMin.concepto||!newMin.monto){alert("Ingresa concepto y monto.");return;}
    var mins=[];try{mins=JSON.parse(f.ministraciones_json||"[]");}catch(e){}
    mins.push(Object.assign({},newMin,{id:Date.now(),monto:parseFloat(newMin.monto)||0}));
    setF(function(p){return Object.assign({},p,{ministraciones_json:JSON.stringify(mins)});});
    setNewMin({concepto:"",monto:"",fecha:"",estado:"pendiente"});
  }

  function toggleMinistracion(id){
    var mins=[];try{mins=JSON.parse(f.ministraciones_json||"[]");}catch(e){}
    mins=mins.map(function(m){return m.id===id?Object.assign({},m,{estado:m.estado==="cobrado"?"pendiente":"cobrado"}):m;});
    setF(function(p){return Object.assign({},p,{ministraciones_json:JSON.stringify(mins)});});
  }

  var totalCompras=compras.reduce(function(s,c){return s+(c.monto||c.monto_total||0);},0);
  var totalNominas=nominas.reduce(function(s,n){return s+(n.monto_total||0);},0);
  var gastoReal=totalCompras+totalNominas;
  var montoContrato=datos?parseFloat(datos.monto_contrato)||0:0;
  var anticipo=montoContrato*(parseFloat((datos&&datos.anticipo_pct)||0)/100);
  var mins=[];try{mins=JSON.parse((datos&&datos.ministraciones_json)||"[]");}catch(e){}
  var minsCobradas=mins.filter(function(m){return m.estado==="cobrado";}).reduce(function(s,m){return s+(m.monto||0);},0);
  var liquidacion=parseFloat((datos&&datos.liquidacion)||0);
  var totalRecibido=anticipo+minsCobradas+liquidacion;
  var utilidadPresup=montoContrato-gastoReal;
  var pctGasto=montoContrato>0?Math.round(gastoReal/montoContrato*100):0;
  var pctCobrado=montoContrato>0?Math.round(totalRecibido/montoContrato*100):0;

  var semColor=pctGasto<70?"#156534":pctGasto<90?"#b45309":"#dc2626";
  var semBg=pctGasto<70?"#f0fdf4":pctGasto<90?"#fffbeb":"#fef2f2";

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Finanzas por Obra</h2>
          <p style={{fontSize:12,color:TS,marginTop:2}}>Control de contrato, ministraciones, gastos y utilidad</p>
        </div>
        {puedeEditar&&<GBtn onClick={function(){setShowForm(true);}}>+ Configurar Finanzas</GBtn>}
      </div>

      <div style={{marginBottom:14,maxWidth:380}}>
        <select value={finProjId} onChange={function(e){setFinProjId(e.target.value);}}
          style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:8,padding:"9px 12px",color:N,fontSize:13,fontFamily:"inherit"}}>
          <option value="">— Seleccionar obra —</option>
          {proyectos.map(function(p){return <option key={p.id} value={p.id}>{p.nombre}</option>;})}
        </select>
      </div>

      {!finProjId?(
        <div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:"1.5px solid "+BR}}>
          <div style={{fontSize:36,marginBottom:10}}>💰</div>
          <div style={{color:TS,fontSize:13}}>Selecciona una obra para ver sus finanzas</div>
        </div>
      ):!datos?(
        <div style={{textAlign:"center",padding:"40px",background:W,borderRadius:12,border:"1.5px solid "+BR}}>
          <div style={{fontSize:36,marginBottom:10}}>📋</div>
          <div style={{fontWeight:700,color:N,marginBottom:12}}>Sin datos financieros configurados</div>
          {puedeEditar&&<GBtn onClick={function(){setShowForm(true);}}>Configurar ahora</GBtn>}
        </div>
      ):(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:16}}>
            {[
              {l:"Monto Contrato",v:"$"+Number(montoContrato).toLocaleString("es-MX"),i:"📑",c:N,bg:"#e8eef8"},
              {l:"Anticipo",v:"$"+Number(anticipo).toLocaleString("es-MX"),i:"💵",c:GD,bg:GB},
              {l:"Mins. Cobradas",v:"$"+Number(minsCobradas).toLocaleString("es-MX"),i:"📥",c:"#7c3aed",bg:"#f5f3ff"},
              {l:"Total Recibido",v:"$"+Number(totalRecibido).toLocaleString("es-MX")+" ("+pctCobrado+"%)",i:"✅",c:"#156534",bg:"#f0fdf4"},
              {l:"Gasto Real",v:"$"+Number(gastoReal).toLocaleString("es-MX"),i:"🧾",c:semColor,bg:semBg},
              {l:"Utilidad Proy.",v:"$"+Number(utilidadPresup).toLocaleString("es-MX"),i:utilidadPresup>=0?"📈":"📉",c:utilidadPresup>=0?"#156534":"#dc2626",bg:utilidadPresup>=0?"#f0fdf4":"#fef2f2"},
            ].map(function(s,i){return(
              <div key={i} style={{background:s.bg,border:"1.5px solid "+s.c+"33",borderRadius:11,padding:"14px 16px"}}>
                <div style={{fontSize:9,fontWeight:700,color:TS,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}}>{s.l}</div>
                <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:16,color:s.c,lineHeight:1.2}}>{s.v}</div>
                <div style={{fontSize:18,marginTop:4}}>{s.i}</div>
              </div>
            );})}
          </div>

          <div style={{background:W,borderRadius:12,border:"1.5px solid "+BR,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:800,color:N,marginBottom:10,textTransform:"uppercase",letterSpacing:.8}}>Avance Presupuestal</div>
            <div style={{marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:TS,marginBottom:4}}>
                <span>Gasto real vs contrato</span><span style={{fontWeight:700,color:semColor}}>{pctGasto}%</span>
              </div>
              <div style={{height:10,background:"#e8eef8",borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(pctGasto,100)+"%",background:semColor,borderRadius:5,transition:"width .3s"}}/>
              </div>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:TS,marginBottom:4}}>
                <span>Cobrado vs contrato</span><span style={{fontWeight:700,color:"#156534"}}>{pctCobrado}%</span>
              </div>
              <div style={{height:10,background:"#e8eef8",borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(pctCobrado,100)+"%",background:"#22c55e",borderRadius:5,transition:"width .3s"}}/>
              </div>
            </div>
          </div>

          <div style={{background:W,borderRadius:12,border:"1.5px solid "+BR,padding:"14px 16px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:800,color:N,textTransform:"uppercase",letterSpacing:.8}}>Ministraciones</div>
              {puedeEditar&&showForm&&<GhBtn onClick={function(){setShowForm(true);}}>+ Agregar</GhBtn>}
            </div>
            {mins.length===0?(
              <div style={{fontSize:12,color:TS,textAlign:"center",padding:"12px"}}>Sin ministraciones registradas</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {mins.map(function(m){return(
                  <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:m.estado==="cobrado"?"#f0fdf4":OW,borderRadius:8,border:"1px solid "+(m.estado==="cobrado"?"#86efac":BR)}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:N}}>{m.concepto}</div>
                      <div style={{fontSize:10,color:TS}}>{m.fecha||""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:m.estado==="cobrado"?"#156534":GD}}>${Number(m.monto||0).toLocaleString("es-MX")}</div>
                      <span style={{fontSize:9,padding:"1px 6px",borderRadius:6,background:m.estado==="cobrado"?"#dcfce7":"#fef3c7",color:m.estado==="cobrado"?"#166534":"#b45309",fontWeight:700}}>{m.estado==="cobrado"?"Cobrada":"Pendiente"}</span>
                    </div>
                  </div>
                );})}
              </div>
            )}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{background:W,borderRadius:12,border:"1.5px solid "+BR,padding:"14px 16px"}}>
              <div style={{fontSize:11,fontWeight:800,color:N,marginBottom:8,textTransform:"uppercase",letterSpacing:.8}}>Compras Registradas</div>
              <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:GD}}>${Number(totalCompras).toLocaleString("es-MX")}</div>
              <div style={{fontSize:11,color:TS,marginTop:4}}>{compras.length} facturas registradas</div>
            </div>
            <div style={{background:W,borderRadius:12,border:"1.5px solid "+BR,padding:"14px 16px"}}>
              <div style={{fontSize:11,fontWeight:800,color:N,marginBottom:8,textTransform:"uppercase",letterSpacing:.8}}>Nominas Pagadas</div>
              <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:"#7c3aed"}}>${Number(totalNominas).toLocaleString("es-MX")}</div>
              <div style={{fontSize:11,color:TS,marginTop:4}}>{nominas.length} periodos registrados</div>
            </div>
          </div>
        </div>
      )}

      <Modal show={showForm} onClose={function(){setShowForm(false);}} title="Configurar Finanzas de Obra" maxW={560}
        footer={<><GhBtn onClick={function(){setShowForm(false);}}>Cancelar</GhBtn><GBtn onClick={guardar} disabled={saving}>{saving?"Guardando...":"Guardar"}</GBtn></>}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Monto del contrato MXN</label>
              <input value={f.monto_contrato} onChange={function(e){setF(function(p){return Object.assign({},p,{monto_contrato:e.target.value});});}} type="number" placeholder="0.00"
                style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:13,fontFamily:"inherit"}}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Anticipo (%)</label>
              <input value={f.anticipo_pct} onChange={function(e){setF(function(p){return Object.assign({},p,{anticipo_pct:e.target.value});});}} type="number" placeholder="30"
                style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:13,fontFamily:"inherit"}}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:4}}>Liquidacion MXN</label>
              <input value={f.liquidacion} onChange={function(e){setF(function(p){return Object.assign({},p,{liquidacion:e.target.value});});}} type="number" placeholder="0.00"
                style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"8px 10px",color:N,fontSize:13,fontFamily:"inherit"}}/>
            </div>
          </div>

          <div style={{borderTop:"1px solid "+BR,paddingTop:12}}>
            <div style={{fontSize:11,fontWeight:800,color:N,marginBottom:10}}>Ministraciones</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:6,marginBottom:6}}>
              <input value={newMin.concepto} onChange={function(e){setNewMin(function(p){return Object.assign({},p,{concepto:e.target.value});});}} placeholder="Ej: 1a ministracion 30%"
                style={{background:BG,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:11,fontFamily:"inherit"}}/>
              <input value={newMin.monto} onChange={function(e){setNewMin(function(p){return Object.assign({},p,{monto:e.target.value});});}} type="number" placeholder="Monto"
                style={{background:BG,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:11,fontFamily:"inherit"}}/>
              <input value={newMin.fecha} onChange={function(e){setNewMin(function(p){return Object.assign({},p,{fecha:e.target.value});});}} type="date"
                style={{background:BG,border:"1.5px solid "+BR,borderRadius:7,padding:"7px 10px",color:N,fontSize:11,fontFamily:"inherit"}}/>
            </div>
            <NBtn onClick={agregarMinistracion}>+ Agregar ministracion</NBtn>
            {(function(){var mins2=[];try{mins2=JSON.parse(f.ministraciones_json||"[]");}catch(e){}return mins2.map(function(m){return(
              <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:OW,borderRadius:7,marginTop:6,border:"1px solid "+BR}}>
                <span style={{fontSize:11,color:N}}>{m.concepto} — ${Number(m.monto||0).toLocaleString("es-MX")}</span>
                <button className="hbtn" onClick={function(){toggleMinistracion(m.id);}}
                  style={{fontSize:10,padding:"2px 8px",borderRadius:5,background:m.estado==="cobrado"?"#f0fdf4":"#fef3c7",color:m.estado==="cobrado"?"#156534":"#b45309",border:"none",fontWeight:700}}>
                  {m.estado==="cobrado"?"Cobrada":"Pendiente"}
                </button>
              </div>
            );});})()} 
          </div>
        </div>
      </Modal>
    </div>
  );
}

/* ══ MATERIALES POR OBRA ════════════════════════════════════════ */
function MaterialesObra({user,proyectos,curProj}){
  const [matProjId,setMatProjId]=useState((curProj&&curProj.id)||"");
  const [mats,setMats]=useState([]);
  const [loading,setLoading]=useState(false);
  const [generando,setGenerando]=useState(false);
  const [analizando,setAnalizando]=useState(false);
  const [showFactura,setShowFactura]=useState(false);
  const [factFile,setFactFile]=useState(null);
  const factRef=useRef();

  useEffect(function(){if(matProjId)loadMats();},[matProjId]);

  function loadMats(){
    setLoading(true);
    SB.get("materiales_obra","?proyecto_id=eq."+matProjId+"&order=nombre")
      .then(function(d){setMats(d||[]);setLoading(false);}).catch(function(){setLoading(false);});
  }

  function generarDesdePresupuesto(){
    setGenerando(true);
    SB.get("presupuestos","?proyecto_id=eq."+matProjId+"&status=eq.aprobado&order=created_at.desc")
      .then(function(presups){
        if(!presups||presups.length===0){
          presups=null;
          return SB.get("presupuestos","?proyecto_id=eq."+matProjId+"&order=created_at.desc");
        }
        return presups;
      }).then(function(presups){
        if(!presups||presups.length===0){alert("No hay presupuesto registrado para esta obra.");setGenerando(false);return;}
        var pres=presups[0];
        var items=[];try{items=JSON.parse(pres.items_json||"[]");}catch(e){}
        if(items.length===0){alert("El presupuesto no tiene partidas registradas.");setGenerando(false);return;}

        var sysPrompt="Eres experto en construccion Mexico. Analiza partidas de presupuesto y extrae lista consolidada de materiales. SOLO JSON sin backticks.";
        var userMsg="Analiza estas partidas de presupuesto y extrae todos los materiales necesarios consolidados: "+JSON.stringify(items.map(function(it){return{nombre:it.name,unidad:it.unit,cantidad:it.qty,materiales:it.materials||[]};}))+". Responde con JSON: {materiales:[{nombre:string,unidad:string,cantidad_total:numero,categoria:Concreto|Acero|Mamposteria|Acabados|Instalaciones|Madera|Otros,precio_unitario_estimado:numero}]}";

        return AI.call(sysPrompt,userMsg,3000).then(function(txt){
          var res;try{res=JSON.parse(txt.replace(/```json|```/g,"").trim());}catch(e){alert("Error IA: "+e.message);setGenerando(false);return;}
          var mats2=res.materiales||[];
          var promises=mats2.map(function(m){
            return SB.post("materiales_obra",{proyecto_id:matProjId,nombre:m.nombre,unidad:m.unidad,cantidad_presupuestada:m.cantidad_total||0,cantidad_comprada:0,precio_unitario_est:m.precio_unitario_estimado||0,categoria:m.categoria||"Otros",created_at:new Date().toISOString()});
          });
          return Promise.all(promises);
        });
      }).then(function(){setGenerando(false);loadMats();alert("Lista de materiales generada desde el presupuesto.");})
      .catch(function(e){alert("Error: "+e.message);setGenerando(false);});
  }

  function analizarFactura(){
    if(!factFile){alert("Selecciona una factura PDF.");return;}
    setAnalizando(true);
    var reader=new FileReader();
    reader.onload=function(e){
      var b64=e.target.result.split(",")[1];
      var matsList=mats.map(function(m){return m.nombre+" ("+m.unidad+") faltante: "+Math.max(0,(m.cantidad_presupuestada||0)-(m.cantidad_comprada||0));}).join(", ");
      AI.callWithImage(
        "Eres experto en construccion Mexico. Lees facturas PDF y extraes materiales comprados. SOLO JSON sin backticks.",
        b64,"application/pdf",
        "Lee esta factura de materiales de construccion. Materiales en lista de obra: "+matsList+". Extrae: {proveedor:string,fecha:string,total:numero,materiales:[{nombre:string,cantidad:numero,unidad:string,precio_unitario:numero,subtotal:numero}]}",
        2000
      ).then(function(txt){
        var res;try{res=JSON.parse(txt.replace(/```json|```/g,"").trim());}catch(e){alert("Error IA: "+e.message);setAnalizando(false);return;}
        var comprados=res.materiales||[];
        var updates=[];
        comprados.forEach(function(c){
          var mat=mats.find(function(m){return m.nombre.toLowerCase().indexOf(c.nombre.toLowerCase().split(" ")[0])>=0||c.nombre.toLowerCase().indexOf(m.nombre.toLowerCase().split(" ")[0])>=0;});
          if(mat){updates.push({id:mat.id,add:c.cantidad||0,nombre:c.nombre,mat_nombre:mat.nombre});}
        });
        if(updates.length===0){alert("No se encontraron coincidencias con materiales de la obra en esta factura.");setAnalizando(false);setShowFactura(false);return;}
        var msg="Se actualizaran los siguientes materiales:\n"+updates.map(function(u){return"+ "+u.add+" "+u.nombre+" en: "+u.mat_nombre;}).join("\n")+"\n\nProveedor: "+res.proveedor+" — Total: $"+Number(res.total||0).toLocaleString("es-MX");
        if(!confirm(msg+"\n\n¿Confirmar descuento de materiales?")){{setAnalizando(false);return;}}
        var patches=updates.map(function(u){
          var mat=mats.find(function(m){return m.id===u.id;});
          var nuevaCantidad=(mat&&mat.cantidad_comprada||0)+u.add;
          return SB.patch("materiales_obra",u.id,{cantidad_comprada:nuevaCantidad,updated_at:new Date().toISOString()});
        });
        Promise.all(patches).then(function(){setAnalizando(false);setShowFactura(false);setFactFile(null);loadMats();alert("Materiales actualizados correctamente.");}).catch(function(e2){alert("Error al actualizar: "+e2.message);setAnalizando(false);});
      }).catch(function(e){alert("Error IA: "+e.message);setAnalizando(false);});
    };
    reader.readAsDataURL(factFile);
  }

  var totalMats=mats.length;
  var matsCrit=mats.filter(function(m){var pct=m.cantidad_presupuestada>0?(m.cantidad_comprada||0)/m.cantidad_presupuestada*100:0;return pct>=100;});
  var matsAten=mats.filter(function(m){var pct=m.cantidad_presupuestada>0?(m.cantidad_comprada||0)/m.cantidad_presupuestada*100:0;return pct>=80&&pct<100;});
  var valorTotal=mats.reduce(function(s,m){return s+(m.cantidad_presupuestada||0)*(m.precio_unitario_est||0);},0);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:20,color:N}}>Materiales por Obra</h2>
          <p style={{fontSize:12,color:TS,marginTop:2}}>Control de abasto — IA lee facturas y descuenta automaticamente</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <NBtn onClick={function(){setShowFactura(true);}}>Registrar Factura</NBtn>
          <GBtn onClick={generarDesdePresupuesto} disabled={generando||!matProjId}>{generando?"Generando...":"Generar desde Presupuesto"}</GBtn>
        </div>
      </div>

      <div style={{marginBottom:14,maxWidth:380}}>
        <select value={matProjId} onChange={function(e){setMatProjId(e.target.value);}}
          style={{width:"100%",background:W,border:"1.5px solid "+BR,borderRadius:8,padding:"9px 12px",color:N,fontSize:13,fontFamily:"inherit"}}>
          <option value="">— Seleccionar obra —</option>
          {proyectos.map(function(p){return <option key={p.id} value={p.id}>{p.nombre}</option>;})}
        </select>
      </div>

      {mats.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:14}}>
          {[
            {l:"Total materiales",v:totalMats,i:"🧱",c:N,bg:"#e8eef8"},
            {l:"Completos",v:matsCrit.length,i:"✅",c:"#156534",bg:"#f0fdf4"},
            {l:"Por agotarse",v:matsAten.length,i:"⚠️",c:"#b45309",bg:"#fffbeb"},
            {l:"Valor presup.",v:"$"+Number(valorTotal).toLocaleString("es-MX"),i:"💰",c:GD,bg:GB},
          ].map(function(s,i){return(

        </div>

        <div style={{background:W,borderRadius:12,border:"1.5px solid "+BR,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 80px 100px 100px 80px 100px",padding:"8px 14px",background:N,fontSize:9,fontWeight:800,color:"rgba(255,255,255,.65)",textTransform:"uppercase",letterSpacing:.8}}>
            <span>Material</span><span style={{textAlign:"center"}}>Unidad</span><span style={{textAlign:"right"}}>Presupuestado</span><span style={{textAlign:"right"}}>Comprado</span><span style={{textAlign:"center"}}>%</span><span style={{textAlign:"center"}}>Estado</span>
          </div>
          {mats.map(function(m,idx){
            var pct=m.cantidad_presupuestada>0?Math.round((m.cantidad_comprada||0)/m.cantidad_presupuestada*100):0;
            var color=pct>=100?"#156534":pct>=80?"#b45309":"#dc2626";
            var bg=pct>=100?"#f0fdf4":pct>=80?"#fffbeb":"#fef2f2";
            var label=pct>=100?"Completo":pct>=80?"Por agotarse":"Faltante";

              <div key={m.id} style={{display:"grid",gridTemplateColumns:"2fr 80px 100px 100px 80px 100px",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid "+BG,background:idx%2===0?W:OW}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:N}}>{m.nombre}</div>
                  <div style={{fontSize:9,color:TS}}>{m.categoria||""}</div>
                </div>
                <div style={{textAlign:"center",fontSize:11,color:TS}}>{m.unidad}</div>
                <div style={{textAlign:"right",fontSize:12,fontWeight:700,color:N}}>{Number(m.cantidad_presupuestada||0).toLocaleString("es-MX")}</div>

                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <span style={{fontSize:9,padding:"2px 8px",borderRadius:6,fontWeight:800,background:bg,color:color}}>{label}</span>
                </div>

            );

      )}

      <Modal show={showFactura} onClose={function(){setShowFactura(false);}} title="Registrar Factura — Descuento automatico de materiales" maxW={480}
        footer={<><GhBtn onClick={function(){setShowFactura(false);}}>Cancelar</GhBtn><GBtn onClick={analizarFactura} disabled={analizando||!factFile}>{analizando?"Analizando factura...":"Analizar con IA y Descontar"}</GBtn></>}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{padding:"10px 14px",background:"#eff4ff",border:"1px solid #bfdbfe",borderLeft:"4px solid "+AC,borderRadius:9,fontSize:12,color:AC,lineHeight:1.6}}>

          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:TS,display:"block",marginBottom:6}}>Factura PDF</label>
            <div className="drop-zone" onClick={function(){factRef.current&&factRef.current.click();}}
              onDragOver={function(e){e.preventDefault();}} onDrop={function(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f)setFactFile(f);}}>
              {factFile?<div style={{fontSize:13,color:GD,fontWeight:700}}>PDF: {factFile.name}</div>:
                <div><div style={{fontSize:28,marginBottom:6}}>📄</div><div style={{fontSize:13,fontWeight:700,color:N}}>Toca para subir factura PDF</div></div>}
            </div>
            <input ref={factRef} type="file" accept=".pdf" style={{display:"none"}} onChange={function(e){setFactFile(e.target.files[0]);}}/>
          </div>
          {analizando&&<div style={{textAlign:"center",padding:"16px",background:BG,borderRadius:9,fontSize:12,color:TS}}>Leyendo factura con IA y cruzando con lista de materiales...</div>}
        </div>
      </Modal>
    </div>
  );
}

/* ══ DASHBOARD ═══════════════════════════════════════════════ */
function Dashboard({user,proyectos,onNav,reload}){
  const [stats,setStats]=useState({obras_activas:0,obras_completadas:0,total_presupuestado:0,total_gastado:0,requisiciones_pendientes:0,actividades_retrasadas:0});
  
  useEffect(()=>{
    // Load stats from Supabase
    Promise.all([
      SB.get("proyectos","?activo=eq.true&order=created_at.desc"),
      SB.get("requisiciones","?estado=eq.pendiente"),
      SB.get("programa_obra","?estado=eq.retrasada"),
      SB.get("compras","?order=created_at.desc&limit=50"),
    ]).then(([projs,reqs,retrasadas,compras])=>{
      const activas=(projs||[]).filter(p=>p.status==="en_proceso"||p.status==="activo").length;
      const completadas=(projs||[]).filter(p=>p.status==="completado"||p.status==="entregado").length;
      const presupuestado=(projs||[]).reduce((s,p)=>s+(p.presupuesto_total||0),0);
      const gastado=(compras||[]).reduce((s,c)=>s+(c.monto||0),0);
      setStats({
        obras_activas:activas,
        obras_completadas:completadas,
        total_obras:(projs||[]).length,
        total_presupuestado:presupuestado,
        total_gastado:gastado,
        pct_gastado:presupuestado>0?Math.round(gastado/presupuestado*100):0,
        requisiciones_pendientes:(reqs||[]).length,
        actividades_retrasadas:(retrasadas||[]).length,
      });
    }).catch(()=>{});
  },[]);

  const fmt=n=>Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtM=n=>{if(n>=1000000)return"$"+(n/1000000).toFixed(1)+"M";if(n>=1000)return"$"+(n/1000).toFixed(0)+"K";return"$"+fmt(n);};

  // Semáforos
  const getSemaforo=(pct)=>{
    if(pct<70)return{color:"#22c55e",label:"En control",bg:"#f0fdf4"};
    if(pct<90)return{color:"#f59e0b",label:"Atención",bg:"#fffbeb"};
    return{color:"#dc2626",label:"Alerta",bg:"#fef2f2"};
  };
  const semGasto=getSemaforo(stats.pct_gastado||0);
  const semReq=getSemaforo(stats.requisiciones_pendientes>5?90:stats.requisiciones_pendientes>2?75:50);
  const semRet=getSemaforo(stats.actividades_retrasadas>3?95:stats.actividades_retrasadas>0?80:50);

  return(
    <div>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:N}}>Dashboard Ejecutivo</h2>
        <p style={{fontSize:12,color:TS,marginTop:2}}>MONTY Desarrollos y Construcción · Los Mochis, Sinaloa</p>
      </div>

      {/* SEMÁFOROS PRINCIPALES */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:20}}>
        {[
          {label:"Obras Activas",value:stats.obras_activas,icon:"🏗️",color:N,bg:"#e8eef8",sub:stats.total_obras+" obras totales",nav:"proyectos"},
          {label:"Obras Completadas",value:stats.obras_completadas,icon:"✅",color:"#156534",bg:"#f0fdf4",sub:"Entregadas al cliente"},
          {label:"Presupuesto Total",value:fmtM(stats.total_presupuestado),icon:"💰",color:GD,bg:GB,sub:"Contratos activos",isMoney:true},
          {label:"Gasto Acumulado",value:fmtM(stats.total_gastado),icon:"🧾",color:semGasto.color,bg:semGasto.bg,sub:`${stats.pct_gastado||0}% del presupuesto`,nav:"compras"},
        ].map((s,i)=>(
          <div key={i} onClick={s.nav?()=>onNav(s.nav):null}
            style={{background:s.bg,border:`1.5px solid ${s.color}22`,borderRadius:12,padding:"16px 18px",
              cursor:s.nav?"pointer":"default",transition:"all .18s",boxShadow:"0 2px 8px rgba(13,34,68,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:TS,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{s.label}</div>
                <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:26,color:s.color}}>{s.value}</div>
                <div style={{fontSize:10,color:TS,marginTop:4}}>{s.sub}</div>
              </div>
              <span style={{fontSize:28}}>{s.icon}</span>
            </div>
          </div>
        ))}
      </div>

      {/* SEMÁFOROS DE ALERTAS */}
      <div style={{background:W,borderRadius:13,border:`1.5px solid ${BR}`,padding:"16px 20px",marginBottom:18,boxShadow:"0 2px 8px rgba(13,34,68,.06)"}}>
        <div style={{fontSize:11,fontWeight:800,color:N,marginBottom:14,textTransform:"uppercase",letterSpacing:.8}}>⚡ Panel de Alertas</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          {[
            {label:"Actividades Retrasadas",value:stats.actividades_retrasadas||0,sem:semRet,icon:"⏰",nav:"programa",unit:"actividad"},
            {label:"Requisiciones Pendientes",value:stats.requisiciones_pendientes||0,sem:semReq,icon:"🛒",nav:"requisiciones",unit:"requisición"},
            {label:"Avance Presupuestal",value:`${stats.pct_gastado||0}%`,sem:semGasto,icon:"📊",nav:"compras",unit:""},
          ].map((a,i)=>(
            <div key={i} onClick={()=>onNav(a.nav)}
              style={{background:a.sem.bg,border:`2px solid ${a.sem.color}33`,borderLeft:`4px solid ${a.sem.color}`,
                borderRadius:10,padding:"12px 14px",cursor:"pointer",transition:"all .18s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:20}}>{a.icon}</span>
                <div style={{width:10,height:10,borderRadius:"50%",background:a.sem.color,boxShadow:`0 0 6px ${a.sem.color}`}}/>
                <span style={{fontSize:10,fontWeight:800,color:a.sem.color}}>{a.sem.label}</span>
              </div>
              <div style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:a.sem.color}}>{a.value}</div>
              <div style={{fontSize:10,color:TS,marginTop:2}}>{a.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* OBRAS RECIENTES */}
      <div style={{background:W,borderRadius:13,border:`1.5px solid ${BR}`,padding:"16px 20px",boxShadow:"0 2px 8px rgba(13,34,68,.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:N,textTransform:"uppercase",letterSpacing:.8}}>🏗️ Obras Recientes</div>
          <button className="hbtn" onClick={()=>onNav("proyectos")} style={{fontSize:11,color:AC,background:"none",border:"none",fontWeight:700}}>Ver todas →</button>
        </div>
        {proyectos.length===0?(
          <div style={{textAlign:"center",padding:"24px",color:TS,fontSize:12}}>Sin proyectos registrados aún</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {proyectos.slice(0,5).map(p=>{
              const pct=p.avance_general||0;
              const statusColor=p.status==="completado"?"#156534":p.status==="en_proceso"?GD:p.status==="retrasado"?"#dc2626":G4;
              const statusLabel=p.status==="completado"?"✅ Completado":p.status==="en_proceso"?"🔨 En proceso":p.status==="retrasado"?"⚠️ Retrasado":"📋 Pendiente";
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",
                  background:OW,borderRadius:9,border:`1px solid ${BR}`,cursor:"pointer"}}
                  onClick={()=>onNav("proyectos")}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:N,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</div>
                    <div style={{fontSize:10,color:TS,marginTop:2}}>{p.cliente||"Sin cliente"} · {p.ubicacion||"Los Mochis"}</div>
                  </div>
                  <div style={{width:80,textAlign:"right"}}>
                    <div style={{fontSize:9,color:statusColor,fontWeight:800}}>{statusLabel}</div>
                    <div style={{marginTop:4,height:4,background:"#e8eef8",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:pct+"%",background:statusColor,borderRadius:2,transition:"width .3s"}}/>
                    </div>
                    <div style={{fontSize:9,color:TS,marginTop:2}}>{pct}%</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <button className="hbtn" onClick={()=>onNav("proyectos")} 
          style={{width:"100%",marginTop:12,padding:"9px",background:BG,border:`1.5px solid ${BR}`,borderRadius:8,
            color:N,fontSize:12,fontWeight:700}}>
          ＋ Nuevo Proyecto
        </button>
      </div>
    </div>
  );
}

/* ══ PROYECTOS ══════════════════════════════════════════════ */
function Proyectos({user,proyectos,reload,onSelect,onNav=function(){}}){
  const [showF,setShowF]=useState(false);const [editP,setEditP]=useState(null);const [saving,setSaving]=useState(false);
  const [usuarios,setUsuarios]=useState([]);
  const emptyF={nombre:"",tipo_obra:"Casa habitación",direccion:"",ciudad:"Los Mochis, Sinaloa",presupuesto_total:"",fecha_inicio:"",fecha_fin_estimada:"",residente_id:"",superficie_m2:"",niveles:"1",contrato_numero:"",notas:"",cliente:"",cliente_tel:"",cliente_email:"",cliente_rfc:""};
  const [f,setF]=useState(emptyF);
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{SB.get("usuarios","?activo=eq.true&order=nombre").then(d=>setUsuarios(d||[])).catch(()=>{});},[]);
  const openNew=()=>{setEditP(null);setF(emptyF);setShowF(true);};
  const openEdit=p=>{setEditP(p);setF({...emptyF,...p,presupuesto_total:String(p.presupuesto_total||""),superficie_m2:String(p.superficie_m2||""),niveles:String(p.niveles||1)});setShowF(true);};
  const save=async()=>{
    if(!f.nombre.trim()){alert("El nombre es obligatorio.");return;}
    setSaving(true);
    try{
      const payload={...f,presupuesto_total:parseFloat(f.presupuesto_total)||0,superficie_m2:parseFloat(f.superficie_m2)||null,niveles:parseInt(f.niveles)||1,residente_id:f.residente_id||null,cliente_tel:f.cliente_tel||null,cliente_email:f.cliente_email||null,cliente_rfc:f.cliente_rfc||null,updated_at:new Date().toISOString()};
      if(editP){
        await SB.patch("proyectos",editP.id,payload);
      }else{
        const _newProjRaw=await SB.post("proyectos",{...payload,estado_proyecto:"activo",gasto_real:0,avance_fisico:0,created_by:user.id||user.nombre||null});
        const newProj=Array.isArray(_newProjRaw)?_newProjRaw[0]:_newProjRaw;
        // Auto-crear presupuesto borrador al crear nuevo proyecto
        if(newProj&&newProj.id){
          await SB.post("presupuestos",{
            proyecto_id:newProj.id,
            nombre_obra:f.nombre,
            cliente_nombre:f.cliente||"",
            cliente_tel:f.cliente_tel||"",
            cliente_email:f.cliente_email||"",
            cliente_rfc:f.cliente_rfc||"",
            obra_direccion:f.direccion||"",
            obra_tipo:f.tipo_obra||"",
            obra_ciudad:f.ciudad||"Los Mochis",
            obra_m2:parseFloat(f.superficie_m2)||null,
            total:0,
            status:"borrador",
            budget_mode:"integrado",
            g_indirectos:10,
            g_utilidad:40,
            items_json:JSON.stringify([]),
            extra_items_json:JSON.stringify([]),
            notas:JSON.stringify([{texto:"Presupuesto creado automaticamente al dar de alta el proyecto.",fecha:new Date().toISOString(),autor:user.nombre}]),
            created_by:user.nombre,
            origen:"proyecto"
          });
          alert("Proyecto y presupuesto borrador creados. Ve al Cotizador para agregar conceptos.");
        }
      }
      reload();setShowF(false);
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };
  const TIPOS=["Casa habitación","Edificio de departamentos","Local comercial","Bodega industrial","Oficinas","Remodelación","Decoración","Obra civil","Otro"];
  const EC={activo:{c:"#156534",bg:"#f0fdf4"},pausado:{c:"#b45309",bg:"#fef3c7"},terminado:{c:GD,bg:GB},cancelado:{c:"#dc2626",bg:"#fef2f2"}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{fontFamily:"Outfit",fontWeight:900,fontSize:22,color:N}}>Proyectos y Obras</h2><p style={{fontSize:12,color:TS,marginTop:2}}>{proyectos.length} proyectos</p></div><GBtn onClick={openNew}>＋ Nuevo Proyecto</GBtn></div>
    {proyectos.length===0?<div style={{textAlign:"center",padding:"50px",background:W,borderRadius:14,border:`1.5px solid ${BR}`}}><div style={{fontSize:50,marginBottom:12}}>🏗️</div><GBtn onClick={openNew}>＋ Crear primer proyecto</GBtn></div>
    :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(330px,1fr))",gap:14}}>
      {proyectos.map(p=>{const ec=EC[p.estado_proyecto]||EC.activo;const ep=pct(p.gasto_real||0,p.presupuesto_total||1);return(<div key={p.id} className="card fi">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{flex:1}}><div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>{p.nombre}</div><div style={{fontSize:11,color:TS,marginTop:2}}>📍 {p.ciudad} · {p.tipo_obra||"—"}</div></div>
          <span style={{fontSize:10,padding:"3px 9px",borderRadius:10,fontWeight:700,background:ec.bg,color:ec.c,marginLeft:8}}>{p.estado_proyecto}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:BG,borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,color:G4,fontWeight:700}}>PRESUPUESTO</div><div style={{fontSize:13,fontWeight:800,color:GD,fontFamily:"Outfit"}}>$ {fmtM(p.presupuesto_total)}</div></div>
          <div style={{background:BG,borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,color:G4,fontWeight:700}}>EJERCIDO</div><div style={{fontSize:13,fontWeight:800,color:"#156534",fontFamily:"Outfit"}}>$ {fmtM(p.gasto_real)}</div></div>
        </div>
        <div style={{marginBottom:10}}><div style={{fontSize:9,color:G4,fontWeight:700,marginBottom:3}}>PRESUPUESTO EJERCIDO</div><Sem v={ep}/></div>
        <div style={{fontSize:11,color:G4,marginBottom:12}}>📅 {fmtD(p.fecha_inicio)} → {fmtD(p.fecha_fin_estimada)}</div>
        <div style={{display:"flex",gap:6}}>
          <button className="hbtn" onClick={()=>onSelect(p)} style={{flex:1,background:`linear-gradient(135deg,${N2},${N})`,color:W,border:"none",padding:"7px",borderRadius:7,fontSize:11,fontWeight:700}}>📊 Control de Obra</button>
          <button className="hbtn" onClick={()=>openEdit(p)} style={{background:"#eff4ff",color:AC,border:`1px solid ${AC}33`,padding:"7px 10px",borderRadius:7,fontSize:11}}>✏️</button>

            {mod:"bitacora",icon:"📔",label:"Bitácora"},
            {mod:"requisiciones",icon:"🛒",label:"Requisiciones"},
            {mod:"documentos",icon:"📁",label:"Documentos"},

    <Modal show={showF} onClose={()=>setShowF(false)} title={editP?"✏️ Editar Proyecto":"🏗️ Nuevo Proyecto"} maxW={700}

      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        <SLbl t="Información General"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

          <Sel label="Tipo de obra" value={f.tipo_obra} onChange={v=>sf("tipo_obra",v)}>{TIPOS.map(t=><option key={t}>{t}</option>)}</Sel>

          <Inp label="Presupuesto de inversión ($MXN)" value={f.presupuesto_total} onChange={v=>sf("presupuesto_total",v)} type="number" placeholder="Monto aproximado que el cliente planea invertir"/>
