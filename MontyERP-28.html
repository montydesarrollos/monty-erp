                </div>
                <Inp label={"Rendimiento ("+wiz.unit+"/jornada) *"} value={wiz.jRend} onChange={v=>setWiz(w=>({...w,jRend:v}))} type="number" placeholder="Ej: 10"/>
                <div style={{padding:"10px 14px",background:W,border:"1.5px solid "+BR,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:TS}}>Costo MO / {wiz.unit}</span>
                  <span style={{fontSize:16,fontWeight:900,color:AC,fontFamily:"Outfit"}}>$ {fmt(wc.mo)}</span>
                </div>
              </div>
            )}
            {wiz.moType==="destajo"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <Inp label={"Precio destajo / "+wiz.unit+" ($MXN) *"} value={wiz.dPrice} onChange={v=>setWiz(w=>({...w,dPrice:v}))} type="number" placeholder="Ej: 120"/>
                <div style={{padding:"10px 14px",background:W,border:"1.5px solid "+BR,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:TS}}>Costo MO / {wiz.unit}</span>
                  <span style={{fontSize:16,fontWeight:900,color:"#c53030",fontFamily:"Outfit"}}>$ {fmt(wc.mo)}</span>
                </div>
              </div>
            )}
            <div style={{marginTop:14,padding:"12px 14px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:9}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                <span style={{fontWeight:700,color:N}}>Costo Directo / {wiz.unit}</span>
                <span style={{fontWeight:900,color:"#156534",fontFamily:"Outfit"}}>$ {fmt(wc.dc)}</span>
              </div>
            </div>
          </div>
        )}

        {/* P3 — Precio/Utilidad */}
        {wizStep===3&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>Indirectos, Utilidad y Precio</div>

            {/* AI BREAKDOWN PANEL */}
            {wiz._editItem&&aiPrices[wiz._editItem.id]&&(
              <div style={{background:"#f5f3ff",border:"1.5px solid #7c3aed",borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#5b21b6",marginBottom:8}}>🤖 Desglose IA — edita los valores para mejorar futuros precios</div>
                <div style={{fontSize:11,color:"#5b21b6",marginBottom:6,lineHeight:1.6}}>
                  {aiPrices[wiz._editItem.id].breakdown||""}
                </div>
                {aiPrices[wiz._editItem.id].rendimiento&&(
                  <div style={{fontSize:10,color:"#7c3aed",fontStyle:"italic"}}>
                    Rendimiento: {aiPrices[wiz._editItem.id].rendimiento}
                  </div>
                )}
                <div style={{fontSize:10,color:"#7c3aed",marginTop:6,fontWeight:700}}>
                  Precio IA: ${Number(aiPrices[wiz._editItem.id].unitPrice||0).toLocaleString("es-MX")} / {wiz.unit}
                </div>
                <div style={{fontSize:10,color:"#5b21b6",marginTop:4,opacity:.8}}>
                  Ajusta materiales en el paso anterior y MO abajo para corregir el precio
                </div>
              </div>
            )}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Inp label="Gastos Indirectos (%)" value={wiz.indirectos} onChange={v=>setWiz(w=>({...w,indirectos:v}))} type="number" placeholder="10"/>
              <Inp label="Utilidad Contratista (%)" value={wiz.utilidad} onChange={v=>setWiz(w=>({...w,utilidad:v}))} type="number" placeholder="40"/>
            </div>
            <div style={{background:W,border:"1.5px solid "+BR,borderRadius:10,padding:"14px"}}>
              {[["Materiales",wc.mat],["M.O. ("+wiz.moType+")",wc.mo],["Costo Directo",wc.dc,true],["Indirectos ("+wiz.indirectos+"%)",wc.ind],["Utilidad ("+wiz.utilidad+"%)",wc.ut]].map(([l,v,b],i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,borderBottom:b?"1px solid "+BR:"none",marginBottom:b?6:0,fontWeight:b?700:400}}>
                  <span style={{color:b?N:TS}}>{l}</span><span style={{fontFamily:"DM Mono",color:b?N:TS}}>$ {fmt(v)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:16}}>
                <span style={{fontFamily:"Outfit",fontWeight:900,color:N}}>Precio Unitario</span>
                <span style={{fontFamily:"Outfit",fontWeight:900,color:GD}}>$ {fmt(wc.precio)}</span>
              </div>
            </div>
            <div style={{background:wiz.useManual?GB:OW,border:"1.5px solid "+(wiz.useManual?GL:BR),borderRadius:9,padding:"12px 14px"}}>
              <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:wiz.useManual?12:0}}>
                <input type="checkbox" checked={wiz.useManual} onChange={e=>setWiz(w=>({...w,useManual:e.target.checked}))} style={{width:16,height:16,accentColor:GD}}/>
                <span style={{fontSize:12,fontWeight:700,color:wiz.useManual?GD:TS}}>✏️ Usar precio manual (sobreescribe el calculado)</span>
              </label>
              {wiz.useManual&&<Inp label="Precio unitario manual ($MXN s/IVA)" value={wiz.manualPrice} onChange={v=>setWiz(w=>({...w,manualPrice:v}))} type="number" placeholder="Ej: 285.50"/>}
            </div>
          </div>
        )}

        {/* P4 — Confirmar */}
        {wizStep===4&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:14,color:N}}>Confirmar y guardar en la nube</div>
            <div style={{background:W,border:"1.5px solid "+BR,borderRadius:12,padding:"18px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <span style={{fontSize:32}}>{wiz.emoji}</span>
                <div>
                  <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:15,color:N}}>{wiz.name||"Sin nombre"}</div>
                  <div style={{fontSize:11,color:TS,marginTop:2}}>{wiz.newCat||wiz.cat||"Sin categoría"} · {wiz.unit}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[{l:"Materiales",v:"$ "+fmt(wc.mat),c:"#156534"},{l:"M.O. ("+wiz.moType+")",v:"$ "+fmt(wc.mo),c:wiz.moType==="jornal"?AC:"#c53030"},{l:"Costo Directo",v:"$ "+fmt(wc.dc),c:N},{l:"Ind. ("+wiz.indirectos+"%)",v:"$ "+fmt(wc.ind),c:TS},{l:"Util. ("+wiz.utilidad+"%)",v:"$ "+fmt(wc.ut),c:TS},{l:"PRECIO UNITARIO",v:"$ "+fmt(wc.precio),c:GD,big:true}].map((r,i)=>(
                  <div key={i} style={{background:BG,borderRadius:8,padding:"10px 11px",border:"1px solid "+BR}}>
                    <div style={{fontSize:8,color:G4,fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{r.l}</div>
                    <div style={{fontSize:r.big?15:12,fontWeight:900,color:r.c,fontFamily:"Outfit",marginTop:3}}>{r.v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{padding:"10px 14px",background:"#eff4ff",border:"1px solid #bfdbfe",borderLeft:"4px solid "+AC,borderRadius:9,fontSize:11,color:AC}}>
              ☁️ Este concepto se guardará en Supabase y estará disponible en todos los dispositivos y sesiones de MONTY.
            </div>
          </div>
        )}
      </Modal>
    )}
  </div>);
}

function AnalisisPlanos({user,proyectos}){
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [projId,setProjId]=useState("");
  const [transferring,setTransferring]=useState(false);
  const [transferred,setTransferred]=useState(false);
  const [specs,setSpecs]=useState("");
  const [markers,setMarkers]=useState([
    {id:1,tipo:"cuadro",color:"#dc2626",colorName:"Rojo",simbolo:"🟥",descripcion:"",ejemplo:"Castillo 15x15cm 4 var 3/8 + estribos alambrón"},
    {id:2,tipo:"cuadro",color:"#f59e0b",colorName:"Amarillo",simbolo:"🟨",descripcion:"",ejemplo:"Columna 20x40cm 4 var 5/8 + 2 var 1/2 + estribos var 3/8 c/15cm"},
    {id:3,tipo:"cuadro",color:"#2563eb",colorName:"Azul",simbolo:"🟦",descripcion:"",ejemplo:"Castillo armex 10x10cm"},
    {id:4,tipo:"cuadro",color:"#16a34a",colorName:"Verde",simbolo:"🟩",descripcion:"",ejemplo:"Viga de cerramiento 20x20cm"},
    {id:5,tipo:"cuadro",color:"#7c3aed",colorName:"Morado",simbolo:"🟪",descripcion:"",ejemplo:"Trabe de desplante 30x40cm"},
    {id:6,tipo:"cuadro",color:"#db2777",colorName:"Rosa",simbolo:"🩷",descripcion:"",ejemplo:"Dado de cimentacion 60x60x60cm"},
    {id:7,tipo:"cuadro",color:"#0891b2",colorName:"Cyan",simbolo:"🔷",descripcion:"",ejemplo:"Poste metalico 4 pulgadas cuadrado"},
    {id:8,tipo:"cuadro",color:"#65a30d",colorName:"Lima",simbolo:"🟢",descripcion:"",ejemplo:"Mocheta 15x15cm block relleno concreto"},
    {id:9,tipo:"cuadro",color:"#ea580c",colorName:"Naranja",simbolo:"🟧",descripcion:"",ejemplo:"Columna circular 30cm diametro"},
    {id:10,tipo:"cuadro",color:"#1e293b",colorName:"Negro",simbolo:"⬛",descripcion:"",ejemplo:"Elemento especial a definir"},
    {id:11,tipo:"rectangulo",color:"#dc2626",colorName:"Rojo",simbolo:"🔴",descripcion:"",ejemplo:"Trabe T-1 25x50cm 4 var 5/8 + estribos var 3/8 c/15cm"},
    {id:12,tipo:"rectangulo",color:"#f59e0b",colorName:"Amarillo",simbolo:"🟡",descripcion:"",ejemplo:"Trabe T-2 20x40cm 3 var 1/2 + estribos var 3/8 c/20cm"},
    {id:13,tipo:"rectangulo",color:"#2563eb",colorName:"Azul",simbolo:"🔵",descripcion:"",ejemplo:"Trabe de borde 20x30cm 2 var 1/2"},
    {id:14,tipo:"rectangulo",color:"#16a34a",colorName:"Verde",simbolo:"🟢",descripcion:"",ejemplo:"Trabe de liga 15x25cm var 3/8"},
    {id:15,tipo:"rectangulo",color:"#7c3aed",colorName:"Morado",simbolo:"🟣",descripcion:"",ejemplo:"Losa maciza 12cm concreto 250 kg/cm2"},
    {id:16,tipo:"rectangulo",color:"#db2777",colorName:"Rosa",simbolo:"🩷",descripcion:"",ejemplo:"Losa vigueta bovedilla 12cm"},
    {id:17,tipo:"rectangulo",color:"#0891b2",colorName:"Cyan",simbolo:"🩵",descripcion:"",ejemplo:"Losa aligerada 10cm"},
    {id:18,tipo:"rectangulo",color:"#65a30d",colorName:"Lima",simbolo:"🌿",descripcion:"",ejemplo:"Viga IPR 6 pulgadas"},
    {id:19,tipo:"rectangulo",color:"#ea580c",colorName:"Naranja",simbolo:"🟠",descripcion:"",ejemplo:"Federica o cadena 15x20cm var 3/8"},
    {id:20,tipo:"rectangulo",color:"#1e293b",colorName:"Negro",simbolo:"⬜",descripcion:"",ejemplo:"Elemento estructural especial"},
  ]);
  const fileRef=useRef();

  function updateMarker(id,val){
    setMarkers(function(prev){return prev.map(function(m){return m.id===id?Object.assign({},m,{descripcion:val}):m;});});
  }

  function handleFile(f){
    if(!f)return;
    setFile(f);setResult(null);setError("");setTransferred(false);
    var reader=new FileReader();
    reader.onload=function(e){setPreview(e.target.result);};
    reader.readAsDataURL(f);
  }

  function analyze(){
    if(!file){alert("Selecciona un plano primero.");return;}
    setAnalyzing(true);setError("");setResult(null);setTransferred(false);
    var reader=new FileReader();
    reader.onload=function(e){
      var b64=e.target.result.split(",")[1];
      var mime=file.type||"image/jpeg";

      // Build markers context
      var activeMarkers=markers.filter(function(m){return m.descripcion.trim();});
      var cuadros=activeMarkers.filter(function(m){return m.tipo==="cuadro";});
      var rectos=activeMarkers.filter(function(m){return m.tipo==="rectangulo";});
      var markersCtx="";
      if(cuadros.length>0) markersCtx+="CUADROS (elementos puntuales — cuenta cuantos hay de cada color y multiplica por altura para obtener ml): "+cuadros.map(function(m){return m.simbolo+" Cuadro "+m.colorName+": "+m.descripcion;}).join(". ")+". ";
      if(rectos.length>0) markersCtx+="RECTANGULOS (elementos lineales — mide la longitud total de cada color y calcula ml, m2 o m3 segun descripcion): "+rectos.map(function(m){return m.simbolo+" Rectangulo "+m.colorName+": "+m.descripcion;}).join(". ")+". ";

      // Build specs context
      var specsCtx=specs?"ESPECIFICACIONES: "+specs+". ":"";

      var sysPrompt="Eres experto en cuantificacion de obra de construccion en Mexico (Los Mochis, Sinaloa). Analizas planos arquitectonicos con marcas de colores y cuantificas con precision. Responde SOLO JSON sin backticks.";

      var userMsg=markersCtx+specsCtx+
        "Analiza este plano de construccion. "+
        (activeMarkers.length>0
          ?"Para cada tipo de marca de color: cuenta cuantas marcas hay, aplica la altura indicada en especificaciones para calcular ml, y calcula kg de acero si aplica segun la descripcion del elemento. "
          :"")+
        "Tambien cuantifica todos los demas conceptos visibles (muros, pisos, plafones, instalaciones, etc). "+
        "Si no lees dimensiones exactas ESTIMA con construccion residencial tipica Mexico. "+
        "GENERA minimo 8 conceptos. "+
        "Responde SOLO este JSON: {conceptos:[{nombre:string,unidad:string,cantidad:numero,descripcion:string,categoria:string,origen:string}],altura_detectada:string,observaciones:string,confianza:alta|media|baja,advertencias:string}. "+
        "En origen indica si viene de marca_roja, marca_amarilla, marca_azul, marca_verde, marca_morada o plano_general. "+
        "Categorias: Movimiento de Tierras, Cimentacion, Mamposteria, Pisos, Pintura, Carpinteria, Hidraulico, Electrico, Concreto, Acero, Otro.";

      AI.callWithImage(sysPrompt,b64,mime,userMsg,3500).then(function(txt){
        try{
          var clean=txt.replace(/```json|```/g,"").trim();
          setResult(JSON.parse(clean));
        }catch(e2){setError("Error al procesar respuesta IA: "+e2.message+". Respuesta: "+txt.slice(0,300));}
        setAnalyzing(false);
      }).catch(function(e){setError("Error IA: "+e.message);setAnalyzing(false);});
    };
    reader.readAsDataURL(file);
  }

  function transferirAlCotizador(){
    if(!projId){alert("Selecciona el proyecto primero.");return;}
    if(!result||!result.conceptos||result.conceptos.length===0){alert("No hay conceptos para transferir.");return;}
    setTransferring(true);
    var catMap={
      "Movimiento de Tierras":"Movimiento de Tierras","Cimentacion":"Cimentación","Cimentación":"Cimentación",
      "Mamposteria":"Mampostería","Mampostería":"Mampostería","Pisos":"Pisos","Pintura":"Pintura",
      "Carpinteria":"Carpintería/Herrería","Carpintería":"Carpintería/Herrería",
      "Hidraulico":"Inst. Hidráulicas","Hidráulico":"Inst. Hidráulicas",
      "Electrico":"Inst. Eléctricas","Eléctrico":"Inst. Eléctricas",
      "Concreto":"Concreto / Colados","Acero":"Acero de Refuerzo","Otro":"Otros"
    };
    var itemsJson=result.conceptos.map(function(c,i){
      return{id:"plano_"+i+"_"+Date.now(),cat:catMap[c.categoria]||c.categoria||"Otros",
        name:c.nombre,unit:c.unidad||"m2",emoji:"📐",qty:c.cantidad||0,
        manualPrice:null,descripcion:c.descripcion||"",origen:c.origen||"plano"};
    });
    var proj=proyectos.find(function(p){return p.id===projId;});
    SB.get("presupuestos","?proyecto_id=eq."+projId+"&order=created_at.desc&limit=1").then(function(presups){
      if(presups&&presups.length>0){
        // Append to existing presupuesto
        var existing=presups[0];
        var existingItems=[];
        try{existingItems=JSON.parse(existing.items_json||"[]");}catch(e){}
        var merged=existingItems.concat(itemsJson);
        return SB.patch("presupuestos",existing.id,{
          items_json:JSON.stringify(merged),
          updated_at:new Date().toISOString()
        }).then(function(){return{action:"updated",count:itemsJson.length};});
      }else{
        return SB.post("presupuestos",{
          proyecto_id:projId,
          nombre_obra:(proj?proj.nombre:"Proyecto")+" — Cuantificación de plano",
          cliente_nombre:proj?proj.cliente:"",

          notas:JSON.stringify([{texto:"Generado por análisis IA de plano. Confianza: "+(result.confianza||"media"),fecha:new Date().toISOString(),autor:user.nombre}]),
          created_by:user.nombre,origen:"analisis_plano"
        }).then(function(){return{action:"created",count:itemsJson.length};});

      setTransferring(false);setTransferred(true);

  var ORIGEN_LABEL={"marca_roja":"🟥 Cuadro Rojo","marca_amarilla":"🟨 Cuadro Amarillo","marca_azul":"🟦 Cuadro Azul","marca_verde":"🟩 Cuadro Verde","marca_morada":"🟪 Cuadro Morado","marca_rosa":"🩷 Cuadro Rosa","marca_cyan":"🔷 Cuadro Cyan","marca_lima":"🟢 Cuadro Lima","marca_naranja":"🟧 Cuadro Naranja","marca_negro":"⬛ Cuadro Negro","rect_rojo":"🔴▬ Rect. Rojo","rect_amarillo":"🟡▬ Rect. Amarillo","rect_azul":"🔵▬ Rect. Azul","rect_verde":"🟢▬ Rect. Verde","rect_morado":"🟣▬ Rect. Morado","rect_rosa":"🩷▬ Rect. Rosa","rect_cyan":"🩵▬ Rect. Cyan","rect_lima":"🩶▬ Rect. Lima","rect_naranja":"🟠▬ Rect. Naranja","rect_negro":"⬛▬ Rect. Negro","plano_general":"📐 Plano General"};

          {markers.filter(function(m){return m.tipo==="cuadro";}).map(function(m){return(

        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>

          style={{width:"100%",background:BG,border:"1.5px solid "+BR,borderRadius:8,padding:"10px 12px",color:N,fontSize:12,fontFamily:"inherit",minHeight:80,resize:"vertical",lineHeight:1.6,marginBottom:14}}/>

        <div className={"drop-zone"+(file?" over":"")} onClick={function(){fileRef.current&&fileRef.current.click();}}

          </div>

            if(grupo.length===0)return null;

                  <span>Concepto</span><span style={{textAlign:"center"}}>Unidad</span><span style={{textAlign:"right"}}>Cantidad</span><span style={{paddingLeft:10}}>Categoría</span>

          <div className="card" style={{border:"1.5px solid "+GD+"44",background:GB}}>
            <SLbl t="Transferir al Cotizador"/>

              </div>
            ):(
              <div style={{padding:"10px 12px",background:"#eff4ff",border:"1px solid #bfdbfe",borderRadius:8,fontSize:12,color:AC,marginBottom:10,lineHeight:1.6}}>
                Se agregarán los {(result.conceptos||[]).length} conceptos al presupuesto del proyecto <strong>{(proyectos.find(function(p){return p.id===projId;})||{}).nombre}</strong>. Si ya existe un presupuesto, se agregan a él.

            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button className="hbtn" onClick={function(){setFile(null);setPreview(null);setResult(null);setTransferred(false);}}
                style={{padding:"8px 16px",background:W,border:"1.5px solid "+BR,borderRadius:8,fontSize:12,fontWeight:700,color:N}}>
                Analizar otro plano

                <button className="hbtn" onClick={transferirAlCotizador} disabled={transferring}

                  {transferring?"Transfiriendo...":"Transferir al Cotizador"}
                </button>
              )}

                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,fontSize:12,color:"#156534",fontWeight:700}}>

          </div>
        </div>
      )}
    </div>
  );
}

function ProgramaIA({user,curProj,proyectos,isRes}){
  const [acts,setActs]=useState([]);
  const [projId,setProjId]=useState(curProj?curProj.id:"");
  const [partidas,setPartidas]=useState([]);
  const [rendimientos,setRendimientos]=useState(function(){
    try{return JSON.parse(localStorage.getItem("monty_rendimientos"))||RENDIMIENTOS_BASE;}
    catch{return RENDIMIENTOS_BASE;}
  });
  const [showGenerar,setShowGenerar]=useState(false);
  const [showRends,setShowRends]=useState(false);
  const [generating,setGenerating]=useState(false);
  const [editRend,setEditRend]=useState(null);
  const [showEditRend,setShowEditRend]=useState(false);
  const [showF,setShowF]=useState(false);
  const [editA,setEditA]=useState(null);
  const [saving,setSaving]=useState(false);
  const [fGen,setFGen]=useState({fecha_inicio:"",fecha_fin:"",dias_semana:"6",cuadrillas:"2",notas:""});
  const [fotos,setFotos]=useState([]);
  const [analizandoFoto,setAnalizandoFoto]=useState({});
  const chartRef=useRef(null);
  const chartInst=useRef(null);

  useEffect(function(){localStorage.setItem("monty_rendimientos",JSON.stringify(rendimientos));},[rendimientos]);
  useEffect(function(){if(projId){loadActs();loadPartidas();loadFotos();}},[projId]);
  useEffect(function(){if(curProj&&curProj.id)setProjId(curProj.id);},[curProj]);

  function loadActs(){SB.get("programa_obra","?proyecto_id=eq."+projId+"&order=fecha_inicio").then(function(d){setActs(d||[]);}).catch(function(){});}
  function loadPartidas(){SB.get("partidas","?proyecto_id=eq."+projId+"&order=sort_order").then(function(d){setPartidas(d||[]);}).catch(function(){});}
  function loadFotos(){SB.get("fotos_avance","?proyecto_id=eq."+projId+"&order=created_at.desc&limit=12").then(function(d){setFotos(d||[]);}).catch(function(){});}

  function updAvance(id,v){
    var estado=v>=100?"completada":v>0?"en_proceso":"pendiente";
    SB.patch("programa_obra",id,{avance_real:v,estado:estado,updated_at:new Date().toISOString()}).then(loadActs).catch(function(){});
  }

  function saveAct(){
    if(!editA||!projId||!editA.actividad||!editA.fecha_inicio||!editA.fecha_fin){alert("Completa todos los campos.");return;}
    setSaving(true);
    var payload={actividad:editA.actividad,descripcion:editA.descripcion||"",fecha_inicio:editA.fecha_inicio,fecha_fin:editA.fecha_fin,color:editA.color||"#1a3d7a"};
    var promise=editA.id?SB.patch("programa_obra",editA.id,payload):SB.post("programa_obra",Object.assign({},payload,{proyecto_id:projId,avance_real:0,estado:"pendiente"}));
    promise.then(function(){setShowF(false);loadActs();setSaving(false);}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }

  function generarPrograma(){
    if(!fGen.fecha_inicio||!fGen.fecha_fin){alert("Ingresa fechas de inicio y entrega.");return;}
    if(!projId){alert("Selecciona un proyecto.");return;}
    setGenerating(true);
    var rendsText=rendimientos.map(function(r){return r.actividad+": "+r.rend_ia+" "+r.unidad+"/dia cuadrilla "+r.cuadrilla;}).join(", ");
    var partsText=partidas.length>0?partidas.map(function(p){return p.nombre+" "+p.cantidad+" "+p.unidad;}).join(", "):"obra general";
    var systemPrompt="Eres experto en programacion de obra en Mexico, Sinaloa. Generas programas realistas. Respondes SOLO con JSON valido sin backticks ni markdown con esta estructura: {actividades:[{nombre:string,fecha_inicio:YYYY-MM-DD,fecha_fin:YYYY-MM-DD,descripcion:string,estado:pendiente,color:#hexcolor}],alertas:[string],observaciones:string}";
    var userMsg="Genera programa de obra en Los Mochis Sinaloa. Inicio: "+fGen.fecha_inicio+". Entrega: "+fGen.fecha_fin+". Dias por semana: "+fGen.dias_semana+". Cuadrillas: "+fGen.cuadrillas+". Partidas: "+partsText+". Rendimientos: "+rendsText+(fGen.notas?". Notas: "+fGen.notas:"")+".";
    AI.call(systemPrompt,userMsg,3000).then(function(txt){
      try{
        var clean=txt.replace(/```json/g,"").replace(/```/g,"").trim();
        var parsed=JSON.parse(clean);
        var acts=parsed.actividades||[];
        var promesas=acts.map(function(act,idx){
          return SB.post("programa_obra",{proyecto_id:projId,actividad:act.nombre,descripcion:act.descripcion||"",fecha_inicio:act.fecha_inicio,fecha_fin:act.fecha_fin,avance_real:0,avance_programado:100,estado:act.estado||"pendiente",color:act.color||"#1a3d7a",sort_order:idx});
        });
        Promise.all(promesas).then(function(){
          setShowGenerar(false);
          loadActs();
          var msg="Programa generado con "+acts.length+" actividades.";
          if(parsed.alertas&&parsed.alertas.length>0)msg+="\nAlertas:\n"+parsed.alertas.join("\n");
          if(parsed.observaciones)msg+="\n\n"+parsed.observaciones;
          alert(msg);
        }).catch(function(e){alert("Error guardando: "+e.message);});
      }catch(e){alert("Error al procesar respuesta IA: "+e.message+"\nRespuesta: "+txt.slice(0,200));}
      setGenerating(false);
    }).catch(function(e){alert("Error IA: "+e.message);setGenerating(false);});
  }

  function saveRendimiento(){
    if(!editRend)return;
    setRendimientos(function(prev){return prev.map(function(r){return r.id===editRend.id?editRend:r;});});
    setShowEditRend(false);
    setEditRend(null);
    alert("Rendimiento actualizado. La IA usara este valor en el proximo programa.");
  }

  function analizarFotoConIA(foto){
    if(!foto.archivo_url){alert("Esta foto no tiene archivo disponible.");return;}
    setAnalizandoFoto(function(p){var n=Object.assign({},p);n[foto.id]=true;return n;});
    var actsList=acts.map(function(a){
      return a.actividad+" (prog:"+(a.avance_programado||100)+"% real:"+(a.avance_real||0)+"%)";
    }).join(", ");
    var sysMsg="Experto supervision obra construccion Mexico. Responde SOLO JSON sin backticks: {actividad_detectada:string,porcentaje_avance:numero,calidad:buena|regular|deficiente,anomalias:[string],recomendaciones:string,confianza:alta|media|baja}";
    var userMsg="Analiza foto de avance de obra Los Mochis Sinaloa. Actividades: "+actsList+". Solo JSON.";
    fetch(foto.archivo_url).then(function(r){return r.blob();}).then(function(blob){
      var reader=new FileReader();
      reader.onload=function(e){
        var b64=e.target.result.split(",")[1];
        AI.callWithImage(sysMsg,b64,blob.type||"image/jpeg",userMsg,1500).then(function(txt){
          try{
            var res=JSON.parse(txt.replace(/```json|```/g,"").trim());
